<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FactorHub OS — Live Monitor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#060408;font-family:'Courier New',monospace}

/* ── Office ── */
#office{position:fixed;inset:0}
#bg{width:100%;height:100%;object-fit:cover;object-position:center;display:block}
#chars-layer{position:absolute;inset:0;pointer-events:none}

/* ── Characters ── */
.char-wrap{
  position:absolute;
  transform:translate(-50%,-100%);
  pointer-events:all;
  cursor:pointer;
  z-index:10;
}
.char-wrap:hover{z-index:50}
.char-sprite{
  width:80px;height:96px;
  image-rendering:pixelated;
  image-rendering:-moz-crisp-edges;
  background-repeat:no-repeat;
  /* background-size and background-position set by JS */
}

/* Sit animation — row 2, 4 frames, frame-width at final display scale */
@keyframes anim-sit{
  0%  {background-position-x:var(--f0)}
  25% {background-position-x:var(--f1)}
  50% {background-position-x:var(--f2)}
  75% {background-position-x:var(--f3)}
  100%{background-position-x:var(--f0)}
}
@keyframes anim-idle{
  0%  {background-position-x:var(--f0)}
  33% {background-position-x:var(--f1)}
  67% {background-position-x:var(--f2)}
  100%{background-position-x:var(--f0)}
}

.state-sit {animation:anim-sit  1.2s steps(1) infinite}
.state-idle{animation:anim-idle 2.0s steps(1) infinite}

/* Agent name badge */
.char-label{
  position:absolute;bottom:calc(100%+2px);left:50%;transform:translateX(-50%);
  font-size:8px;font-weight:900;letter-spacing:.05em;
  padding:2px 7px;border-radius:4px;white-space:nowrap;
  pointer-events:none;
}
/* Speech bubble */
.char-bubble{
  position:absolute;bottom:calc(100%+20px);left:50%;transform:translateX(-50%);
  background:rgba(8,6,16,.92);border:1px solid rgba(255,255,255,.12);
  border-radius:8px;padding:5px 9px;
  font-size:9px;color:#c4b8e0;white-space:nowrap;max-width:160px;
  white-space:normal;text-align:center;line-height:1.35;
  pointer-events:none;opacity:0;transition:opacity .25s;
  z-index:20;
}
.char-bubble::after{
  content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:4px solid transparent;border-top-color:rgba(255,255,255,.12);
}
.char-wrap:hover .char-bubble,.char-wrap.active .char-bubble{opacity:1}
.working-dot{
  position:absolute;bottom:2px;right:2px;
  width:8px;height:8px;border-radius:50%;
  background:#22c55e;border:1.5px solid #060408;
  display:none;
}
.char-wrap.working .working-dot{display:block;animation:dot-pulse 1.2s ease-out infinite}
@keyframes dot-pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.6)}70%{box-shadow:0 0 0 8px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}

/* ── Top Bar ── */
#topbar{
  position:fixed;top:0;left:0;right:300px;height:42px;
  background:rgba(6,4,14,.9);backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;padding:0 16px;gap:12px;z-index:200;
}
.pip{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:glow-p 1.6s ease-in-out infinite}
@keyframes glow-p{0%,100%{box-shadow:0 0 4px #22c55e}50%{box-shadow:0 0 12px #22c55e,0 0 24px #22c55e44}}
.logo{font-size:13px;font-weight:900;letter-spacing:.14em;color:#f0f0f0}.logo span{color:#c9a84c}
.bdg{font-size:8px;font-weight:800;padding:2px 7px;border-radius:3px;letter-spacing:.06em}
.b-g{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#22c55e}
.b-o{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);color:#c9a84c}
#clk{font-size:10px;color:#4a4a6a;margin-left:auto}
#mission-lbl{font-size:10px;color:#c9a84c;font-weight:700}

/* ── Right Panel ── */
#panel{
  position:fixed;top:0;right:0;bottom:34px;width:280px;
  background:rgba(8,6,18,.96);backdrop-filter:blur(20px);
  border-left:1px solid rgba(255,255,255,.07);
  display:flex;flex-direction:column;overflow:hidden;z-index:200;
}
.psec{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.ptitle{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#3a3564;margin-bottom:10px}
/* Agent row — matches reference */
.arow{
  display:flex;align-items:center;gap:10px;
  padding:7px 8px;border-radius:7px;cursor:pointer;
  transition:background .12s;margin-bottom:3px;
}
.arow:hover{background:rgba(255,255,255,.04)}
.aav{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:900;flex-shrink:0;
  border-width:1px;border-style:solid;
}
.ainfo{flex:1;min-width:0}
.aname{font-size:11px;font-weight:700;color:#e0e0f0;margin-bottom:1px}
.arole{font-size:9px;color:#4a4a6a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.a-status{
  font-size:7.5px;font-weight:800;letter-spacing:.06em;
  padding:2px 6px;border-radius:3px;flex-shrink:0;
}
.s-online{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.2)}
.s-busy  {background:rgba(232,98,42,.12); color:#e8622a;border:1px solid rgba(232,98,42,.2)}

/* scrollable body */
#panel-body{flex:1;overflow-y:auto}
#panel-body::-webkit-scrollbar{width:3px}#panel-body::-webkit-scrollbar-thumb{background:#1a1535;border-radius:2px}

/* Missions */
.mrow{padding:8px 8px;border-radius:6px;margin-bottom:5px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05)}
.mtag{font-size:7.5px;font-weight:800;padding:2px 6px;border-radius:3px;letter-spacing:.05em}
.mname{font-size:10px;font-weight:600;color:#c4b8e0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:4px 0 5px}
.mpb{height:2px;background:#14112a;border-radius:1px}
.mpbf{height:100%;border-radius:1px;transition:width .5s}
.see-all{
  width:100%;padding:7px;border-radius:5px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  color:#4a4a6a;font-size:9.5px;font-weight:600;cursor:pointer;
  font-family:inherit;letter-spacing:.04em;margin-top:8px;
}
.see-all:hover{background:rgba(255,255,255,.07);color:#7a6e9a}

#cost-area{padding:12px 16px}
#cost-chart{width:100%;height:44px;border-radius:3px}
.cost-row{display:flex;justify-content:space-between;align-items:center;margin-top:5px}

/* ── Bottom Ticker ── */
#ticker{
  position:fixed;bottom:0;left:0;right:0;height:34px;
  background:rgba(6,4,14,.9);border-top:1px solid rgba(255,255,255,.05);
  display:flex;align-items:center;overflow:hidden;z-index:200;
}
.tlbl{padding:0 10px;font-size:7px;font-weight:900;letter-spacing:.1em;color:#c9a84c;white-space:nowrap;border-right:1px solid rgba(255,255,255,.05);text-transform:uppercase}
.tinn{display:flex;animation:scroll-t 52s linear infinite;white-space:nowrap}
@keyframes scroll-t{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tev{display:inline-flex;align-items:center;gap:5px;padding:0 20px;font-size:8.5px;color:#3a3a5a}
.tdot{width:3px;height:3px;border-radius:50%}

/* Modal */
#modal{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center}
#modal.open{display:flex}
.mbox{background:#0a0818;border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:20px;width:340px}
</style>
</head>
<body>

<div id="office">
  <img id="bg" src="/sprites/bg-office.png" />
  <div id="chars-layer"></div>
</div>

<div id="topbar">
  <div class="pip"></div>
  <div class="logo"><span>FACTOR</span>HUB</div>
  <div class="bdg b-g">Sistema Online</div>
  <span id="mission-lbl">Aguardando missão</span>
  <div id="clk">--:--:--</div>
</div>

<div id="panel">
  <div class="psec" id="agents-sec">
    <div class="ptitle">Squad Ativo</div>
    <div id="agent-list"></div>
  </div>
  <div id="panel-body">
    <div style="padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.06)">
      <div class="ptitle">Missões</div>
      <div id="mission-list">
        <div style="font-size:10px;color:#2a2848;text-align:center;padding:16px 0">Nenhuma missão ativa</div>
      </div>
      <button class="see-all" onclick="window.open('/dashboard/missoes','_top')">Ver todas as missões →</button>
    </div>
    <div id="cost-area">
      <div class="ptitle">Consumo IA — 14 dias</div>
      <canvas id="cost-chart" width="248" height="44"></canvas>
      <div class="cost-row">
        <span style="font-size:8.5px;color:#3a3a5a">Total acumulado</span>
        <span id="total-cost" style="font-size:10px;font-weight:700;color:#c9a84c;font-family:'Courier New',monospace">$0.0000</span>
      </div>
    </div>
  </div>
</div>

<div id="ticker">
  <div class="tlbl">Atividade</div>
  <div style="flex:1;overflow:hidden"><div class="tinn" id="tinn"></div></div>
</div>

<div id="modal" onclick="if(event.target===this)closeModal()">
  <div class="mbox" id="modal-content"></div>
</div>

<script>
// ─── Agent definitions ────────────────────────────────────────────────────────
const AGENTS = [
  {id:'CEO',name:'CEO Estratégico',role:'Decisões estratégicas',layer:'C1',color:'#e8622a',sprite:'char-purple',init:'CE',
   pos:{l:17,t:33}},   // Strategy Room — desk esquerda
  {id:'COO',name:'COO',role:'Operações e eficiência',layer:'C1',color:'#f59e0b',sprite:'char-blue',init:'CO',
   pos:{l:24,t:27}},   // Strategy Room — desk direita
  {id:'CFO',name:'CFO',role:'Viabilidade financeira',layer:'C1',color:'#6366f1',sprite:'char-dark',init:'CF',
   pos:{l:22,t:47}},   // Growth Room
  {id:'CTO',name:'CTO Arquitetura',role:'Decisões técnicas',layer:'C1',color:'#10b981',sprite:'char-green',init:'CT',
   pos:{l:49,t:23}},   // Tech Room
  {id:'CMO',name:'CMO Growth',role:'Marketing e aquisição',layer:'C1',color:'#ec4899',sprite:'char-black',init:'CM',
   pos:{l:35,t:45}},   // Meeting Room
  {id:'CA',name:'Chief of Staff',role:'Síntese executiva',layer:'CA',color:'#c9a84c',sprite:'char-orange',init:'CA',
   pos:{l:7,t:45}},    // Recepção
  {id:'SI',name:'Strategic Intel',role:'Inteligência estratégica',layer:'C2',color:'#7c3aed',sprite:'char-pink',init:'SI',
   pos:{l:66,t:33}},   // Kitchen
]

// ─── Sprite sheet geometry ────────────────────────────────────────────────────
// Sheet: 1536 × 1024 — 7 cols × 4 rows — frame: 219.4 × 256
// Display: 80 × 96 — scale = 80/219.4 = 0.365
// background-size at display scale: 1536*0.365 = 560.6 × 1024*0.365 = 373.8
// Frame x-step at display scale: 219.4*0.365 ≈ 80px
// Row y-offset at display scale: 256*0.365 ≈ 93.4 ≈ 93px

const SPRITE_COLS = 7
const SPRITE_ROWS = 4
const DISP_W = 80   // display width per frame
const DISP_H = 96   // display height per frame
const SHEET_DISP_W = SPRITE_COLS * DISP_W   // 560
const SHEET_DISP_H = SPRITE_ROWS * DISP_H   // 384

// Row indices
const ROW = { idle: 0, walk: 1, sit: 2, think: 3 }

// State per agent
const STATE = {}
AGENTS.forEach(a => {
  STATE[a.id] = { status: 'sit', task: 'Disponível', el: null }
})

// ─── Remove white bg from sprite image via canvas ─────────────────────────────
const processedSprites = {}

function processSprite(name) {
  return new Promise(resolve => {
    if (processedSprites[name]) { resolve(processedSprites[name]); return }
    const img = new Image()
    img.onload = () => {
      const cvs = document.createElement('canvas')
      cvs.width = img.naturalWidth
      cvs.height = img.naturalHeight
      const ctx = cvs.getContext('2d', {willReadFrequently:true})
      ctx.drawImage(img, 0, 0)
      const d = ctx.getImageData(0, 0, cvs.width, cvs.height)
      for (let i = 0; i < d.data.length; i += 4) {
        const r=d.data[i], g=d.data[i+1], b=d.data[i+2]
        // Make near-white pixels transparent
        if (r > 210 && g > 210 && b > 210) d.data[i+3] = 0
      }
      ctx.putImageData(d, 0, 0)
      const url = cvs.toDataURL('image/png')
      processedSprites[name] = url
      resolve(url)
    }
    img.onerror = () => resolve(null)
    img.src = `/sprites/${name}.png`
  })
}

// ─── Build characters ─────────────────────────────────────────────────────────
async function buildChars() {
  const layer = document.getElementById('chars-layer')
  layer.innerHTML = ''

  for (const a of AGENTS) {
    const url = await processSprite(a.sprite)
    const s = STATE[a.id]

    const wrap = document.createElement('div')
    wrap.className = 'char-wrap'
    wrap.id = `char-${a.id}`
    wrap.style.left = a.pos.l + '%'
    wrap.style.top  = a.pos.t + '%'
    wrap.setAttribute('data-id', a.id)

    // Sprite div
    const sprite = document.createElement('div')
    sprite.className = 'char-sprite state-sit'
    sprite.style.backgroundImage = url ? `url('${url}')` : 'none'
    sprite.style.backgroundSize  = `${SHEET_DISP_W}px ${SHEET_DISP_H}px`
    sprite.style.backgroundPositionY = `-${ROW.sit * DISP_H}px`
    sprite.style.setProperty('--f0', '0px')
    sprite.style.setProperty('--f1', `-${DISP_W}px`)
    sprite.style.setProperty('--f2', `-${DISP_W * 2}px`)
    sprite.style.setProperty('--f3', `-${DISP_W * 3}px`)

    // Label
    const lbl = document.createElement('div')
    lbl.className = 'char-label'
    lbl.textContent = a.id
    lbl.style.background = a.color + '22'
    lbl.style.color = a.color
    lbl.style.border = `1px solid ${a.color}40`

    // Bubble
    const bubble = document.createElement('div')
    bubble.className = 'char-bubble'
    bubble.textContent = s.task

    // Working dot
    const dot = document.createElement('div')
    dot.className = 'working-dot'

    wrap.appendChild(sprite)
    wrap.appendChild(lbl)
    wrap.appendChild(bubble)
    wrap.appendChild(dot)
    wrap.addEventListener('click', () => openModal(a.id))

    layer.appendChild(wrap)
    s.el = wrap
    s.sprite = sprite
  }

  renderAgentList()
}

// ─── Agent state updates ──────────────────────────────────────────────────────
function setAgent(id, status, task) {
  const s = STATE[id]
  if (!s) return
  s.status = status
  if (task) s.task = task

  if (!s.el) return
  const sprite = s.sprite
  const wrap = s.el

  // Set animation row
  const rowY = ROW[status] !== undefined ? ROW[status] : ROW.sit
  if (sprite) {
    sprite.className = `char-sprite state-${status}`
    sprite.style.backgroundPositionY = `-${rowY * DISP_H}px`
  }

  // Active styling
  if (status === 'think' || status === 'sit') {
    wrap.classList.add('working')
  } else {
    wrap.classList.remove('working')
  }

  // Update bubble
  const bubble = wrap.querySelector('.char-bubble')
  if (bubble) bubble.textContent = s.task

  renderAgentList()
}

// ─── Agent list panel ─────────────────────────────────────────────────────────
function renderAgentList() {
  const el = document.getElementById('agent-list')
  if (!el) return
  el.innerHTML = AGENTS.map(a => {
    const s = STATE[a.id]
    const working = s.status === 'sit' || s.status === 'think'
    const statusClass = working ? 's-busy' : 's-online'
    const statusLabel = working ? 'ATIVO' : 'ONLINE'
    return `
    <div class="arow" onclick="openModal('${a.id}')">
      <div class="aav" style="background:${a.color}18;border-color:${a.color}50;color:${a.color}">${a.init}</div>
      <div class="ainfo">
        <div class="aname">${a.name}</div>
        <div class="arole">${a.role}</div>
      </div>
      <div class="a-status ${statusClass}">${statusLabel}</div>
    </div>`
  }).join('')
}

// ─── Missions ─────────────────────────────────────────────────────────────────
function renderMissions(list) {
  const el = document.getElementById('mission-list')
  const lbl = document.getElementById('mission-lbl')
  if (!list?.length) {
    el.innerHTML = '<div style="font-size:10px;color:#2a2848;text-align:center;padding:16px 0">Nenhuma missão ativa</div>'
    lbl.textContent = 'Aguardando missão'
    return
  }
  const running = list.filter(m=>m.status==='running')
  lbl.textContent = `${running.length} missão${running.length!==1?'ões':''} ativa${running.length!==1?'s':''}`
  el.innerHTML = list.map(m => {
    const c = m.status==='running'?'#f59e0b':m.status==='approved'?'#22c55e':'#4a4a6a'
    const pct = Math.round((m.agents_done||0)/(m.agents_total||1)*100)
    return `<div class="mrow" style="border-color:${c}20">
      <div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">
        <span style="font-size:7.5px;font-weight:800;padding:1px 5px;border-radius:2px;background:${c}18;color:${c}">${m.level}</span>
        <span style="font-size:7.5px;color:#3a3a5a">${m.agents_done||0}/${m.agents_total||'?'}</span>
      </div>
      <div class="mname">${m.title||'Missão'}</div>
      <div class="mpb"><div class="mpbf" style="width:${pct}%;background:${c}"></div></div>
    </div>`
  }).join('')
}

// ─── Cost chart ───────────────────────────────────────────────────────────────
function renderChart(data) {
  const cv = document.getElementById('cost-chart')
  const ctx = cv.getContext('2d')
  const w=cv.width, h=cv.height
  ctx.clearRect(0,0,w,h)
  if (!data?.length) return
  const mx = Math.max(...data, 0.0001)
  const step = w/(data.length-1||1)
  ctx.beginPath()
  data.forEach((v,i)=>{
    const x=i*step, y=h-(v/mx)*(h-4)-2
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)
  })
  ctx.strokeStyle='#c9a84c';ctx.lineWidth=1.5;ctx.stroke()
  ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath()
  ctx.fillStyle='rgba(201,168,76,.07)';ctx.fill()
}

// ─── Ticker ───────────────────────────────────────────────────────────────────
let tickLog = []
function renderTicker() {
  const items = tickLog.length ? tickLog : [
    {c:'#22c55e',t:'Sistema online — 7 agentes ativos'},
    {c:'#c9a84c',t:'Aguardando missão do fundador'},
    {c:'#6366f1',t:'Cérebro corporativo carregado'},
    {c:'#10b981',t:'CTO na sala de tecnologia'},
    {c:'#f59e0b',t:'COO alinhando operações'},
    {c:'#e8622a',t:'CEO pronto para nova missão'},
  ]
  const html = [...items,...items].map(e=>`<span class="tev"><span class="tdot" style="background:${e.c}"></span>${e.t}</span>`).join('')
  const el = document.getElementById('tinn')
  if(el) el.innerHTML = html
}

function pushTick(agentId, text) {
  const a = AGENTS.find(a=>a.id===agentId)
  tickLog.unshift({c:a?.color||'#c9a84c', t:`[${agentId}] ${text}`})
  if(tickLog.length>10) tickLog.pop()
  renderTicker()
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function openModal(id) {
  const a = AGENTS.find(a=>a.id===id)
  const s = STATE[id]
  if(!a) return
  const statusMap = {sit:'Trabalhando',idle:'Disponível',think:'Analisando',walk:'Caminhando'}
  const statusColor = s.status==='sit'||s.status==='think'?'#22c55e':'#4a4a6a'
  document.getElementById('modal-content').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <div style="width:48px;height:48px;border-radius:12px;background:${a.color}20;border:2px solid ${a.color}50;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:${a.color};flex-shrink:0">${a.init}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:800;color:#f0f0f0">${a.name}</div>
        <div style="font-size:10px;color:#7a6e9a;margin-top:2px">${a.role}</div>
        <div style="display:flex;align-items:center;gap:4px;margin-top:4px">
          <div style="width:5px;height:5px;border-radius:50%;background:${statusColor}"></div>
          <span style="font-size:9px;color:${statusColor};font-weight:600">${statusMap[s.status]||s.status}</span>
        </div>
      </div>
      <button onclick="closeModal()" style="background:none;border:none;color:#4a4a6a;font-size:16px;cursor:pointer;flex-shrink:0">×</button>
    </div>
    <div style="font-size:8px;color:#4a4a6a;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px">Task atual</div>
    <div style="font-size:11px;color:#c4b8e0;line-height:1.6;padding:9px;background:rgba(0,0,0,.4);border-radius:7px;border:1px solid rgba(255,255,255,.05)">${s.task}</div>
  `
  document.getElementById('modal').classList.add('open')
}
function closeModal(){document.getElementById('modal').classList.remove('open')}

// ─── Clock ────────────────────────────────────────────────────────────────────
setInterval(()=>{
  const el=document.getElementById('clk')
  if(el) el.textContent=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})
},1000)
document.getElementById('clk').textContent=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})

// ─── Live simulation (task cycling, no walking) ───────────────────────────────
const SIM = {
  CEO:['A autonomia define o nosso sucesso.','Validando nova missão N4.','Oportunidade identificada — executar.'],
  COO:['Sprint atualizado. Dependências ok.','Alinhando times para Q3.','Processos otimizados.'],
  CFO:['CAC validado. Margem 68%.','Análise financeira Q3 concluída.','Projeção de receita revisada.'],
  CTO:['Deploy de nova feature em prod.','Revisando arquitetura de microserviços.','Zero bugs críticos.'],
  CMO:['ROAS 3.2x alcançado este mês.','Nova campanha Q3 aprovada.','Leads: 50/semana no funil.'],
  CA:['Briefing executivo enviado.','Coordenando missão N4.','Report semanal para o founder.'],
  SI:['Inteligência de mercado atualizada.','Análise competitiva concluída.','Tendências Q3 mapeadas.'],
}

function simTick() {
  const ids = Object.keys(STATE)
  const id = ids[Math.floor(Math.random()*ids.length)]
  const tasks = SIM[id]||['Em execução']
  const task = tasks[Math.floor(Math.random()*tasks.length)]
  const roll = Math.random()

  if (roll < 0.2) {
    setAgent(id, 'think', task)
    pushTick(id, task)
  } else {
    setAgent(id, 'sit', task)
    if (Math.random() < 0.3) pushTick(id, task)
  }

  setTimeout(simTick, 6000 + Math.random()*9000)
}

// ─── Parent frame data ────────────────────────────────────────────────────────
window.addEventListener('message', e => {
  const d = e.data
  if (!d || d.type !== 'factorhub-live-data') return
  if (d.missions) renderMissions(d.missions)
  if (d.usage) {
    const costs = d.usage.slice(-14).map(u=>Number(u.custo_usd||0))
    renderChart(costs)
    const total = d.usage.reduce((s,u)=>s+Number(u.custo_usd||0),0)
    const el=document.getElementById('total-cost')
    if(el) el.textContent='$'+total.toFixed(4)
  }
  if (d.agentStatuses) {
    Object.entries(d.agentStatuses).forEach(([id,info])=>{
      setAgent(id, info.status||'sit', info.task)
    })
  }
})

// ─── Init ─────────────────────────────────────────────────────────────────────
renderChart([0,0.002,0.001,0.005,0.003,0.009,0.006,0.014,0.008,0.018,0.012,0.024,0.016,0.028])
renderMissions([])
renderTicker()
buildChars().then(()=>{
  // Everyone starts sitting and working
  AGENTS.forEach(a=>{
    const tasks = SIM[a.id]
    setAgent(a.id,'sit',tasks[0])
    pushTick(a.id, tasks[0])
  })
  setTimeout(simTick, 4000)
})
</script>
