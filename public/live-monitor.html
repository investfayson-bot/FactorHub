<style>

.mtk{font-size:11px;font-weight:600;color:#d0d0f0;margin-bottom:6px}
.mpr{height:3px;background:#14122a;border-radius:2px}

.mhi{display:flex;align-items:center;gap:6px;padding:5px 0;border-top:1px solid #1a1535}
.mhidot{width:5px;height:5px;border-radius:50%;background:#2a2848;flex-shrink:0}
.mhitxt{font-size:9px;color:#5c5c80}

<script>
// FACTORHUB LIVE MONITOR v4 — Pure Canvas 2D HD, No Dependencies
// TODO: Connect Supabase:
// supabase.channel('live').on('postgres_changes',{event:'*',schema:'public',table:'missions'},cb).subscribe()
const AGENTS=[
  {id:'CEO',name:'CEO Estratégico',role:'Líder Estratégico',cloth:'#3d2a60',hair:'#111111',skin:'#c8956c',hs:'straight',room:'strategy',di:0,status:'working',task:'Validando missão Vigano',prog:72,hist:['Revisão Q2 concluída','Sprint 12 validado','Plano expansão aprovado']},
  {id:'CFO',name:'CFO',role:'Financeiro',cloth:'#1a3a6a',hair:'#5a3a1a',skin:'#f0d0a8',hs:'wavy',room:'strategy',di:1,status:'online',task:'Aguardando análise',prog:0,hist:['Relatório Q2 gerado','CAC validado','Margem 68% ok']},
  {id:'COO',name:'COO',role:'Operações',cloth:'#2a2a3a',hair:'#1a1a1a',skin:'#7a4a2a',hs:'bald',room:'strategy',di:2,status:'online',task:'Alinhando processos',prog:20,hist:['Sprint atualizado','Dependências mapeadas','Times coordenados']},
  {id:'CMO',name:'CMO',role:'Marketing',cloth:'#1a4a1a',hair:'#0a0a0a',skin:'#c8956c',hs:'afro',room:'growth',di:0,status:'working',task:'Nova campanha Q3',prog:80,hist:['ROAS 3.2x alcançado','Meta leads: 50','Campanha aprovada']},
  {id:'CTO',name:'CTO',role:'Tecnologia',cloth:'#0f0f18',hair:'#111118',skin:'#f0d0a8',hs:'messy',room:'tech',di:0,status:'working',task:'Deploy FactorOS v0.2',prog:85,hist:['Build v0.2 pronto','Zero bugs críticos','CI/CD configurado']},
  {id:'CW',name:'Copywriter',role:'Copy & Content',cloth:'#c0406a',hair:'#f9a8d4',skin:'#f5ddb8',hs:'long',room:'growth',di:1,status:'working',task:'Copy IG Nova Lima',prog:45,hist:['Script Reels pronto','Headlines testadas','Copy entregue']},
  {id:'CA',name:'Chief of Staff',role:'Chief of Staff',cloth:'#e8622a',hair:'#0a0a0a',skin:'#5a2a0a',hs:'afro-short',room:'reception',di:0,status:'online',task:'Coordenando agenda',prog:30,hist:['Briefing enviado','Agenda atualizada','Missão coordenada']},
]
const SPEECH={CEO:['Validando risco da missão','Oportunidade identificada','Aprovando plano N2'],CFO:['Viabilidade confirmada','CAC ok','Margem 68% aprovada'],COO:['Sprint atualizado','Dependências ok','Time alinhado'],CMO:['ROAS 3.2x alcançado','Campanha pronta','Leads: 50/semana'],CTO:['Build concluído','Deploy em prod','Zero bugs'],CW:['Copy entregue','Headlines aprovadas','Script ok'],CA:['Briefing enviado','Agenda atualizada','Squad ok']}
const TASKS={CEO:['Validando missão Vigano','Revisão Q3','Aprovando expansão'],CFO:['Análise financeira Q3','Projeção de receita','Revisão de margem'],COO:['Sprint planning','Mapeando deps','Review OKRs'],CMO:['Nova campanha Q3','ROAS optimization','Funil de conversão'],CTO:['Deploy FactorOS v0.2','Code review PR #42','Infra scaling'],CW:['Copy IG Nova Lima','Script Reels Q3','Email sequence'],CA:['Coordenando agenda','Briefing missão','Report semanal']}
const MISSIONS=[{name:'Análise de Mercado',level:'N2',color:'#e8622a',prog:72},{name:'Processo Financeiro',level:'N3',color:'#5b9bd5',prog:35},{name:'Campanha Q3 Ativa',level:'N1',color:'#4ade80',prog:80}]
const CHARTS=[{label:'Crescimento',val:78,color:'#4ade80'},{label:'Conversões',val:61,color:'#e8622a'},{label:'Campanhas',val:45,color:'#5b9bd5'}]

// HD Canvas
const canvas=document.getElementById('cv'),ctx=canvas.getContext('2d',{alpha:true})
let DPR=1,CW=1,CH=1
function resize(){
  CW=window.innerWidth-200; CH=window.innerHeight-80
  DPR=Math.min(window.devicePixelRatio||1,3)
  canvas.width=Math.round(CW*DPR); canvas.height=Math.round(CH*DPR)
  canvas.style.width=CW+'px'; canvas.style.height=CH+'px'
  canvas.style.top='44px'; canvas.style.left='0'
  ctx.setTransform(DPR,0,0,DPR,0,0)
  ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high'
}
resize(); window.addEventListener('resize',resize)

// ISO
const TW=96,TH=48,WH=54
function iso(gx,gy){return{x:CW/2+(gx-gy)*TW/2,y:CH*.36+(gx+gy)*TH/2}}

// Floors
function tile(gx,gy,c){
  const{x,y}=iso(gx,gy),hw=TW/2,hh=TH/2
  ctx.beginPath();ctx.moveTo(x,y-hh);ctx.lineTo(x+hw,y);ctx.lineTo(x,y+hh);ctx.lineTo(x-hw,y);ctx.closePath()
  ctx.fillStyle=c;ctx.fill()
  ctx.save();ctx.clip()
  for(let i=-1;i<=5;i++){
    ctx.beginPath();ctx.moveTo(x-hw,(y-hh)+i*(TH/4)+hh*.5);ctx.lineTo(x+hw,(y-hh)+i*(TH/4)-hh*.5)
    ctx.strokeStyle=i%2===0?'rgba(0,0,0,0.15)':'rgba(255,255,255,0.023)';ctx.lineWidth=1.1;ctx.stroke()
  }
  ctx.restore()
}

// Walls
function walls(gx,gy,w,h,cr,cl,ct){
  cr=cr||'#0e0c1e'; cl=cl||'#120f28'; ct=ct||'#181430'
  for(let x=gx;x<gx+w;x++){
    const p=iso(x,gy),hw=TW/2,hh=TH/2
    ctx.beginPath();ctx.moveTo(p.x,p.y-hh-WH);ctx.lineTo(p.x+hw,p.y-WH);ctx.lineTo(p.x,p.y+hh-WH);ctx.lineTo(p.x-hw,p.y-WH);ctx.closePath();ctx.fillStyle=ct;ctx.fill()
    ctx.beginPath();ctx.moveTo(p.x,p.y+hh-WH);ctx.lineTo(p.x+hw,p.y-WH);ctx.lineTo(p.x+hw,p.y);ctx.lineTo(p.x,p.y+hh);ctx.closePath();ctx.fillStyle=cr;ctx.fill()
  }
  for(let y=gy;y<gy+h;y++){
    const p=iso(gx,y),hw=TW/2,hh=TH/2
    ctx.beginPath();ctx.moveTo(p.x-hw,p.y-WH);ctx.lineTo(p.x,p.y+hh-WH);ctx.lineTo(p.x,p.y+hh);ctx.lineTo(p.x-hw,p.y);ctx.closePath();ctx.fillStyle=cl;ctx.fill()
  }
}

// Desk
function desk(gx,gy,mc){
  const{x,y}=iso(gx,gy),hw=TW/2*.78,hh=TH/2*.78,dH=20
  ctx.beginPath();ctx.moveTo(x,y-hh);ctx.lineTo(x+hw,y);ctx.lineTo(x,y+hh);ctx.lineTo(x-hw,y);ctx.closePath()
  const tg=ctx.createLinearGradient(x-hw,y,x+hw,y);tg.addColorStop(0,'#352818');tg.addColorStop(1,'#261c0c');ctx.fillStyle=tg;ctx.fill()
  ctx.beginPath();ctx.moveTo(x-hw,y);ctx.lineTo(x,y+hh);ctx.lineTo(x,y+hh+dH);ctx.lineTo(x-hw,y+dH);ctx.closePath();ctx.fillStyle='#1a1208';ctx.fill()
  ctx.beginPath();ctx.moveTo(x,y+hh);ctx.lineTo(x+hw,y);ctx.lineTo(x+hw,y+dH);ctx.lineTo(x,y+hh+dH);ctx.closePath();ctx.fillStyle='#201610';ctx.fill()
  ctx.fillStyle='#1a1a22';ctx.fillRect(x-3,y-hh-26,6,26);ctx.fillRect(x-10,y-hh-2,20,4)
  ctx.fillStyle='#0d0d18';ctx.beginPath();ctx.roundRect(x-26,y-hh-58,52,34,3);ctx.fill()
  ctx.strokeStyle='#2a2a3a';ctx.lineWidth=1;ctx.stroke()
  ctx.shadowColor=mc;ctx.shadowBlur=14;ctx.fillStyle=mc+'28';ctx.fillRect(x-22,y-hh-54,44,28);ctx.shadowBlur=0
  ctx.fillStyle=mc+'cc';for(let i=0;i<4;i++)ctx.fillRect(x-18+(i%2)*6,y-hh-51+i*6,8+Math.random()*16,1.5)
  ctx.fillStyle='#181820';ctx.beginPath();ctx.roundRect(x-18,y-hh+2,36,10,2);ctx.fill()
  ctx.strokeStyle='#2a1e08';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x+16,y-hh+8);ctx.lineTo(x+16,y-hh-28);ctx.stroke()
  ctx.fillStyle='#c8882a';ctx.shadowColor='#c8882a';ctx.shadowBlur=6
  ctx.beginPath();ctx.ellipse(x+16,y-hh-28,9,4,0,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0
  const lg=ctx.createRadialGradient(x+16,y-hh,0,x+16,y-hh,30);lg.addColorStop(0,'rgba(200,136,42,0.13)');lg.addColorStop(1,'rgba(200,136,42,0)')
  ctx.fillStyle=lg;ctx.beginPath();ctx.ellipse(x+16,y-hh,30,18,0,0,Math.PI*2);ctx.fill()
}

function dualDesk(gx,gy){
  const{x,y}=iso(gx,gy),hw=TW/2*1.2,hh=TH/2*.78,dH=20,mc='#22c55e'
  ctx.beginPath();ctx.moveTo(x,y-hh);ctx.lineTo(x+hw,y);ctx.lineTo(x,y+hh);ctx.lineTo(x-hw,y);ctx.closePath();ctx.fillStyle='#2e2010';ctx.fill()
  ctx.beginPath();ctx.moveTo(x-hw,y);ctx.lineTo(x,y+hh);ctx.lineTo(x,y+hh+dH);ctx.lineTo(x-hw,y+dH);ctx.closePath();ctx.fillStyle='#1a1208';ctx.fill()
  ctx.beginPath();ctx.moveTo(x,y+hh);ctx.lineTo(x+hw,y);ctx.lineTo(x+hw,y+dH);ctx.lineTo(x,y+hh+dH);ctx.closePath();ctx.fillStyle='#201610';ctx.fill()
  for(let mi=0;mi<2;mi++){
    const mx=x-26+mi*52
    ctx.fillStyle='#1a1a22';ctx.fillRect(mx+10,y-hh-26,5,24);ctx.fillRect(mx+1,y-hh-4,22,4)
    ctx.fillStyle='#0d0d18';ctx.beginPath();ctx.roundRect(mx,y-hh-54,24,30,2);ctx.fill()
    ctx.shadowColor=mc;ctx.shadowBlur=12;ctx.fillStyle=mc+'22';ctx.fillRect(mx+2,y-hh-52,20,26);ctx.shadowBlur=0
    ctx.fillStyle=mc+'cc';for(let li=0;li<3;li++)ctx.fillRect(mx+3,y-hh-49+li*8,6+Math.random()*8,1.5)
  }
}

function lamp(gx,gy,dx,dy){
  const p=iso(gx,gy),px=p.x+(dx||0),py=p.y+(dy||0)
  const g=ctx.createRadialGradient(px,py+4,0,px,py+4,65);g.addColorStop(0,'rgba(200,136,42,0.22)');g.addColorStop(.5,'rgba(200,136,42,0.07)');g.addColorStop(1,'rgba(200,136,42,0)')
  ctx.beginPath();ctx.ellipse(px,py+4,65,36,0,0,Math.PI*2);ctx.fillStyle=g;ctx.fill()
  ctx.strokeStyle='#2a1e08';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px,py-58);ctx.stroke()
  ctx.fillStyle='#c8882a';ctx.shadowColor='#c8882a';ctx.shadowBlur=10
  ctx.beginPath();ctx.ellipse(px,py-58,13,5,0,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0
  ctx.fillStyle='rgba(255,230,140,0.7)';ctx.beginPath();ctx.ellipse(px,py-58,5,2,0,0,Math.PI*2);ctx.fill()
}

function plant(px,py,s){
  s=s||1
  ctx.fillStyle='#281808';ctx.beginPath();ctx.roundRect(px-7*s,py-2*s,14*s,12*s,2);ctx.fill()
  ctx.fillStyle='#0d2d0d';ctx.beginPath();ctx.arc(px,py-10*s,11*s,0,Math.PI*2);ctx.fill()
  ctx.fillStyle='#1a4a1a';ctx.beginPath();ctx.arc(px-9*s,py-6*s,7*s,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(px+9*s,py-6*s,7*s,0,Math.PI*2);ctx.fill()
  ctx.fillStyle='#2a6a2a';ctx.beginPath();ctx.arc(px,py-17*s,6*s,0,Math.PI*2);ctx.fill()
}

function label(gx,gy,text,col){
  const{x,y}=iso(gx,gy);ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';ctx.font='bold 9px "Courier New"'
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillText(text,x+1,y-WH-14+1)
  ctx.fillStyle=col||'rgba(255,255,255,0.55)';ctx.fillText(text,x,y-WH-14);ctx.restore()
}

function kanban(px,py){
  ctx.fillStyle='#090814';ctx.strokeStyle='#1e1c36';ctx.lineWidth=1
  ctx.beginPath();ctx.roundRect(px-78,py-64,156,64,4);ctx.fill();ctx.stroke()
  const cols=['TODO','WIP','REV','DONE'],cc=['#fbbf24','#60a5fa','#f472b6','#4ade80'],cw=34
  const pc=['#fbbf24','#f472b6','#60a5fa','#4ade80','#fb923c','#a78bfa']
  cols.forEach((c,ci)=>{
    const cx=px-72+ci*(cw+2)
    ctx.fillStyle=cc[ci]+'28';ctx.fillRect(cx,py-62,cw,10)
    ctx.fillStyle=cc[ci];ctx.font='bold 6px "Courier New"';ctx.textAlign='center';ctx.fillText(c,cx+cw/2,py-56)
    for(let pi=0;pi<2+ci;pi++){if(py-50+pi*13>py-2)break;ctx.fillStyle=pc[(ci*3+pi)%pc.length]+'cc';ctx.beginPath();ctx.roundRect(cx+1,py-50+pi*13,cw-2,11,1);ctx.fill()}
  })
}

function worldMap(px,py){

// Draw agent
function drawAgent(ag,fi){
  const{x,y}=apos(ag),S=2.1,ft=ag.status==='working'?'type':'idle'
  const bob=ft==='idle'&&fi%2===1?1:0,arm=ft==='type'?2:0,cy=y+bob
  ctx.fillStyle='rgba(0,0,0,0.2)';ctx.beginPath();ctx.ellipse(x,cy+S,6.5*S,2*S,0,0,Math.PI*2);ctx.fill()

  ctx.fillStyle='#111111';ctx.beginPath();ctx.roundRect(x-3.2*S,cy-5.5*S,2.8*S,4.5*S,.5);ctx.fill();ctx.beginPath();ctx.roundRect(x+.4*S,cy-5.5*S,2.8*S,4.5*S,.5);ctx.fill()
  ctx.fillStyle=ag.cloth;ctx.beginPath();ctx.roundRect(x-3.5*S,cy-13.5*S,7*S,8*S,1.2);ctx.fill()
  const bg=ctx.createLinearGradient(x-3.5*S,cy-13.5*S,x+3.5*S,cy-5.5*S);bg.addColorStop(0,'rgba(255,255,255,0.07)');bg.addColorStop(1,'rgba(0,0,0,0.1)')
  ctx.fillStyle=bg;ctx.beginPath();ctx.roundRect(x-3.5*S,cy-13.5*S,7*S,8*S,1.2);ctx.fill()
  ctx.fillStyle='rgba(255,255,255,0.10)';ctx.fillRect(x-.8*S,cy-13.5*S,1.6*S,3.5*S)
  ctx.fillStyle=ag.cloth;ctx.beginPath();ctx.roundRect(x-5.5*S,cy-12.5*S,2.8*S,5.5*S+arm,.8);ctx.fill();ctx.beginPath();ctx.roundRect(x+2.8*S,cy-12.5*S,2.8*S,5.5*S+arm,.8);ctx.fill()
  ctx.fillStyle=ag.skin;ctx.fillRect(x-1*S,cy-14.5*S,2*S,1.8*S)
  ctx.fillStyle=ag.skin;ctx.beginPath();ctx.roundRect(x-3.5*S,cy-22.5*S,7*S,8.5*S,1.8);ctx.fill()
  const hg=ctx.createLinearGradient(x-3.5*S,cy-22.5*S,x+3.5*S,cy-14*S);hg.addColorStop(0,'rgba(255,255,255,0.11)');hg.addColorStop(1,'rgba(0,0,0,0.05)')
  ctx.fillStyle=hg;ctx.beginPath();ctx.roundRect(x-3.5*S,cy-22.5*S,7*S,8.5*S,1.8);ctx.fill()
  ctx.fillStyle='#ffffff';ctx.fillRect(x-2.6*S,cy-18.8*S,2.2*S,1.6*S);ctx.fillRect(x+.4*S,cy-18.8*S,2.2*S,1.6*S)
  ctx.fillStyle='#000000';ctx.fillRect(x-2*S,cy-18.8*S,1.3*S,1.6*S);ctx.fillRect(x+1*S,cy-18.8*S,1.3*S,1.6*S)

  switch(ag.hs){
    case'straight':case'wavy':ctx.beginPath();ctx.roundRect(x-3.5*S,cy-24*S,7*S,3.5*S,1.8);ctx.fill();ctx.fillRect(x-3.5*S,cy-21.5*S,1.5*S,2*S);ctx.fillRect(x+2*S,cy-21.5*S,1.5*S,2*S);break
    case'afro':ctx.beginPath();ctx.arc(x,cy-21.5*S,5*S,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x-4*S,cy-19.5*S,3.2*S,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+4*S,cy-19.5*S,3.2*S,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x,cy-25.5*S,3*S,0,Math.PI*2);ctx.fill();break
    case'afro-short':ctx.beginPath();ctx.roundRect(x-3.5*S,cy-24.5*S,7*S,5*S,2.5);ctx.fill();ctx.beginPath();ctx.arc(x-2.5*S,cy-23*S,2.2*S,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+2.5*S,cy-23*S,2.2*S,0,Math.PI*2);ctx.fill();break
    case'messy':ctx.fillRect(x-3.5*S,cy-23.5*S,7*S,3.5*S);for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(x-3*S+i*1.5*S,cy-23.5*S);ctx.lineTo(x-2.5*S+i*1.5*S,cy-26.5*S);ctx.lineTo(x-2*S+i*1.5*S,cy-23.5*S);ctx.fill()}break
    case'long':ctx.beginPath();ctx.roundRect(x-3.5*S,cy-24*S,7*S,4*S,2);ctx.fill();ctx.beginPath();ctx.roundRect(x-5.2*S,cy-23*S,2.2*S,12.5*S,1);ctx.fill();ctx.beginPath();ctx.roundRect(x+3*S,cy-23*S,2.2*S,12.5*S,1);ctx.fill();break

// Speech bubbles
const bubbles=[]
function addBubble(ag,text){bubbles.push({ag,text:text.length>32?text.slice(0,32)+'…':text,life:0,max:210})}
function drawBubbles(){
  for(let i=bubbles.length-1;i>=0;i--){
    const b=bubbles[i];b.life++;let a=1;if(b.life<12)a=b.life/12;else if(b.life>b.max-20)a=(b.max-b.life)/20
    if(b.life>=b.max){bubbles.splice(i,1);continue}
    const{x,y}=apos(b.ag),bx=x,by=y-60,tw=b.text.length*5.2+18,th=22
    ctx.globalAlpha=a;ctx.fillStyle='#1a1828';ctx.strokeStyle='#2a2848';ctx.lineWidth=1
    ctx.beginPath();ctx.roundRect(bx-tw/2,by-th,tw,th,4);ctx.fill();ctx.stroke()
    ctx.beginPath();ctx.moveTo(bx-5,by);ctx.lineTo(bx+5,by);ctx.lineTo(bx,by+8);ctx.closePath();ctx.fill()
    ctx.fillStyle='#e0e0f0';ctx.font='8px "Courier New"';ctx.textAlign='center';ctx.textBaseline='middle'
    ctx.fillText(b.text,bx,by-th/2);ctx.globalAlpha=1
  }
}

// Render loop
let fi=0
function render(){
  fi++;drawOffice()
  const sorted=[...AGENTS].sort((a,b)=>apos(a).y-apos(b).y)
  sorted.forEach(ag=>drawAgent(ag,Math.floor(fi/10)%4))
  drawBubbles();requestAnimationFrame(render)
}

// HUD
function renderAll(){
  document.getElementById('alist').innerHTML=AGENTS.map(a=>{
    const dc=a.status==='working'?'sw':a.status==='online'?'so':'si',pc=a.status==='working'?'#e8622a':'#4ade80'
    return`<div class="ar" onclick="openModal('${a.id}')"><div class="aav" style="background:${a.cloth}20;border:1px solid ${a.cloth}50;color:${a.cloth}">${a.id}</div><div class="ai"><div class="an">${a.id}</div><div class="at2">${a.task||'Idle'}</div><div class="ap"><div class="apf" style="width:${a.prog}%;background:${pc}"></div></div></div><span class="sd ${dc}"></span></div>`
  }).join('')
  document.getElementById('cbars').innerHTML=CHARTS.map(c=>`<div class="cr"><span class="cl">${c.label}</span><div class="cb"><div class="cf" style="width:${c.val}%;background:${c.color}"></div></div><span class="cv2t">${c.val}%</span></div>`).join('')
  const cv2=document.getElementById('mchart'),cx2=cv2.getContext('2d'),w2=cv2.width,h2=cv2.height
  cx2.fillStyle='#0d0b1c';cx2.fillRect(0,0,w2,h2)
  const pts=[30,45,38,55,48,62,55,70,60,75,68,72],mx=Math.max(...pts),mn=Math.min(...pts)
  const no=v=>h2-3-((v-mn)/(mx-mn))*(h2-6),st=w2/(pts.length-1)
  cx2.beginPath();cx2.moveTo(0,no(pts[0]));pts.forEach((p,i)=>i>0&&cx2.lineTo(i*st,no(p)))
  cx2.strokeStyle='#e8622a';cx2.lineWidth=1.5;cx2.stroke();cx2.lineTo(w2,h2);cx2.lineTo(0,h2);cx2.closePath();cx2.fillStyle='rgba(232,98,42,0.08)';cx2.fill()
  document.getElementById('mlist').innerHTML=MISSIONS.map(m=>`<div class="mc2"><div class="mcn"><span style="background:${m.color}22;color:${m.color};font-size:7px;font-weight:800;padding:1px 5px;border-radius:3px;margin-right:4px">${m.level}</span>${m.name}</div><div class="mcp"><div class="mcf" style="width:${m.prog}%;background:${m.color}"></div></div></div>`).join('')
  document.getElementById('mcn').textContent=String(AGENTS.filter(a=>a.status==='working').length)
}

let tickLog=[]
function renderTicker(){
  const evs=tickLog.length>0?tickLog:[{color:'#4ade80',text:'Sistema iniciado — todos os agentes online',time:'--'},{color:'#e8622a',text:'CEO validando nova missão N2',time:'--'},{color:'#5b9bd5',text:'CFO revisando projeção financeira',time:'--'},{color:'#10b981',text:'CMO atualizando campanha Q3',time:'--'}]
  document.getElementById('tinn').innerHTML=[...evs,...evs].map(e=>`<span class="tev"><span class="tdot" style="background:${e.color}"></span>${e.text}<span class="ttm">${e.time}</span></span>`).join('')
}

function simTick(){
  const a=AGENTS[Math.floor(Math.random()*AGENTS.length)],s=['working','working','online','idle'][Math.floor(Math.random()*4)]
  a.status=s
  if(s==='working'){
    const tl=TASKS[a.id]||['Em execução'];a.task=tl[Math.floor(Math.random()*tl.length)]
    a.prog=Math.min(100,a.prog+5+Math.floor(Math.random()*15))
    if(a.prog>=100){a.prog=0;a.hist.unshift(a.task);if(a.hist.length>3)a.hist.pop()}
    const ml=SPEECH[a.id]||['Processando…'];addBubble(a,ml[Math.floor(Math.random()*ml.length)])
    const time=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})
    tickLog.unshift({color:a.cloth,text:`[${a.id}] ${a.task}`,time});if(tickLog.length>10)tickLog.pop();renderTicker()
  }else if(s==='idle'){a.task='';a.prog=0}
  renderAll();setTimeout(simTick,4000+Math.random()*4000)
}

function openModal(id){
  const a=AGENTS.find(x=>x.id===id);if(!a)return
  const av=document.getElementById('mavb');av.textContent=a.id;av.style.cssText=`background:${a.cloth}22;border:1px solid ${a.cloth}60;color:${a.cloth};width:56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;flex-shrink:0`
  document.getElementById('mname').textContent=a.name;document.getElementById('mrole').textContent=a.role
  document.getElementById('mtsk').textContent=a.task||'—'
  document.getElementById('mpf').style.width=a.prog+'%';document.getElementById('mpf').style.background=a.cloth
  document.getElementById('mhist').innerHTML=a.hist.map(h=>`<div class="mhi"><div class="mhidot"></div><span class="mhitxt">${h}</span></div>`).join('')
  document.getElementById('modal').classList.add('open')
}
function closeModal(){document.getElementById('modal').classList.remove('open')}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()})
setInterval(()=>document.getElementById('clock').textContent=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),1000)
document.getElementById('clock').textContent=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})
renderAll();renderTicker();requestAnimationFrame(render);setTimeout(simTick,3000)
</script>
