<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FactorHub OS — Live Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0b16; overflow: hidden; font-family: 'Courier New', monospace; width: 100vw; height: 100vh; }

    #phaser-container { position: fixed; inset: 0; }

    /* TOPBAR */
    #hud-top {
      position: fixed; top: 0; left: 0; right: 0; height: 44px; z-index: 100;
      background: #06040f; border-bottom: 1px solid #1a1728;
      display: flex; align-items: center; padding: 0 16px; gap: 16px;
    }
    .logo-text { font-size: 14px; font-weight: 800; letter-spacing: 0.12em; color: #f0f0f0; }
    .logo-accent { color: #e8622a; }
    .live-pip { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pip-glow 1.5s ease-in-out infinite; }
    @keyframes pip-glow { 0%,100%{box-shadow:0 0 4px #4ade80} 50%{box-shadow:0 0 12px #4ade80, 0 0 20px #4ade8066} }
    .online-badge { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: #4ade80; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; letter-spacing: 0.06em; }
    .hud-center { flex: 1; display: flex; justify-content: center; align-items: center; gap: 12px; }
    .missions-counter { background: rgba(232,98,42,0.1); border: 1px solid rgba(232,98,42,0.3); color: #e8622a; font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 6px; }
    .counter-badge { background: #e8622a; color: #fff; font-size: 10px; font-weight: 800; padding: 1px 6px; border-radius: 10px; margin-left: 6px; }
    .hud-right-top { display: flex; align-items: center; gap: 8px; }
    .ceo-avatar { width: 32px; height: 32px; border-radius: 6px; background: #3d2a60; border: 1px solid #6d4a90; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: #c9a0f0; }
    .ceo-info { font-size: 10px; color: #f0f0f0; font-weight: 700; }
    .ceo-sub { font-size: 9px; color: #5c5c7c; }

    /* RIGHT PANEL */
    #hud-right {
      position: fixed; top: 44px; right: 0; bottom: 36px; width: 200px; z-index: 100;
      background: #0d0b16; border-left: 1px solid #1a1728; overflow-y: auto;
    }
    .panel-section { padding: 12px; border-bottom: 1px solid #1a1728; }
    .panel-title { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #4c4c6c; margin-bottom: 10px; }
    .agent-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; cursor: pointer; padding: 6px; border-radius: 6px; transition: background 0.15s; }
    .agent-row:hover { background: rgba(255,255,255,0.04); }
    .agent-avatar { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; flex-shrink: 0; }
    .agent-info { flex: 1; min-width: 0; }
    .agent-name { font-size: 10px; font-weight: 700; color: #e0e0f0; }
    .agent-role { font-size: 8px; color: #5c5c7c; }
    .agent-task { font-size: 8px; color: #8888aa; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-working { background: #e8622a; box-shadow: 0 0 6px #e8622a88; }
    .dot-online { background: #4ade80; box-shadow: 0 0 6px #4ade8088; }
    .dot-idle { background: #3f3f5f; }
    .mini-progress { height: 2px; background: #1a1a2a; border-radius: 1px; margin-top: 3px; }
    .mini-progress-fill { height: 100%; border-radius: 1px; transition: width 0.5s; }

    /* Charts section */
    .chart-bar-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .chart-bar-label { font-size: 8px; color: #5c5c7c; width: 70px; text-align: right; }
    .chart-bar-track { flex: 1; height: 4px; background: #1a1a2a; border-radius: 2px; }
    .chart-bar-fill { height: 100%; border-radius: 2px; }
    .chart-value { font-size: 8px; color: #8888aa; width: 28px; text-align: right; }

    /* Missions section */
    .mission-card { background: #0f0d1c; border: 1px solid #1a1728; border-radius: 6px; padding: 8px; margin-bottom: 6px; cursor: pointer; }
    .mission-card:hover { border-color: #2a2848; }
    .mission-name { font-size: 9px; font-weight: 700; color: #e0e0f0; margin-bottom: 4px; }
    .mission-badge { display: inline-block; font-size: 7px; font-weight: 800; padding: 1px 5px; border-radius: 3px; margin-right: 4px; }
    .mission-progress-track { height: 3px; background: #1a1a2a; border-radius: 2px; margin-top: 4px; }
    .mission-progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
    .ver-todas-btn { width: 100%; padding: 6px; background: rgba(232,98,42,0.08); border: 1px solid rgba(232,98,42,0.2); border-radius: 6px; color: #e8622a; font-size: 9px; font-weight: 700; cursor: pointer; font-family: inherit; letter-spacing: 0.05em; }
    .ver-todas-btn:hover { background: rgba(232,98,42,0.15); }

    /* TICKER */
    #hud-ticker {
      position: fixed; bottom: 0; left: 0; right: 0; height: 36px; z-index: 100;
      background: #06040f; border-top: 1px solid #1a1728;
      display: flex; align-items: center; overflow: hidden;
    }
    .ticker-label { padding: 0 12px; font-size: 8px; font-weight: 800; letter-spacing: 0.1em; color: #e8622a; white-space: nowrap; border-right: 1px solid #1a1728; }
    .ticker-track { flex: 1; overflow: hidden; }
    .ticker-inner { display: flex; gap: 0; animation: ticker-scroll 60s linear infinite; white-space: nowrap; }
    @keyframes ticker-scroll { from{transform:translateX(0)} to{transform:translateX(-50%)} }
    .ticker-event { display: inline-flex; align-items: center; gap: 6px; padding: 0 24px; font-size: 10px; color: #8888aa; }
    .ticker-dot { width: 5px; height: 5px; border-radius: 50%; }
    .ticker-time { color: #4c4c6c; font-size: 9px; }

    /* AGENT MODAL */
    #agent-modal {
      position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center;
    }
    #agent-modal.open { display: flex; }
    .modal-card { background: #0d0b16; border: 1px solid #2a2848; border-radius: 12px; padding: 24px; width: 320px; }
    .modal-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .modal-avatar { width: 64px; height: 64px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800; }
    .modal-name { font-size: 16px; font-weight: 800; color: #f0f0f0; }
    .modal-role { font-size: 11px; color: #8888aa; margin-top: 2px; }
    .modal-close { margin-left: auto; background: none; border: none; color: #5c5c7c; cursor: pointer; font-size: 16px; }
    .modal-task-label { font-size: 9px; color: #5c5c7c; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .modal-task-text { font-size: 12px; font-weight: 600; color: #e0e0f0; margin-bottom: 8px; }
    .modal-progress { height: 4px; background: #1a1a2a; border-radius: 2px; }
    .modal-progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
    .modal-history { margin-top: 16px; }
    .modal-history-item { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 8px; }
    .modal-history-dot { width: 6px; height: 6px; border-radius: 50%; background: #2a2848; margin-top: 4px; flex-shrink: 0; }
    .modal-history-text { font-size: 10px; color: #5c5c7c; }

// ── CLOCK ───────────────────────────────────────────────────
function updateClock() {
  var now = new Date();
  document.getElementById('hud-clock').textContent = now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

// ── MODAL ───────────────────────────────────────────────────
var selectedAgent = null;
function openModal(agentId) {
  var a = AGENTS.find(function(x){ return x.id === agentId; });
  if (!a) return;
  selectedAgent = a;
  var modal = document.getElementById('agent-modal');
  document.getElementById('modal-avatar').textContent = a.id;
  document.getElementById('modal-avatar').style.background = '#' + a.clothColor.toString(16).padStart(6,'0');
  document.getElementById('modal-avatar').style.color = '#ffffff';
  document.getElementById('modal-name').textContent = a.name;
  document.getElementById('modal-role').textContent = a.role;
  document.getElementById('modal-task').textContent = a.task || '—';
  document.getElementById('modal-progress-fill').style.width = a.progress + '%';
  document.getElementById('modal-progress-fill').style.background = a.status === 'working' ? '#e8622a' : '#4ade80';
  var histEl = document.getElementById('modal-history-list');
  histEl.innerHTML = (a.history || []).map(function(h){
    return '<div class="modal-history-item"><div class="modal-history-dot"></div><span class="modal-history-text">' + h + '</span></div>';
  }).join('');
  modal.classList.add('open');
}
function closeModal() { document.getElementById('agent-modal').classList.remove('open'); }
document.getElementById('agent-modal').addEventListener('click', function(e){ if (e.target === e.currentTarget) closeModal(); });

// ── MINI CHART ───────────────────────────────────────────────
var chartPoints = [20,35,28,42,38,55,48,60,52,70,65,72,68,80,75];
function drawMiniChart() {
  var canvas = document.getElementById('mini-chart');
  var ctx = canvas.getContext('2d');
  var w = canvas.width, h = canvas.height;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = '#0f0d1c';
  ctx.fillRect(0,0,w,h);
  var points = chartPoints;
  var max = Math.max.apply(null, points);
  var min = Math.min.apply(null, points);
  var normalize = function(v){ return h - 4 - ((v - min) / (max - min)) * (h - 8); };
  var step = w / (points.length - 1);
  ctx.beginPath();
  ctx.moveTo(0, normalize(points[0]));
  for (var i = 1; i < points.length; i++) ctx.lineTo(i * step, normalize(points[i]));
  ctx.strokeStyle = '#e8622a';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
  ctx.fillStyle = 'rgba(232,98,42,0.08)';
  ctx.fill();
}
drawMiniChart();

// ── DRAW CHARACTER FRAME ──────────────────────────────────────
function drawCharacterFrame(g, agentDef, frameType, frameIndex) {
  var S = 2.4;
  var W = Math.round(9 * S);
  var H = Math.round(22 * S);

  var sk = agentDef.skinColor;
  var cl = agentDef.clothColor;
  var ha = agentDef.hairColor;

  // Walking leg offsets
  var leftLegOY  = 0;
  var rightLegOY = 0;
  if (frameType === 'walk') {
    leftLegOY  = (frameIndex % 2 === 0) ? -3 : 3;
    rightLegOY = (frameIndex % 2 === 0) ? 3  : -3;
  }
  var bodyBob = 0;
  if (frameType === 'idle') {
    bodyBob = (frameIndex % 2 === 0) ? 0 : 1;
  }
  var armFwd = (frameType === 'type') ? 3 : 0;

  g.clear();

  // Shadow
  g.fillStyle(0x000000, 0.22);
  g.fillEllipse(W/2, H + 3, W*1.3, 4);

  // Shoes
  g.fillStyle(0x0a0a0a, 1);
  g.fillRoundedRect(W/2 - 3.5*S, H - 1.5*S + bodyBob + leftLegOY,  3.5*S, 2*S, 1);
  g.fillRoundedRect(W/2 + 0.2*S, H - 1.5*S + bodyBob + rightLegOY, 3.5*S, 2*S, 1);

  // Legs
  g.fillStyle(0x111111, 1);
  g.fillRect(W/2 - 3*S,   H - 5.5*S + bodyBob, 2.5*S, 4.5*S + leftLegOY);
  g.fillRect(W/2 + 0.5*S, H - 5.5*S + bodyBob, 2.5*S, 4.5*S + rightLegOY);

  // Body (jacket/suit)
  g.fillStyle(cl, 1);
  g.fillRoundedRect(W/2 - 3.5*S, H - 13.5*S + bodyBob, 7*S, 8*S, 1);

  // Shirt / collar accent
  var lighterCl = Phaser.Display.Color.IntegerToColor(cl).lighten(25).color;
  g.fillStyle(lighterCl, 1);
  g.fillRect(W/2 - 1*S, H - 13.5*S + bodyBob, 2*S, 5.5*S);

  // Left arm
  g.fillStyle(cl, 1);
  g.fillRoundedRect(W/2 - 5.8*S, H - 12.8*S + bodyBob, 2.5*S, 6*S + armFwd, 1);
  // Right arm
  g.fillRoundedRect(W/2 + 3.2*S, H - 12.8*S + bodyBob, 2.5*S, 6*S + armFwd, 1);

  // Skin on hands
  g.fillStyle(sk, 1);
  g.fillRect(W/2 - 5.5*S, H - 6.5*S + bodyBob + armFwd, 2*S, 1.5*S);
  g.fillRect(W/2 + 3.5*S, H - 6.5*S + bodyBob + armFwd, 2*S, 1.5*S);

  // Neck
  g.fillStyle(sk, 1);
  g.fillRect(W/2 - 1.2*S, H - 14.5*S + bodyBob, 2.4*S, 2*S);

  // Head
  g.fillStyle(sk, 1);
  g.fillRoundedRect(W/2 - 3.5*S, H - 22.5*S + bodyBob, 7*S, 8*S, 2);

  // Eyes — whites
  g.fillStyle(0xffffff, 1);
  g.fillRect(W/2 - 2.5*S, H - 19*S + bodyBob, 2*S, 1.5*S);
  g.fillRect(W/2 + 0.5*S, H - 19*S + bodyBob, 2*S, 1.5*S);
  // Pupils
  g.fillStyle(0x111111, 1);
  g.fillRect(W/2 - 1.8*S, H - 19*S + bodyBob, 1*S, 1.5*S);
  g.fillRect(W/2 + 1.0*S, H - 19*S + bodyBob, 1*S, 1.5*S);

  // Mouth (tiny)
  g.fillStyle(0x6a3a1a, 0.6);
  g.fillRect(W/2 - 1*S, H - 16.5*S + bodyBob, 2*S, 0.8*S);

  // Hair
  g.fillStyle(ha, 1);
  var hs = agentDef.hairStyle;
  if (hs === 'straight' || hs === 'wavy') {
    // Medium straight/wavy hair with side parts
    g.fillRoundedRect(W/2 - 3.5*S, H - 24*S + bodyBob, 7*S, 4*S, 2);
    g.fillRect(W/2 - 3.5*S, H - 21.5*S + bodyBob, 1.5*S, 2.5*S);
    g.fillRect(W/2 + 2.0*S, H - 21.5*S + bodyBob, 1.5*S, 2.5*S);
    if (hs === 'wavy') {
      // Extra wave bumps on top
      g.fillCircle(W/2 - 1.5*S, H - 24.5*S + bodyBob, 1.5*S);
      g.fillCircle(W/2 + 1.5*S, H - 24.5*S + bodyBob, 1.5*S);
    }
  } else if (hs === 'afro') {
    // Big round afro
    g.fillCircle(W/2, H - 22.5*S + bodyBob, 4.8*S);
    g.fillCircle(W/2 - 3.8*S, H - 21.5*S + bodyBob, 3*S);
    g.fillCircle(W/2 + 3.8*S, H - 21.5*S + bodyBob, 3*S);
    g.fillCircle(W/2, H - 26*S + bodyBob, 3*S);
  } else if (hs === 'afro-short') {
    // Short tight afro — wider cap
    g.fillRoundedRect(W/2 - 3.8*S, H - 24.5*S + bodyBob, 7.6*S, 5*S, 3);
    g.fillCircle(W/2 - 2.8*S, H - 23*S + bodyBob, 2.2*S);
    g.fillCircle(W/2 + 2.8*S, H - 23*S + bodyBob, 2.2*S);
    g.fillCircle(W/2, H - 25.5*S + bodyBob, 2.5*S);
  } else if (hs === 'messy') {
    // Spiky messy — dark, unkempt spikes
    g.fillRect(W/2 - 3.5*S, H - 23.5*S + bodyBob, 7*S, 3.5*S);
    // Spikes
    g.fillTriangle(
      W/2 - 3.0*S, H - 23.5*S + bodyBob,
      W/2 - 1.5*S, H - 26.5*S + bodyBob,
      W/2 - 0.5*S, H - 23.5*S + bodyBob
    );
    g.fillTriangle(
      W/2 - 0.5*S, H - 23.5*S + bodyBob,
      W/2 + 0.5*S, H - 27*S + bodyBob,
      W/2 + 1.5*S, H - 23.5*S + bodyBob
    );
    g.fillTriangle(
      W/2 + 1.0*S, H - 23.5*S + bodyBob,
      W/2 + 2.5*S, H - 26*S + bodyBob,
      W/2 + 3.5*S, H - 23.5*S + bodyBob
    );
    // Extra messy side tuft
    g.fillCircle(W/2 - 3.2*S, H - 22.5*S + bodyBob, 1.5*S);
  } else if (hs === 'long') {
    // Long flowing hair — CW (pink)
    g.fillRoundedRect(W/2 - 3.5*S, H - 24.5*S + bodyBob, 7*S, 4.5*S, 2);
    // Long flowing sides
    g.fillRoundedRect(W/2 - 5*S, H - 23.5*S + bodyBob, 2*S, 11*S, 1);
    g.fillRoundedRect(W/2 + 3*S,  H - 23.5*S + bodyBob, 2*S, 11*S, 1);
    // Wave at bottom of long hair
    g.fillCircle(W/2 - 4*S, H - 13*S + bodyBob, 1.8*S);
    g.fillCircle(W/2 + 4*S, H - 13*S + bodyBob, 1.8*S);
  } else if (hs === 'bald') {
    // Just a razor-thin stubble strip
    g.fillStyle(ha, 0.5);
    g.fillRoundedRect(W/2 - 3*S, H - 24*S + bodyBob, 6*S, 1.8*S, 1);
  }
}

// ── PHASER GAME ──────────────────────────────────────────────
var config = {
  type: Phaser.AUTO,
  width: window.innerWidth - 200,
  height: window.innerHeight - 44 - 36,
  parent: 'phaser-container',
  backgroundColor: '#0d0b16',
  antialias: false,
  pixelArt: true,
  scale: {
    mode: Phaser.Scale.RESIZE,
    autoCenter: Phaser.Scale.CENTER_BOTH,
  },
  scene: { preload: preloadScene, create: createScene, update: updateScene }
};

var game = new Phaser.Game(config);

window.addEventListener('resize', function(){
  game.scale.resize(window.innerWidth - 200, window.innerHeight - 80);
});

// ── SCENE FUNCTIONS ───────────────────────────────────────────
function preloadScene() {
  phaserScene = this;
}

function createScene() {
  phaserScene = this;

  var W = this.scale.width;
  var H = this.scale.height;
  var cx = W / 2;
  var cy = H / 2 - 10;

  drawOffice.call(this, cx, cy);
  createAgentSprites.call(this, cx, cy);
  setupBehaviors.call(this);
  startSimulation.call(this);
}

function updateScene() {
  // Y-sort agent sprites so closer ones render on top
  var allSprites = Object.keys(agentSprites).map(function(k){ return agentSprites[k]; });
  allSprites.sort(function(a, b){ return a.y - b.y; });
  allSprites.forEach(function(s, i){ s.setDepth(100 + i); });

  // Keep speech bubbles attached to their agents
  bubbleList.forEach(function(b){
    if (b.sprite && b.bubble && b.bubble.active) {
      b.bubble.setPosition(b.sprite.x, b.sprite.y - 58);
    }
  });
}

// ── DRAW OFFICE ───────────────────────────────────────────────
function drawOffice(cx, cy) {
  var g = this.add.graphics();
  g.setDepth(0);

  var hw = ISO.tileW / 2;
  var hh = ISO.tileH / 2;

  // ── FLOOR TILES ──────────────────────────────────────────
  for (var ix = -3; ix <= 20; ix++) {
    for (var iy = -2; iy <= 16; iy++) {
      var p = isoToScreen(ix, iy);
      var tx = cx + p.x;
      var ty = cy + p.y;

      var floorColor = ((ix + iy) % 2 === 0) ? 0x110d1e : 0x130f22;
      g.fillStyle(floorColor, 1);
      g.fillPoints([
        {x: tx,      y: ty - hh},
        {x: tx + hw, y: ty},
        {x: tx,      y: ty + hh},
        {x: tx - hw, y: ty}
      ], true);

      // Grid lines
      g.lineStyle(0.5, 0x1a1535, 0.35);
      g.strokePoints([
        {x: tx,      y: ty - hh},
        {x: tx + hw, y: ty},
        {x: tx,      y: ty + hh},
        {x: tx - hw, y: ty}
      ], true);
    }
  }

  // ── ROOM ZONES ────────────────────────────────────────────
  drawRoom.call(this, g, 0,   0,  6, 5, 'STRATEGY ROOM', 0x3d2060, cx, cy);
  drawRoom.call(this, g, 7,   0,  6, 5, 'TECH ROOM',     0x0a2a0a, cx, cy);
  drawRoom.call(this, g, 0,   5,  6, 5, 'GROWTH ROOM',   0x0a2a1a, cx, cy);
  drawRoom.call(this, g, 7,   5,  6, 5, 'MEETING ROOM',  0x1a1020, cx, cy);
  drawRoom.call(this, g, 14,  2,  5, 6, 'KITCHEN',       0x0a1520, cx, cy);
  drawRoom.call(this, g, 0,  10,  7, 5, 'LOUNGE',        0x1a100a, cx, cy);
  drawRoom.call(this, g, -2,  3,  3, 6, 'RECEPCAO',      0x1a0a20, cx, cy);

  // ── FURNITURE ─────────────────────────────────────────────
  drawDesk.call(this,           1, 2, 0x7c3aed, cx, cy);
  drawDesk.call(this,           3, 1, 0x1d4ed8, cx, cy);
  drawDesk.call(this,           2, 3, 0x374151, cx, cy);
  drawDualDesk.call(this,       8, 1, 0x22c55e, cx, cy);
  drawDesk.call(this,           1, 6, 0x065f46, cx, cy);
  drawDesk.call(this,           3, 7, 0xd4608a, cx, cy);
  drawReceptionDesk.call(this, -1, 5, cx, cy);
  drawMeetingTable.call(this,   9.5, 6.5, cx, cy);
  drawKitchen.call(this,        15, 3, cx, cy);
  drawLounge.call(this,         1, 11, cx, cy);
  drawKanban.call(this,         10, 0.5, cx, cy);
  drawWorldMap.call(this,       2, 0.5, cx, cy);
  drawMoodboard.call(this,      2, 5.5, cx, cy);

  // ── PLANTS ────────────────────────────────────────────────
  drawPlant(g, 0,  0,  cx, cy);
  drawPlant(g, 6,  0,  cx, cy);
  drawPlant(g, 13, 2,  cx, cy);
  drawPlant(g, 0,  10, cx, cy);
  drawPlant(g, 6,  14, cx, cy);
  drawPlant(g, 19, 2,  cx, cy);

  // ── OVERHEAD LIGHTS ───────────────────────────────────────
  var lampDefs = [
    {ix:1, iy:2}, {ix:3, iy:1}, {ix:2, iy:3},
    {ix:8, iy:1},
    {ix:1, iy:6}, {ix:3, iy:7},
    {ix:9.5, iy:6.5},
  ];
  var self = this;
  lampDefs.forEach(function(lamp){
    var lp = isoToScreen(lamp.ix, lamp.iy);
    var lx = cx + lp.x;
    var ly = cy + lp.y - 35;
    var pl = self.add.pointlight(lx, ly, 0xc8882a, 90, 0.38, 0.05);
    pl.setDepth(50);
  });
}

// ── DRAW ROOM ─────────────────────────────────────────────────
function drawRoom(g, ix, iy, w, h, label, accentColor, cx, cy) {
  var hw = ISO.tileW / 2;
  var hh = ISO.tileH / 2;
  var wallH = 52;

  // Slightly different floor color inside room
  for (var i = ix; i < ix + w; i++) {
    for (var j = iy; j < iy + h; j++) {
      var p = isoToScreen(i, j);
      var tx = cx + p.x, ty = cy + p.y;
      var c = ((i + j) % 2 === 0) ? 0x160f28 : 0x130c24;
      g.fillStyle(c, 1);
      g.fillPoints([{x:tx,y:ty-hh},{x:tx+hw,y:ty},{x:tx,y:ty+hh},{x:tx-hw,y:ty}], true);
    }
  }

  // Top wall (iy edge, right face visible)
  for (var ti = ix; ti < ix + w; ti++) {
    var tp = isoToScreen(ti, iy);
    var tx2 = cx + tp.x, ty2 = cy + tp.y;
    var wallFaceColor = Phaser.Display.Color.IntegerToColor(accentColor).darken(35).color;
    g.fillStyle(wallFaceColor, 0.55);
    g.fillPoints([
      {x:tx2,      y:ty2 + hh},
      {x:tx2 + hw, y:ty2},
      {x:tx2 + hw, y:ty2 - wallH},
      {x:tx2,      y:ty2 + hh - wallH}
    ], true);
    // Top cap
    g.fillStyle(Phaser.Display.Color.IntegerToColor(accentColor).darken(20).color, 0.4);
    g.fillPoints([
      {x:tx2,      y:ty2 - hh},
      {x:tx2 + hw, y:ty2},
      {x:tx2 + hw, y:ty2 - wallH},
      {x:tx2,      y:ty2 - hh - wallH}
    ], true);
  }

  // Left wall (ix edge, left face visible)
  for (var li = iy; li < iy + h; li++) {
    var lp2 = isoToScreen(ix, li);
    var lx2 = cx + lp2.x, ly2 = cy + lp2.y;
    var leftWallColor = Phaser.Display.Color.IntegerToColor(accentColor).darken(45).color;
    g.fillStyle(leftWallColor, 0.55);
    g.fillPoints([
      {x:lx2 - hw, y:ly2},
      {x:lx2,      y:ly2 + hh},
      {x:lx2,      y:ly2 + hh - wallH},
      {x:lx2 - hw, y:ly2 - wallH}
    ], true);
  }

  // Accent light strip along top of top wall
  g.lineStyle(1.5, accentColor, 0.25);
  var wallStart = isoToScreen(ix, iy);
  var wallEnd   = isoToScreen(ix + w, iy);
  g.lineBetween(
    cx + wallStart.x, cy + wallStart.y - wallH,
    cx + wallEnd.x,   cy + wallEnd.y - wallH
  );

  // Room label
  var labelPos = isoToScreen(ix + w * 0.5, iy);
  var lx3 = cx + labelPos.x;
  var ly3 = cy + labelPos.y - wallH - 4;
  this.add.text(lx3, ly3, label, {
    fontSize: '8px',
    fontFamily: 'Courier New',
    color: '#' + accentColor.toString(16).padStart(6,'0') + 'cc',
    stroke: '#000000',
    strokeThickness: 2,
    align: 'center',
    letterSpacing: 2,
  }).setOrigin(0.5, 1).setDepth(200);
}

// ── DRAW DESK ─────────────────────────────────────────────────
function drawDesk(ix, iy, monitorColor, cx, cy) {
  var g = this.add.graphics();
  var p = isoToScreen(ix, iy);
  var x = cx + p.x, y = cy + p.y;
  var hw = ISO.tileW / 2, hh = ISO.tileH / 2;
  var deskH = 20;

  // Desk surface
  g.fillStyle(0x3a2810, 1);
  g.fillPoints([
    {x:x,      y:y - hh*0.78},
    {x:x+hw*0.78, y:y},
    {x:x,      y:y + hh*0.78},
    {x:x-hw*0.78, y:y}
  ], true);

  // Desk front-left face
  g.fillStyle(0x261a08, 1);
  g.fillPoints([
    {x:x-hw*0.78, y:y},
    {x:x,      y:y + hh*0.78},
    {x:x,      y:y + hh*0.78 + deskH},
    {x:x-hw*0.78, y:y + deskH}
  ], true);

  // Desk front-right face
  g.fillStyle(0x2e2010, 1);
  g.fillPoints([
    {x:x,      y:y + hh*0.78},
    {x:x+hw*0.78, y:y},
    {x:x+hw*0.78, y:y + deskH},
    {x:x,      y:y + hh*0.78 + deskH}
  ], true);

  // Monitor stand
  g.fillStyle(0x181818, 1);
  g.fillRect(x - 3, y - hh*0.78 - 22, 6, 20);
  g.fillRect(x - 8, y - hh*0.78 - 3, 16, 4);

  // Monitor frame
  g.fillStyle(0x111111, 1);
  g.fillRoundedRect(x - 16, y - hh*0.78 - 38, 32, 20, 2);

  // Monitor screen glow
  g.fillStyle(monitorColor, 0.15);
  g.fillRoundedRect(x - 18, y - hh*0.78 - 42, 36, 28, 3);

  // Monitor screen content
  g.fillStyle(0x06050e, 1);
  g.fillRect(x - 14, y - hh*0.78 - 36, 28, 16);

  // Code/content lines on screen
  g.fillStyle(monitorColor, 0.7);
  g.fillRect(x - 12, y - hh*0.78 - 33, 14, 2);
  g.fillRect(x - 12, y - hh*0.78 - 28, 20, 2);
  g.fillRect(x - 12, y - hh*0.78 - 23, 10, 2);
  g.fillStyle(monitorColor, 0.35);
  g.fillRect(x - 4,  y - hh*0.78 - 33, 10, 2);

  // Keyboard
  g.fillStyle(0x1e1e22, 1);
  g.fillRoundedRect(x - 14, y - hh*0.78 + 2, 28, 9, 1);
  g.fillStyle(0x2e2e38, 1);
  for (var ki = 0; ki < 5; ki++) {
    g.fillRect(x - 12 + ki*5.4, y - hh*0.78 + 3.5, 4, 2);
    g.fillRect(x - 12 + ki*5.4, y - hh*0.78 + 6.5, 4, 2);
  }

  // Desk lamp
  g.fillStyle(0x2a1a00, 1);
  g.fillRect(x + 10, y - hh*0.78 - 26, 3, 22);
  g.fillStyle(0xc8882a, 0.9);
  g.fillEllipse(x + 11.5, y - hh*0.78 - 28, 12, 6);

  // Coffee mug
  g.fillStyle(0x1a1a22, 1);
  g.fillRect(x - 18, y - hh*0.78, 8, 7);
  g.fillStyle(monitorColor, 0.4);
  g.fillRect(x - 17, y - hh*0.78 + 1, 6, 5);

  g.setDepth(50);

  // Subtle monitor glow pulse tween
  var self = this;
  var glowG = self.add.graphics();
  glowG.setDepth(49);
  self.tweens.add({
    targets: {v: 0},
    v: 1,
    duration: 2200 + Math.random() * 1000,
    yoyo: true,
    repeat: -1,
    ease: 'Sine.easeInOut',
    onUpdate: function(tween, target){
      glowG.clear();
      glowG.fillStyle(monitorColor, 0.03 + target.v * 0.07);
      glowG.fillRoundedRect(x - 22, y - hh*0.78 - 46, 44, 34, 4);
    }
  });
}

// ── DRAW DUAL DESK ────────────────────────────────────────────
function drawDualDesk(ix, iy, monitorColor, cx, cy) {
  var g = this.add.graphics();
  var p = isoToScreen(ix, iy);
  var x = cx + p.x, y = cy + p.y;
  var hw = ISO.tileW / 2, hh = ISO.tileH / 2;
  var deskH = 20;

  // Wide desk surface
  g.fillStyle(0x3a2810, 1);
  g.fillPoints([
    {x:x-hw*0.5,  y:y - hh*0.8},
    {x:x+hw*1.3,  y:y - hh*0.2},
    {x:x+hw*0.6,  y:y + hh*0.8},
    {x:x-hw*1.2,  y:y + hh*0.2}
  ], true);

  g.fillStyle(0x261a08, 1);
  g.fillPoints([
    {x:x-hw*1.2, y:y + hh*0.2},
    {x:x+hw*0.6, y:y + hh*0.8},
    {x:x+hw*0.6, y:y + hh*0.8 + deskH},
    {x:x-hw*1.2, y:y + hh*0.2 + deskH}
  ], true);

  // Dual monitors
  for (var mi = 0; mi < 2; mi++) {
    var mx = x - 20 + mi * 32;
    // Stand
    g.fillStyle(0x181818, 1);
    g.fillRect(mx + 10, y - hh*0.8 - 22, 5, 18);
    g.fillRect(mx + 6,  y - hh*0.8 - 5,  14, 4);
    // Frame
    g.fillStyle(0x111111, 1);
    g.fillRoundedRect(mx, y - hh*0.8 - 38, 28, 18, 2);
    // Screen
    g.fillStyle(0x06050e, 1);
    g.fillRect(mx + 2, y - hh*0.8 - 36, 24, 14);
    // Code lines
    g.fillStyle(monitorColor, 0.7);
    g.fillRect(mx + 4, y - hh*0.8 - 33, 10, 1.5);
    g.fillRect(mx + 4, y - hh*0.8 - 29, 16, 1.5);
    g.fillRect(mx + 4, y - hh*0.8 - 25, 8,  1.5);
    // Glow
    g.fillStyle(monitorColor, 0.1);
    g.fillRoundedRect(mx - 2, y - hh*0.8 - 42, 32, 26, 3);
  }

  // Keyboard
  g.fillStyle(0x1e1e22, 1);
  g.fillRect(x - 14, y - hh*0.8 + 2, 35, 9);

  // Energy drink can
  g.fillStyle(0x1a3a1a, 1);
  g.fillRect(x + 28, y - hh*0.8 - 12, 6, 12);
  g.fillStyle(0x22c55e, 0.6);
  g.fillRect(x + 29, y - hh*0.8 - 10, 4, 6);

  g.setDepth(50);
}

// ── DRAW RECEPTION DESK ───────────────────────────────────────
function drawReceptionDesk(ix, iy, cx, cy) {
  var g = this.add.graphics();
  var p = isoToScreen(ix, iy);
  var x = cx + p.x, y = cy + p.y;

// ── CREATE AGENT SPRITES ──────────────────────────────────────
function createAgentSprites(cx, cy) {
  var self = this;
  AGENTS.forEach(function(agentDef){
    var deskPos = (DESK_POSITIONS[agentDef.room] || [])[agentDef.deskIndex] || {ix: 5, iy: 5};
    var sp = isoToScreen(deskPos.ix, deskPos.iy);
    var startX = cx + sp.x;
    var startY = cy + sp.y - 24;

    // Character graphics
    var charG = self.add.graphics();
    drawCharacterFrame(charG, agentDef, 'idle', 0);

    // Status dot
    var dotG = self.add.graphics();
    var dotColor = agentDef.status === 'working' ? 0xe8622a : (agentDef.status === 'online' ? 0x4ade80 : 0x3f3f5f);
    dotG.fillStyle(dotColor, 1);
    dotG.fillCircle(0, 0, 4);

    // Name label
    var nameLabel = self.add.text(0, 0, agentDef.id, {
      fontSize: '8px',
      fontFamily: 'Courier New',
      fontStyle: 'bold',
      color: '#' + agentDef.clothColor.toString(16).padStart(6,'0'),
      stroke: '#000000',
      strokeThickness: 2,
    }).setOrigin(0.5, 1);

    var container = self.add.container(startX, startY, [charG, dotG, nameLabel]);
    container.setDepth(150);

    // Offset child elements within container
    var S = 2.4;
    var charHalfW = Math.round(9 * S) / 2;
    charG.setPosition(0, 0);
    dotG.setPosition(charHalfW, -Math.round(22 * S) - 8);
    nameLabel.setPosition(charHalfW, -Math.round(22 * S) - 10);

    agentSprites[agentDef.id] = container;
    agentStates[agentDef.id] = {
      agentDef:      agentDef,
      container:     container,
      charG:         charG,
      dotG:          dotG,
      nameLabel:     nameLabel,
      currentStatus: agentDef.status,
      frameIndex:    0,
      homeX:         startX,
      homeY:         startY,
      isAtHome:      true,
      walkTween:     null,
    };

    startIdleAnimation.call(self, agentDef.id);
  });
}

// ── START IDLE ANIMATION ──────────────────────────────────────
function startIdleAnimation(agentId) {
  var state = agentStates[agentId];
  if (!state) return;

  var bobAmt = (state.currentStatus === 'working') ? 1.5 : 0.8;
  var bobDur = (state.currentStatus === 'working') ? 200 : 2400;

  this.tweens.add({
    targets: state.container,
    y: state.container.y + bobAmt,
    duration: bobDur,
    yoyo: true,
    repeat: -1,
    ease: 'Sine.easeInOut',
  });
}

// ── SETUP BEHAVIORS ───────────────────────────────────────────
function setupBehaviors() {
  var self = this;

  // Idle agents occasionally walk to kitchen
  self.time.addEvent({
    delay: 9000,
    callback: function(){
      AGENTS.forEach(function(a){
        var state = agentStates[a.id];
        if (!state || state.currentStatus !== 'idle') return;
        if (state.isAtHome && Math.random() < 0.35) {
          walkToKitchen.call(self, a.id);
        }
      });
    },
    loop: true,
  });

  // Frame animation ticker — redraw character frames
  self.time.addEvent({
    delay: 220,
    callback: function(){
      AGENTS.forEach(function(a){
        var state = agentStates[a.id];
        if (!state) return;
        state.frameIndex = (state.frameIndex + 1) % 4;
        var fType = (state.currentStatus === 'working') ? 'type' : ((state.walkTween) ? 'walk' : 'idle');
        drawCharacterFrame(state.charG, state.agentDef, fType, state.frameIndex);
      });
    },
    loop: true,
  });
}

// ── WALK TO KITCHEN ───────────────────────────────────────────
function walkToKitchen(agentId) {
  var state = agentStates[agentId];
  if (!state || state.walkTween) return;

  var W = phaserScene.scale.width;
  var H = phaserScene.scale.height;
  var cx = W / 2;
  var cy = H / 2 - 10;

  var kitchenPos = isoToScreen(16, 4);
  var targetX = cx + kitchenPos.x;
  var targetY = cy + kitchenPos.y - 24;

  state.isAtHome = false;

  var self = phaserScene;
  state.walkTween = self.tweens.add({
    targets: state.container,
    x: targetX,
    y: targetY,
    duration: 2800,
    ease: 'Linear',
    onComplete: function(){
      // Wait 3-5s at kitchen, then return home
      self.time.delayedCall(3000 + Math.random() * 2000, function(){
        state.walkTween = self.tweens.add({
          targets: state.container,
          x: state.homeX,
          y: state.homeY,
          duration: 2800,
          ease: 'Linear',
          onComplete: function(){
            state.isAtHome = true;
            state.walkTween = null;
          }
        });
      });
    }
  });
}

// ── SPEECH BUBBLES ────────────────────────────────────────────
function showSpeechBubble(agentId, text) {
  var state = agentStates[agentId];
  if (!state) return;

  // Remove old bubble for this agent
  bubbleList = bubbleList.filter(function(b){
    if (b.agentId === agentId) {
      if (b.bubble && b.bubble.active) b.bubble.destroy();
      return false;
    }
    return true;
  });

  var truncated = text.length > 30 ? text.slice(0, 30) + '…' : text;
  var bW = Math.max(72, truncated.length * 5.8 + 16);
  var bH = 26;

  var bg = phaserScene.add.graphics();
  bg.fillStyle(0x1a1828, 0.95);
  bg.fillRoundedRect(-bW/2, -bH, bW, bH, 4);
  bg.lineStyle(1, 0x3a3860, 0.9);
  bg.strokeRoundedRect(-bW/2, -bH, bW, bH, 4);
  // Bubble tail
  bg.fillStyle(0x1a1828, 0.95);
  bg.fillTriangle(-5, 0, 5, 0, 0, 9);

  var txt = phaserScene.add.text(0, -bH/2 - 2, truncated, {
    fontSize: '8px',
    fontFamily: 'Courier New',
    color: '#e0e0f0',
    align: 'center',
  }).setOrigin(0.5, 0.5);

  var S = 2.4;
  var charHalfW = Math.round(9 * S) / 2;
  var bContainer = phaserScene.add.container(
    state.container.x + charHalfW,
    state.container.y - 58,
    [bg, txt]
  );
  bContainer.setDepth(300);
  bContainer.setAlpha(0);

  phaserScene.tweens.add({
    targets: bContainer,
    alpha: 1,
    duration: 280,
    onComplete: function(){
      phaserScene.time.delayedCall(3400, function(){
        phaserScene.tweens.add({
          targets: bContainer,
          alpha: 0,
          duration: 450,
          onComplete: function(){
            if (bContainer.active) bContainer.destroy();
            bubbleList = bubbleList.filter(function(b){ return b.bubble !== bContainer; });
          }
        });
      });
    }
  });

  bubbleList.push({
    agentId:  agentId,
    bubble:   bContainer,
    sprite:   state.container,
  });
}

// ── SIMULATION ────────────────────────────────────────────────
// TODO: Replace with Supabase Realtime channels:
// supabase.channel('live').on('postgres_changes', {event:'*',schema:'public',table:'agents'}, handleAgentUpdate).subscribe()
// supabase.channel('live').on('postgres_changes', {event:'*',schema:'public',table:'missions'}, handleMissionUpdate).subscribe()

function startSimulation() {
  var self = this;

  var scheduleNext = function(){
    var delay = 4500 + Math.random() * 3500;
    self.time.delayedCall(delay, function(){
      simulationTick.call(self);
      scheduleNext();
    });
  };
  scheduleNext();

  // Mission progress ticker
  self.time.addEvent({
    delay: 7000,
    callback: function(){
      MISSIONS.forEach(function(m){
        m.progress = Math.min(100, m.progress + Math.floor(Math.random() * 3));
      });
      renderMissions();
    },
    loop: true,
  });

  // Metrics chart update
  self.time.addEvent({
    delay: 6000,
    callback: updateChartMetrics,
    loop: true,
  });
}

function simulationTick() {
  // TODO: Replace with supabase realtime update push
  var a = AGENTS[Math.floor(Math.random() * AGENTS.length)];
  var state = agentStates[a.id];
  if (!state) return;

  var statuses = ['working', 'working', 'working', 'online', 'idle'];
  var newStatus = statuses[Math.floor(Math.random() * statuses.length)];

  if (newStatus === 'working') {
    var taskList = TASKS[a.id] || ['Em execução'];
    a.task = taskList[Math.floor(Math.random() * taskList.length)];
    var increment = 5 + Math.floor(Math.random() * 18);
    a.progress = Math.min(100, a.progress + increment);
    if (a.progress >= 100) {
      a.progress = 0;
      if (a.history.length >= 3) a.history.pop();
      a.history.unshift(a.task);
      addTickerEvent(a.id, a.name + ' concluiu: ' + a.task, '#4ade80');
    }
  } else if (newStatus === 'idle') {
    a.task = '';
    a.progress = 0;
  }

  a.status = newStatus;
  state.currentStatus = newStatus;

  // Update status dot in canvas
  var dotColor = newStatus === 'working' ? 0xe8622a : (newStatus === 'online' ? 0x4ade80 : 0x3f3f5f);
  state.dotG.clear();
  if (newStatus === 'working') {
    // Pulse ring
    state.dotG.fillStyle(dotColor, 0.25);
    state.dotG.fillCircle(0, 0, 8);
  }
  state.dotG.fillStyle(dotColor, 1);
  state.dotG.fillCircle(0, 0, 4);

  // Speech bubble when working
  if (newStatus === 'working') {
    var speechList = SPEECH[a.id] || ['Processando…'];
    var msg = speechList[Math.floor(Math.random() * speechList.length)];
    showSpeechBubble(a.id, msg);
    addTickerEvent(a.id, '[' + a.id + '] ' + msg, '#' + a.clothColor.toString(16).padStart(6,'0'));
  }

  // Update missions count badge
  var workingCount = AGENTS.filter(function(x){ return x.status === 'working'; }).length;
  document.getElementById('missions-count').textContent = String(workingCount);

  renderAgentList();

  // Update modal if open for this agent
  if (selectedAgent && selectedAgent.id === a.id) {
    document.getElementById('modal-task').textContent = a.task || '—';
    document.getElementById('modal-progress-fill').style.width = a.progress + '%';
    document.getElementById('modal-progress-fill').style.background = a.status === 'working' ? '#e8622a' : '#4ade80';
  }
}

function addTickerEvent(agentId, text, color) {
  var now = new Date();
  var time = now.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  tickerLog.unshift({color: color, text: text, time: time});
  if (tickerLog.length > 14) tickerLog.pop();

  var inner = document.getElementById('ticker-inner');
  var doubled = tickerLog.concat(tickerLog);
  inner.innerHTML = doubled.map(function(e){
    return '<span class="ticker-event">' +
      '<span class="ticker-dot" style="background:' + e.color + '"></span>' +
      e.text +
      '<span class="ticker-time">' + e.time + '</span>' +
    '</span>';
  }).join('');
}

function updateChartMetrics() {
  var newVals = [
    Math.min(100, Math.max(50, 78 + Math.floor(Math.random() * 8 - 4))),
    Math.min(100, Math.max(30, 61 + Math.floor(Math.random() * 10 - 5))),
    Math.min(100, Math.max(20, 45 + Math.floor(Math.random() * 12 - 6))),
  ];
  var ids = ['val-crescimento', 'val-conversoes', 'val-campanhas'];
  var fills = document.querySelectorAll('.chart-bar-fill');
  newVals.forEach(function(v, i){
    var el = document.getElementById(ids[i]);
    if (el) el.textContent = v + '%';
    if (fills[i]) fills[i].style.width = v + '%';
  });

  // Evolve chart points slightly
  chartPoints.shift();
  chartPoints.push(Math.max(15, Math.min(95, chartPoints[chartPoints.length-1] + Math.floor(Math.random() * 10 - 4))));
  drawMiniChart();
}
