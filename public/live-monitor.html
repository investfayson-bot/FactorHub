<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FactorHub OS — Live Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <style>
    /* ═══════════════════════════════════════════════
       RESET & BASE
    ═══════════════════════════════════════════════ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #060606;
      font-family: 'Courier New', Courier, monospace;
      color: #f0f0f0;
    }

    /* ═══════════════════════════════════════════════
       PHASER CANVAS
    ═══════════════════════════════════════════════ */
    #phaser-container {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
    }

    #phaser-container canvas {
      display: block;
    }

    /* ═══════════════════════════════════════════════
       TOPBAR
    ═══════════════════════════════════════════════ */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      background: rgba(6, 6, 6, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      z-index: 200;
      user-select: none;
    }

    #topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #logo {
      display: flex;
      align-items: baseline;
      gap: 0;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 3px;
      color: #f0f0f0;
      text-transform: uppercase;
    }

    #logo .accent { color: #e05a28; }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
      animation: anim-live-dot 1.4s ease-in-out infinite;
    }

    @keyframes anim-live-dot {
      0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(34,197,94,0.6); }
      50%       { opacity: 0.85; transform: scale(1.2); box-shadow: 0 0 0 5px rgba(34,197,94,0); }
    }

    .live-text {
      font-size: 9px;
      letter-spacing: 3px;
      color: #22c55e;
      text-transform: uppercase;
      font-weight: 600;
    }

    .hud-sep {
      width: 1px;
      height: 20px;
      background: #2a2a2a;
      flex-shrink: 0;
    }

    #monitor-label {
      font-size: 10px;
      letter-spacing: 4px;
      color: #4a4a4a;
      text-transform: uppercase;
    }

    #clock {
      font-size: 14px;
      letter-spacing: 2px;
      color: #f0f0f0;
      font-variant-numeric: tabular-nums;
    }

    #topbar-right {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .stat-label {
      font-size: 8px;
      letter-spacing: 2px;
      color: #3f3f3f;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .stat-value {
      font-size: 13px;
      font-weight: 700;
      color: #f0f0f0;
      font-variant-numeric: tabular-nums;
      letter-spacing: 1px;
    }

    .stat-value.green  { color: #22c55e; }
    .stat-value.yellow { color: #f59e0b; }
    .stat-value.orange { color: #e05a28; }

    /* ═══════════════════════════════════════════════
       RIGHT PANEL — SQUAD
    ═══════════════════════════════════════════════ */
    #right-panel {
      position: fixed;
      top: 48px;
      right: 0;
      width: 204px;
      height: calc(100vh - 48px - 36px);
      background: rgba(6, 6, 6, 0.86);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-left: 1px solid #1e1e1e;
      display: flex;
      flex-direction: column;
      z-index: 200;
      overflow: hidden;
    }

    #panel-header {
      padding: 11px 14px 8px;
      font-size: 8px;
      letter-spacing: 4px;
      color: #3f3f3f;
      text-transform: uppercase;
      border-bottom: 1px solid #161616;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-count {
      font-size: 9px;
      color: #22c55e;
      letter-spacing: 1px;
    }

    #agent-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
      scrollbar-width: thin;
      scrollbar-color: #2a2a2a transparent;
    }

    #agent-list::-webkit-scrollbar { width: 3px; }
    #agent-list::-webkit-scrollbar-track { background: transparent; }
    #agent-list::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    .agent-row {
      padding: 9px 14px;
      border-bottom: 1px solid #0e0e0e;
      cursor: default;
      transition: background 0.25s;
    }

    .agent-row:hover { background: rgba(255,255,255,0.025); }

    .agent-row-header {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 4px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.working {
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34,197,94,0.9);
      animation: anim-live-dot 1.1s ease-in-out infinite;
    }

    .status-dot.online  { background: #f59e0b; }
    .status-dot.idle    { background: #2a2a2a; border: 1px solid #3f3f3f; }

    .agent-id {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .agent-name-small {
      font-size: 8px;
      color: #3f3f3f;
      letter-spacing: 0.5px;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .agent-task-text {
      font-size: 8px;
      color: #4a4a4a;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-height: 11px;
    }

    .progress-track {
      height: 2px;
      background: #161616;
      border-radius: 1px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 1px;
      transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
    }

    /* ═══════════════════════════════════════════════
       ACTIVITY FEED — BOTTOM LEFT
    ═══════════════════════════════════════════════ */
    #activity-feed {
      position: fixed;
      bottom: 36px;
      left: 0;
      width: 336px;
      background: rgba(6, 6, 6, 0.86);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-right: 1px solid #1e1e1e;
      border-top: 1px solid #1e1e1e;
      z-index: 200;
    }

    #feed-header {
      padding: 9px 14px 7px;
      font-size: 8px;
      letter-spacing: 4px;
      color: #3f3f3f;
      text-transform: uppercase;
      border-bottom: 1px solid #161616;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .feed-live-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #e05a28;
      animation: anim-live-dot 1.8s ease-in-out infinite;
    }

    #feed-body {
      padding: 4px 0 4px;
    }

    .feed-entry {
      padding: 3px 14px;
      font-size: 9.5px;
      line-height: 1.6;
      display: flex;
      align-items: baseline;
      gap: 6px;
      animation: anim-feed-in 0.35s ease;
      color: #4a4a4a;
    }

    .feed-entry.fresh { color: #909090; }

    @keyframes anim-feed-in {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    .feed-ts   { color: #2a2a2a; font-size: 8px; flex-shrink: 0; }
    .feed-agent-id {
      font-weight: 800;
      font-size: 9px;
      flex-shrink: 0;
      min-width: 20px;
    }
    .feed-msg  { flex: 1; }

    /* ═══════════════════════════════════════════════
       BOTTOM TICKER
    ═══════════════════════════════════════════════ */
    #ticker {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 36px;
      background: rgba(6, 6, 6, 0.96);
      border-top: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      overflow: hidden;
      z-index: 200;
    }

    #ticker-badge {
      flex-shrink: 0;
      background: #e05a28;
      color: #f0f0f0;
      font-size: 7px;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 0 12px;
      height: 100%;
      display: flex;
      align-items: center;
      border-right: 1px solid #1e1e1e;
    }

    #ticker-scroll-area {
      flex: 1;
      overflow: hidden;
      height: 100%;
      display: flex;
      align-items: center;
    }

    #ticker-inner {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      font-size: 9px;
      letter-spacing: 1.5px;
      color: #3f3f3f;
      animation: anim-ticker 55s linear infinite;
      gap: 0;
    }

    @keyframes anim-ticker {
      0%   { transform: translateX(100vw); }
      100% { transform: translateX(-200%); }
    }

    .ticker-agent  { color: #f59e0b; font-weight: 700; }
    .ticker-status-working { color: #22c55e; }
    .ticker-status-online  { color: #f59e0b; }
    .ticker-status-idle    { color: #3f3f3f; }
    .ticker-sep    { color: #1e1e1e; margin: 0 20px; }

    /* ═══════════════════════════════════════════════
       VERSION WATERMARK
    ═══════════════════════════════════════════════ */
    #watermark {
      position: fixed;
      bottom: 44px;
      right: 208px;
      font-size: 8px;
      letter-spacing: 2px;
      color: #1e1e1e;
      z-index: 201;
      pointer-events: none;
      text-transform: uppercase;
    }

    /* ═══════════════════════════════════════════════
       OVERLAY CORNERS
    ═══════════════════════════════════════════════ */
    .corner-deco {
      position: fixed;
      z-index: 201;
      pointer-events: none;
      width: 20px;
      height: 20px;
    }

    #corner-tl {
      top: 56px; left: 8px;
      border-top: 1px solid #2a2a2a;
      border-left: 1px solid #2a2a2a;
    }

    #corner-tr {
      top: 56px; right: 212px;
      border-top: 1px solid #2a2a2a;
      border-right: 1px solid #2a2a2a;
    }
  </style>
</head>

// ─────────────────────────────────────────────────────────────────
//  ISOMETRIC GRID CONSTANTS
// ─────────────────────────────────────────────────────────────────
const TW = 64;   // tile width
const TH = 32;   // tile height (2:1 iso ratio)

function isoX(c, r) { return (c - r) * (TW / 2); }
function isoY(c, r) { return (c + r) * (TH / 2); }

// Tile rhombus points helper
function rhombus(c, r) {
  const x = isoX(c, r), y = isoY(c, r);
  return [
    { x: x,        y: y + TH / 2 },
    { x: x + TW/2, y: y           },
    { x: x + TW,   y: y + TH / 2 },
    { x: x + TW/2, y: y + TH      },
  ];
}

let AGENTS = [

  { id:'CF', name:'CFO',              status:'online',  task:'Aguardando análise',        progress: 0 },
  { id:'CO', name:'COO',              status:'online',  task:'Alinhando processos',       progress:15 },

  { id:'CA', name:'Chief of Staff',   status:'online',  task:'Coordenando squad',         progress:20 },

const TASK_POOL = [
  'Validando missão Vigano','Build FactorOS v0.2','Copy IG Nova Lima',
  'Analisando métricas Q2','Revisando proposta Vigano','Integrando Supabase API',
  'Criando copy para Instagram','Alinhando OKRs do trimestre',
  'Deploy FactorOS v0.2','Revisão de contratos','Planejamento campanha BH',
  'Validando personas ICP','Auditoria financeira','Estruturando funil growth',

  'Estratégia de conteúdo','Setup CI/CD pipeline',

const STATUS_COLOR = { working: PAL.green, online: PAL.yellow, idle: PAL.gray };

// ─────────────────────────────────────────────────────────────────
//  GLOBAL REFS
// ─────────────────────────────────────────────────────────────────
let SCENE = null;  // set after scene creation


// ═══════════════════════════════════════════════════════════════════
//  PHASER SCENE — OfficeScene
// ═══════════════════════════════════════════════════════════════════
class OfficeScene extends Phaser.Scene {
  constructor() {
    super({ key: 'OfficeScene' });

    // Map deskId -> { x, y } screen coords (world-relative)
    this.deskPositions   = {};

    // Map agentId -> agent sprite parts + tweens
    this.agentObjects    = {};
    this.agentTweens     = {};

    // Kitchen screen position for idle walks
    this.kitchenWorldPos = null;

    // Track agents currently walking
    this.walkingAgents   = new Set();

    // Room label text objects for pulse anim
    this.roomLabels      = [];

    // Coffee light graphics reference
    this._coffeeGfx      = null;
    this._coffeeLightOn  = true;
  }

  // ──────────────────────────────────────────────────────────────
  //  LIFECYCLE: preload (nothing external to load)
  // ──────────────────────────────────────────────────────────────
  preload() {
    // No external assets — 100% programmatic graphics
  }

  // ──────────────────────────────────────────────────────────────
  //  LIFECYCLE: create
  // ──────────────────────────────────────────────────────────────
  create() {
    SCENE = this;
    const W = this.scale.width;
    const H = this.scale.height;

    // World container: everything drawn inside here, centered on screen
    this.world = this.add.container(W * 0.42, H * 0.52);

    // ── DRAW BASE FLOOR ──────────────────────────────────────────
    this._drawBaseFloor();

    // ── DRAW ALL ROOMS ───────────────────────────────────────────
    this._buildOfficeLayout();

    // ── SPAWN AGENT SPRITES ──────────────────────────────────────
    this._spawnAllAgents();

    // ── KICK OFF ANIMATIONS ──────────────────────────────────────
    this._initAllAgentAnims();

    // ── TIMERS ───────────────────────────────────────────────────
    // Activity simulation (4–7 s intervals)
    // TODO: Remove when Supabase subscriptions are active
    this.time.delayedCall(Phaser.Math.Between(3000, 5000), () => this._simulateTick());

    // Idle agent walk loop (every 10 s)
    this.time.addEvent({ delay: 10000, callback: this._walkIdleAgents, callbackScope: this, loop: true });

    // Monitor screen flicker (every 600 ms)
    this.time.addEvent({ delay: 600,   callback: this._flickerMonitors, callbackScope: this, loop: true });

    // Room label glow pulse (every 2.5 s)
    this.time.addEvent({ delay: 2500,  callback: this._pulseRoomLabels, callbackScope: this, loop: true });

    // Coffee light blink (every 900 ms)
    this.time.addEvent({ delay: 900,   callback: this._blinkCoffeeLight, callbackScope: this, loop: true });

    // Initial HUD render
    renderSquadPanel();
    updateTopbarStats();
  }

  // ──────────────────────────────────────────────────────────────
  //  LIFECYCLE: update (minimal logic — tweens handle everything)
  // ──────────────────────────────────────────────────────────────
  update() {
    // Keep agent bubble containers following their agents
    Object.values(this.agentObjects).forEach(obj => {
      if (obj.bubbleGroup && obj.container) {
        obj.bubbleGroup.x = obj.container.x;
        obj.bubbleGroup.y = obj.container.y - 62;
      }
    });
  }

  // ── ROOM TILES ────────────────────────────────────────────────
  _roomFloor(sc, sr, cols, rows) {
    const gfx = this.add.graphics();
    this.world.add(gfx);
    for (let r = sr; r < sr + rows; r++) {
      for (let c = sc; c < sc + cols; c++) {
        const pts = rhombus(c, r);
        gfx.fillStyle(PAL.roomFloor, 1);
        gfx.fillPoints(pts, true);
        gfx.lineStyle(1, PAL.roomLine, 0.5);
        gfx.strokePoints(pts, true);
      }
    }
  }

  // ── ROOM WALLS ────────────────────────────────────────────────
  _roomWalls(sc, sr, cols, rows, accentColor, labelText) {
    const gfx = this.add.graphics();
    this.world.add(gfx);
    const WH = 28; // wall height

    // Left wall (along sc column)
    for (let r = sr; r < sr + rows; r++) {
      const x = isoX(sc, r), y = isoY(sc, r);
      gfx.fillStyle(PAL.wallLeft, 1);
      gfx.fillPoints([
        { x: x,        y: y + TH/2         },
        { x: x,        y: y + TH/2 - WH    },
        { x: x + TW/2, y: y - WH           },
        { x: x + TW/2, y: y                },
      ], true);
      gfx.lineStyle(1, PAL.wallLine, 0.7);
      gfx.strokePoints([
        { x: x, y: y + TH/2 }, { x: x, y: y + TH/2 - WH },
        { x: x + TW/2, y: y - WH }, { x: x + TW/2, y: y },
      ], true);
    }

    // Top wall (along sr row)
    for (let c = sc; c < sc + cols; c++) {
      const x = isoX(c, sr), y = isoY(c, sr);
      gfx.fillStyle(PAL.wallRight, 1);
      gfx.fillPoints([
        { x: x + TW/2, y: y              },
        { x: x + TW/2, y: y - WH         },
        { x: x + TW,   y: y + TH/2 - WH  },
        { x: x + TW,   y: y + TH/2       },
      ], true);
      gfx.lineStyle(1, PAL.wallLine, 0.7);
      gfx.strokePoints([
        { x: x + TW/2, y }, { x: x + TW/2, y: y - WH },
        { x: x + TW, y: y + TH/2 - WH }, { x: x + TW, y: y + TH/2 },
      ], true);
    }

    // Wall top cap accent stripe
    gfx.lineStyle(2, accentColor, 0.3);
    const x0 = isoX(sc, sr), y0 = isoY(sc, sr);
    const x1 = isoX(sc + cols, sr), y1 = isoY(sc + cols, sr);
    gfx.lineBetween(x0 + TW/2, y0 - WH, x1, y1 + TH/2 - WH);

    // Room label — slightly above the top wall midpoint
    const midC = sc + cols / 2 - 0.5;
    const lx = isoX(midC, sr) + TW / 2;
    const ly = isoY(midC, sr) - WH - 10;
    const lbl = this.add.text(lx, ly, labelText, {
      fontSize: '8px',
      fontFamily: 'Courier New, monospace',
      color: '#' + accentColor.toString(16).padStart(6,'0'),
      alpha: 0.75,
      letterSpacing: 2,
    }).setOrigin(0.5, 1);
    this.world.add(lbl);
    this.roomLabels.push({ text: lbl, baseAlpha: 0.75 });
  }

  // ── CORRIDOR ─────────────────────────────────────────────────
  _drawCorridor(sc, sr, cols, rows) {
    const gfx = this.add.graphics();
    this.world.add(gfx);
    for (let r = sr; r < sr + rows; r++) {
      for (let c = sc; c < sc + cols; c++) {
        gfx.fillStyle(0x0c0c0c, 1);
        gfx.fillPoints(rhombus(c, r), true);
      }
    }
  }

  // ── STANDARD DESK ────────────────────────────────────────────
  _drawDesk(c, r, deskId) {
    const gfx = this.add.graphics();
    this.world.add(gfx);
    const x = isoX(c, r), y = isoY(c, r);
    const DH = 13;

    // Top
    gfx.fillStyle(PAL.deskTop, 1);
    gfx.fillPoints(rhombus(c, r), true);
    gfx.lineStyle(1, 0x3a3a3a, 1);
    gfx.strokePoints(rhombus(c, r), true);

    // Front face
    gfx.fillStyle(PAL.deskFront, 1);
    gfx.fillPoints([
      { x: x, y: y + TH/2 }, { x: x, y: y + TH/2 + DH },
      { x: x + TW/2, y: y + TH + DH }, { x: x + TW/2, y: y + TH },
    ], true);
    gfx.lineStyle(1, 0x2a2a2a, 0.8);
    gfx.strokePoints([
      { x: x, y: y + TH/2 }, { x: x, y: y + TH/2 + DH },
      { x: x + TW/2, y: y + TH + DH }, { x: x + TW/2, y: y + TH },
    ], true);

    // Right face
    gfx.fillStyle(PAL.deskRight, 1);
    gfx.fillPoints([
      { x: x + TW/2, y: y + TH }, { x: x + TW/2, y: y + TH + DH },
      { x: x + TW, y: y + TH/2 + DH }, { x: x + TW, y: y + TH/2 },
    ], true);

    // Monitor
    this._placeMonitor(gfx, x + TW * 0.3, y + TH/2 - 20, 0x1a1a1a, false);

    // Desk agent position (slightly behind desk top center)
    const agX = x + TW / 2;
    const agY = y + TH / 2 - DH - 6;
    this.deskPositions[deskId] = { x: agX, y: agY };
  }

  // ── DUAL MONITOR DESK (DV) ────────────────────────────────────
  _drawDualDesk(c, r, deskId) {
    const gfx = this.add.graphics();
    this.world.add(gfx);
    const x = isoX(c, r), y = isoY(c, r);
    const DH = 13;

    gfx.fillStyle(PAL.deskTop, 1);
    gfx.fillPoints(rhombus(c, r), true);
    gfx.lineStyle(1, 0x3a3a3a, 1);
    gfx.strokePoints(rhombus(c, r), true);
    gfx.fillStyle(PAL.deskFront, 1);
    gfx.fillPoints([
      { x: x, y: y + TH/2 }, { x: x, y: y + TH/2 + DH },
      { x: x + TW/2, y: y + TH + DH }, { x: x + TW/2, y: y + TH },
    ], true);
    gfx.fillStyle(PAL.deskRight, 1);
    gfx.fillPoints([
      { x: x + TW/2, y: y + TH }, { x: x + TW/2, y: y + TH + DH },
      { x: x + TW, y: y + TH/2 + DH }, { x: x + TW, y: y + TH/2 },
    ], true);

    // Two monitors side by side
    this._placeMonitor(gfx, x + TW * 0.12, y + TH/2 - 22, 0x14532d, true);
    this._placeMonitor(gfx, x + TW * 0.48, y + TH/2 - 20, 0x0d3b1f, true);

    const agX = x + TW / 2;
    const agY = y + TH / 2 - DH - 6;
    this.deskPositions[deskId] = { x: agX, y: agY };
  }

  // ── MONITOR HELPER ────────────────────────────────────────────
  _placeMonitor(gfx, x, y, screenColor, dual) {
    const mw = dual ? 18 : 20, mh = 13;
    // Stand
    gfx.fillStyle(0x252525, 1);
    gfx.fillRect(x + mw/2 - 2, y + mh, 4, 5);
    gfx.fillRect(x + mw/2 - 6, y + mh + 5, 12, 2);
    // Frame
    gfx.fillStyle(PAL.monitorFrame, 1);
    gfx.fillRoundedRect(x, y, mw, mh, 2);
    // Screen
    gfx.fillStyle(screenColor, 0.9);
    gfx.fillRoundedRect(x + 2, y + 2, mw - 4, mh - 4, 1);
    // Glare
    gfx.fillStyle(0xffffff, 0.06);
    gfx.fillRect(x + 2, y + 2, (mw - 4) * 0.5, 3);
  }

  // ── KANBAN BOARD ─────────────────────────────────────────────
  _drawKanbanBoard(c, r, color) {
    const gfx = this.add.graphics();
    this.world.add(gfx);
    const x = isoX(c, r) + TW * 0.1;
    const y = isoY(c, r) - 28;
    const BW = 52, BH = 44;
    gfx.fillStyle(0x141414, 1);
    gfx.fillRoundedRect(x, y - BH, BW, BH, 2);
    gfx.lineStyle(1, color, 0.35);
    gfx.strokeRoundedRect(x, y - BH, BW, BH, 2);
    const colW = Math.floor(BW / 3) - 2;
    const colColors = [0x3f3f3f, color, 0x22c55e];
    const colLabels = ['TODO', 'WIP', 'DONE'];
    for (let i = 0; i < 3; i++) {
      const cx2 = x + 2 + i * (colW + 2);
      const cy2 = y - BH + 2;
      gfx.fillStyle(0x0e0e0e, 1);
      gfx.fillRect(cx2, cy2, colW, BH - 4);
      // Col header
      gfx.fillStyle(colColors[i], 0.5);
      gfx.fillRect(cx2, cy2, colW, 7);
      // Cards
      for (let k = 0; k < 2; k++) {
        gfx.fillStyle(colColors[i], 0.3);

  // ── OVAL TABLE ───────────────────────────────────────────────
  _drawOvalTable(c, r) {
    const gfx = this.add.graphics();
    this.world.add(gfx);
    const cx = isoX(c, r) + TW / 2;
    const cy = isoY(c, r) + TH / 2;
    // Table top
    gfx.fillStyle(0x1e1e1e, 1);
    gfx.fillEllipse(cx, cy, 100, 50);
    gfx.lineStyle(1, 0x2e2e2e, 1);
    gfx.strokeEllipse(cx, cy, 100, 50);
    // Inner highlight
    gfx.fillStyle(0x242424, 0.6);
    gfx.fillEllipse(cx, cy, 60, 30);
    // Chairs
    const chairDefs = [
      [0,0.55],[55,0.55],[110,0.55],[180,0.55],[240,0.55],[300,0.55],
    ];
    for (let ang = 0; ang < 360; ang += 60) {
      const rad = ang * Math.PI / 180;
      const cx2 = cx + Math.cos(rad) * 62;
      const cy2 = cy + Math.sin(rad) * 32;
      gfx.fillStyle(0x252525, 1);
      gfx.fillEllipse(cx2, cy2, 22, 12);
      gfx.lineStyle(1, 0x333333, 0.6);
      gfx.strokeEllipse(cx2, cy2, 22, 12);
    }
  }

  // ── KITCHEN ──────────────────────────────────────────────────
  _drawKitchen(c, r) {
    const gfx = this.add.graphics();
    this.world.add(gfx);
    const x = isoX(c, r), y = isoY(c, r);
    const DH = 12;

    // Counter (2-tile wide)
    for (let dc = 0; dc < 2; dc++) {
      const cx2 = isoX(c + dc, r), cy2 = isoY(c + dc, r);
      gfx.fillStyle(0x242424, 1);
      gfx.fillPoints(rhombus(c + dc, r), true);
      gfx.lineStyle(1, 0x3a3a3a, 1);
      gfx.strokePoints(rhombus(c + dc, r), true);
      gfx.fillStyle(0x1c1c1c, 1);
      gfx.fillPoints([
        { x: cx2, y: cy2 + TH/2 }, { x: cx2, y: cy2 + TH/2 + DH },
        { x: cx2 + TW/2, y: cy2 + TH + DH }, { x: cx2 + TW/2, y: cy2 + TH },
      ], true);
    }

    // Coffee maker
    const mx = x + TW/2 - 10, my = y - 14;
    gfx.fillStyle(0x1e1e1e, 1);
    gfx.fillRoundedRect(mx, my, 20, 22, 2);
    gfx.lineStyle(1, 0x333333, 1);
    gfx.strokeRoundedRect(mx, my, 20, 22, 2);
    // Coffee maker accent
    gfx.fillStyle(0x2a2a2a, 1);
    gfx.fillRect(mx + 3, my + 14, 14, 6);
    gfx.fillStyle(0x1a1a1a, 0.8);
    gfx.fillCircle(mx + 10, my + 10, 5);
    // Blinking light placeholder (redrawn by blink timer)
    this._coffeeLightX = mx + 4;
    this._coffeeLightY = my + 5;
    this._coffeeGfx = this.add.graphics();
    this.world.add(this._coffeeGfx);

    // Fridge
    const fx = x + TW, fy = y - 10;
    gfx.fillStyle(0x242424, 1);
    gfx.fillRoundedRect(fx, fy, 16, 26, 2);
    gfx.lineStyle(1, 0x333333, 1);
    gfx.strokeRoundedRect(fx, fy, 16, 26, 2);
    gfx.lineStyle(1, 0x333333, 0.5);
    gfx.lineBetween(fx + 1, fy + 12, fx + 15, fy + 12);
    gfx.fillStyle(0x333333, 1);
    gfx.fillRect(fx + 11, fy + 4, 2, 5);
    gfx.fillRect(fx + 11, fy + 15, 2, 5);

    // Store for idle walk destination
    this.kitchenWorldPos = { x: x + TW / 2, y: y + TH / 2 - 10 };
  }

  // ══════════════════════════════════════════════════════════════
  //  AGENT SPRITES
  // ══════════════════════════════════════════════════════════════
  _spawnAllAgents() {
    const deskIdMap = {
      'reception_0': 'reception_desk0',
      'strategy_0':  'strategy_desk0',
      'strategy_1':  'strategy_desk1',
      'strategy_2':  'strategy_desk2',
      'tech_0':      'tech_desk0',
      'growth_0':    'growth_desk0',
      'growth_1':    'growth_desk1',
    };

    AGENT_DEFS.forEach(def => {
      const mapKey = `${def.room}_${def.deskIndex}`;
      const deskId = deskIdMap[mapKey];
      if (!deskId) return;
      const pos = this.deskPositions[deskId];
      if (!pos) return;

      const agentState = AGENTS.find(a => a.id === def.id);
      const c = this._buildAgentSprite(def, agentState);

      c.setPosition(pos.x, pos.y);
      this.world.add(c);

      this.agentObjects[def.id] = {
        container: c,
        def:       def,
        homePos:   { x: pos.x, y: pos.y },
        parts:     c._parts,
        tweens:    [],
        bubbleGroup: null,
      };
    });
  }

  _buildAgentSprite(def, agentState) {
    const S = 2.4;    // pixel scale multiplier
    const status = agentState ? agentState.status : 'idle';
    const container = this.add.container(0, 0);

    // Shadow ellipse
    const shadow = this.add.graphics();
    shadow.fillStyle(PAL.shadow, 0.22);
    shadow.fillEllipse(0, S * 24, S * 18, S * 5.5);
    container.add(shadow);

    // Legs
    const legs = this.add.graphics();
    legs.fillStyle(PAL.pants, 1);
    legs.fillRect(-S * 3.5, S * 13, S * 3,   S * 8.5);  // left leg
    legs.fillRect( S * 0.5, S * 13, S * 3,   S * 8.5);  // right leg
    // Shoes
    legs.fillStyle(0x0a0a0a, 1);
    legs.fillRect(-S * 3.5, S * 20.5, S * 4, S * 2.5);
    legs.fillRect( S * 0.5, S * 20.5, S * 4, S * 2.5);
    container.add(legs);

    // Body (shirt)
    const body = this.add.graphics();
    body.fillStyle(def.shirtColor, 1);
    body.fillRoundedRect(-S * 5, S * 3.5, S * 10, S * 10, S * 1.5);
    // Collar shadow
    body.fillStyle(0x000000, 0.2);
    body.fillTriangle(-S * 1.5, S * 3.5, S * 1.5, S * 3.5, 0, S * 6.5);
    // Collar white hint
    body.fillStyle(0xf0f0f0, 0.12);
    body.fillTriangle(-S * 1.2, S * 3.5, S * 1.2, S * 3.5, 0, S * 6);
    container.add(body);

    // Left arm
    const leftArm = this.add.graphics();
    leftArm.fillStyle(def.shirtColor, 1);
    leftArm.fillRoundedRect(-S * 8, S * 4, S * 3, S * 8.5, S * 1);
    // left hand
    leftArm.fillStyle(PAL.skin, 1);
    leftArm.fillCircle(-S * 6.5, S * 12.5, S * 1.6);
    container.add(leftArm);

    // Right arm
    const rightArm = this.add.graphics();
    rightArm.fillStyle(def.shirtColor, 1);
    rightArm.fillRoundedRect(S * 5, S * 4, S * 3, S * 8.5, S * 1);
    // right hand
    rightArm.fillStyle(PAL.skin, 1);
    rightArm.fillCircle(S * 6.5, S * 12.5, S * 1.6);
    container.add(rightArm);

    // Neck
    const neck = this.add.graphics();
    neck.fillStyle(PAL.skin, 1);
    neck.fillRect(-S * 1.5, S * 1.5, S * 3, S * 3);
    container.add(neck);

    // Head
    const head = this.add.graphics();
    head.fillStyle(PAL.skin, 1);
    head.fillRoundedRect(-S * 5, -S * 7, S * 10, S * 9.5, S * 2);
    container.add(head);

    // Hair
    const hair = this.add.graphics();
    hair.fillStyle(def.hairColor, 1);
    hair.fillRoundedRect(-S * 5, -S * 7, S * 10, S * 5.5, S * 2);
    container.add(hair);

    // Eyes
    const eyes = this.add.graphics();
    eyes.fillStyle(0x1a1a2e, 1);
    eyes.fillRoundedRect(-S * 3.2, -S * 3.2, S * 2.2, S * 2,   1);
    eyes.fillRoundedRect( S * 1,   -S * 3.2,  S * 2.2, S * 2,   1);
    // Eye whites
    eyes.fillStyle(0xffffff, 0.15);
    eyes.fillRect(-S * 2.8, -S * 3.2, S * 0.8, S * 1);
    eyes.fillRect( S * 1.3, -S * 3.2, S * 0.8, S * 1);
    container.add(eyes);

    // Status indicator dot (top of head)
    const statusDot = this.add.graphics();
    this._drawStatusDot(statusDot, status);
    container.add(statusDot);

    // Agent ID text label (above status dot)
    const idLabel = this.add.text(0, -S * 14, def.id, {
      fontSize: '8px',
      fontFamily: 'Courier New, monospace',
      color: '#' + def.shirtColor.toString(16).padStart(6,'0'),
      alpha: 0.9,
    }).setOrigin(0.5, 1);
    container.add(idLabel);

    // Store parts for later manipulation
    container._parts = { shadow, legs, body, leftArm, rightArm, neck, head, hair, eyes, statusDot, idLabel };
    return container;
  }

  _drawStatusDot(gfx, status) {
    gfx.clear();
    const dotColor = STATUS_COLOR[status] || PAL.gray;
    const S = 2.4;
    if (status === 'working') {
      gfx.fillStyle(dotColor, 0.25);
      gfx.fillCircle(0, -S * 9.5, S * 3.5);
    }
    gfx.fillStyle(dotColor, 1);
    gfx.fillCircle(0, -S * 9.5, S * 1.8);
  }


  // ══════════════════════════════════════════════════════════════
  //  ANIMATIONS
  // ══════════════════════════════════════════════════════════════
  _initAllAgentAnims() {
    AGENTS.forEach(a => this._applyStatusAnim(a.id, a.status));
  }

  _applyStatusAnim(agentId, status) {
    const obj = this.agentObjects[agentId];
    if (!obj) return;

    // Stop existing tweens
    obj.tweens.forEach(t => { try { t.stop(); } catch(e){} });
    obj.tweens = [];

    // Update status dot
    if (obj.parts && obj.parts.statusDot) {
      this._drawStatusDot(obj.parts.statusDot, status);
    }

    const c = obj.container;

    if (status === 'working') {
      // Fast bob (typing simulation)
      const bob = this.tweens.add({
        targets: c,
        y: { from: c.y, to: c.y - 2.5 },
        duration: 180,
        yoyo: true,
        repeat: -1,
        ease: 'Sine.easeInOut',
      });
      // Arm wiggle for typing
      const armWiggle = this.tweens.add({
        targets: obj.parts.leftArm,
        angle: { from: -3, to: 3 },
        duration: 160,
        yoyo: true,
        repeat: -1,
        ease: 'Sine.easeInOut',
      });
      // Scale-up snap when task starts
      this.tweens.add({
        targets: c,
        scaleY: { from: 0.92, to: 1 },
        duration: 350,
        ease: 'Back.easeOut',
      });
      obj.tweens.push(bob, armWiggle);

    } else if (status === 'online') {
      // Slow idle bob
      const bob = this.tweens.add({
        targets: c,
        y: { from: c.y, to: c.y - 2 },
        duration: 2200,
        yoyo: true,
        repeat: -1,
        ease: 'Sine.easeInOut',
      });
      obj.tweens.push(bob);

    } else if (status === 'idle') {
      // Make sure scale is reset
      this.tweens.add({ targets: c, scaleY: 1, scaleX: 1, duration: 300 });
    }
  }

  // ── IDLE AGENTS WALK TO KITCHEN ──────────────────────────────
  _walkIdleAgents() {
    if (!this.kitchenWorldPos) return;
    AGENTS.forEach(a => {
      if (a.status !== 'idle') return;
      if (this.walkingAgents.has(a.id)) return;
      const obj = this.agentObjects[a.id];
      if (!obj) return;

      this.walkingAgents.add(a.id);
      const home = { ...obj.homePos };
      const kitch = this.kitchenWorldPos;

      // Stop any existing idle tweens
      obj.tweens.forEach(t => { try { t.stop(); } catch(e){} });
      obj.tweens = [];

      // Leg walk animation
      const legWalk = this.tweens.add({
        targets: obj.parts.legs,
        angle: { from: -5, to: 5 },
        duration: 300,
        yoyo: true,
        repeat: -1,
        ease: 'Sine.easeInOut',
      });
      obj.tweens.push(legWalk);

      // Walk to kitchen
      this.tweens.add({
        targets: obj.container,
        x: kitch.x,
        y: kitch.y,
        duration: Phaser.Math.Between(2800, 3500),
        ease: 'Sine.easeInOut',
        onComplete: () => {
          // Pause
          this.time.delayedCall(Phaser.Math.Between(1500, 3000), () => {
            if (a.status !== 'idle') {
              this.walkingAgents.delete(a.id);
              return;
            }
            // Walk back
            this.tweens.add({
              targets: obj.container,
              x: home.x,
              y: home.y,
              duration: Phaser.Math.Between(2800, 3500),
              ease: 'Sine.easeInOut',
              onComplete: () => {
                legWalk.stop();
                obj.parts.legs.setAngle(0);
                this.walkingAgents.delete(a.id);
                // Resume idle anim
                this._applyStatusAnim(a.id, 'idle');
              },
            });
          });
        },
      });
    });
  }

  // ── MONITOR GLOW FLICKER ─────────────────────────────────────
  _flickerMonitors() {
    // Subtle alpha flicker on working agents' heads (simulates monitor glow)
    AGENTS.forEach(a => {
      if (a.status !== 'working') return;
      const obj = this.agentObjects[a.id];
      if (!obj || !obj.parts) return;
      const alpha = 0.88 + Math.random() * 0.12;
      obj.parts.head.setAlpha(alpha);
    });
  }

  // ── ROOM LABEL PULSE ─────────────────────────────────────────
  _pulseRoomLabels() {
    this.roomLabels.forEach(({ text, baseAlpha }, i) => {
      this.tweens.add({
        targets: text,
        alpha: { from: baseAlpha, to: 1 },
        duration: 500,
        yoyo: true,
        ease: 'Sine.easeInOut',
        delay: i * 100,
        onComplete: () => text.setAlpha(baseAlpha),
      });
    });
  }

  // ── COFFEE LIGHT BLINK ───────────────────────────────────────
  _blinkCoffeeLight() {
    if (!this._coffeeGfx) return;
    this._coffeeLightOn = !this._coffeeLightOn;
    this._coffeeGfx.clear();
    const lx = this._coffeeLightX || 0;
    const ly = this._coffeeLightY || 0;
    if (this._coffeeLightOn) {
      this._coffeeGfx.fillStyle(PAL.accent, 1);
      this._coffeeGfx.fillCircle(lx, ly, 3);
      this._coffeeGfx.fillStyle(PAL.accent, 0.3);
      this._coffeeGfx.fillCircle(lx, ly, 7);
    } else {
      this._coffeeGfx.fillStyle(0x5a2510, 1);
      this._coffeeGfx.fillCircle(lx, ly, 3);
    }
  }


  // ══════════════════════════════════════════════════════════════
  //  SPEECH BUBBLES
  // ══════════════════════════════════════════════════════════════
  showBubble(agentId, text) {
    const obj = this.agentObjects[agentId];
    if (!obj || !obj.container) return;

    // Destroy existing bubble
    if (obj.bubbleGroup) {
      obj.bubbleGroup.destroy(true);
      obj.bubbleGroup = null;
    }

    const maxW = 150;
    const padX = 10, padY = 6;
    const fontSize = 9;

    // Create temporary text to measure
    const tmpText = this.add.text(0, 0, text, {
      fontSize: `${fontSize}px`,
      fontFamily: 'Courier New, monospace',
      wordWrap: { width: maxW },
    });
    const tw = Math.min(tmpText.width + padX * 2, maxW + padX * 2);
    const th = tmpText.height + padY * 2;
    tmpText.destroy();

    const group = this.add.container(obj.container.x, obj.container.y - 68);
    this.world.add(group);

    // Background rounded rect
    const bg = this.add.graphics();
    bg.fillStyle(0x1e1e1e, 0.96);
    bg.fillRoundedRect(-tw/2, -th/2, tw, th, 5);
    bg.lineStyle(1, 0x3a3a3a, 1);
    bg.strokeRoundedRect(-tw/2, -th/2, tw, th, 5);
    // Tail triangle
    bg.fillStyle(0x1e1e1e, 0.96);
    bg.fillTriangle(-6, th/2, 6, th/2, 0, th/2 + 9);
    bg.lineStyle(1, 0x3a3a3a, 0.8);
    bg.lineBetween(-6, th/2, 0, th/2 + 9);
    bg.lineBetween(6, th/2, 0, th/2 + 9);
    group.add(bg);

    const label = this.add.text(0, 0, text, {
      fontSize: `${fontSize}px`,
      fontFamily: 'Courier New, monospace',
      color: '#e0e0e0',
      wordWrap: { width: maxW },
      align: 'center',
    }).setOrigin(0.5, 0.5);
    group.add(label);

    // Fade in
    group.setAlpha(0);
    this.tweens.add({
      targets: group,
      alpha: 1,
      duration: 280,
      ease: 'Sine.easeOut',
    });

    // Fade out after 4 s
    this.time.delayedCall(3700, () => {
      this.tweens.add({
        targets: group,
        alpha: 0,
        y: group.y - 8,
        duration: 350,
        ease: 'Sine.easeIn',
        onComplete: () => {
          group.destroy(true);
          if (obj.bubbleGroup === group) obj.bubbleGroup = null;
        },
      });
    });

    obj.bubbleGroup = group;
  }


  // ══════════════════════════════════════════════════════════════
  //  ACTIVITY SIMULATION
  //  TODO: Replace entirely with Supabase real-time handlers
  // ══════════════════════════════════════════════════════════════
  _simulateTick() {
    const idx = Math.floor(Math.random() * AGENTS.length);
    const agent = AGENTS[idx];
    const roll = Math.random();

    if (roll < 0.38) {
      // Start new working task
      agent.status   = 'working';
      agent.task     = TASK_POOL[Math.floor(Math.random() * TASK_POOL.length)];
      agent.progress = Math.floor(Math.random() * 25) + 5;
      this.showBubble(agent.id, agent.task);
      addFeedEntry(agent.id, `Iniciou: ${agent.task}`);

    } else if (roll < 0.60) {
      // Advance progress
      if (agent.status === 'working' && agent.task) {
        agent.progress = Math.min(100, agent.progress + Math.floor(Math.random() * 28) + 8);
        if (agent.progress >= 100) {
          const doneTask = agent.task;
          agent.status   = 'online';
          agent.task     = '';
          agent.progress = 0;
          this.showBubble(agent.id, 'Concluído!');
          addFeedEntry(agent.id, `Concluiu: ${doneTask}`);
        } else {
          addFeedEntry(agent.id, `Progresso ${agent.progress}% — ${agent.task}`);
        }
      } else {
        agent.status   = 'online';
        agent.task     = 'Revisando contexto';
        agent.progress = 0;
        addFeedEntry(agent.id, 'Online — em revisão');
      }

    } else if (roll < 0.75) {
      // Go idle
      if (!this.walkingAgents.has(agent.id)) {
        agent.status   = 'idle';
        agent.task     = '';
        agent.progress = 0;
        addFeedEntry(agent.id, 'Pausado');
      }

    } else {
      // Online status
      agent.status   = 'online';
      agent.task     = TASK_POOL[Math.floor(Math.random() * TASK_POOL.length)];
      agent.progress = Math.floor(Math.random() * 18);
      addFeedEntry(agent.id, `Em análise: ${agent.task}`);
    }

    this._applyStatusAnim(agent.id, agent.status);
    renderSquadPanel();
    updateTopbarStats();
    rebuildTicker();

    // Schedule next simulation tick (4–7 s)
    this.time.delayedCall(Phaser.Math.Between(4000, 7000), () => this._simulateTick());
  }
}


// ═══════════════════════════════════════════════════════════════
//  HUD — HTML OVERLAY LOGIC
// ═══════════════════════════════════════════════════════════════

// ── CLOCK ────────────────────────────────────────────────────
function pad2(n) { return String(n).padStart(2,'0'); }

function updateClock() {
  const d = new Date();
  document.getElementById('clock').textContent =
    `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
}
setInterval(updateClock, 1000);
updateClock();

// ── UPTIME ────────────────────────────────────────────────────
const startTime = Date.now();
function updateUptime() {
  const sec = Math.floor((Date.now() - startTime) / 1000);
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  document.getElementById('stat-uptime').textContent = `${pad2(h)}:${pad2(m)}:${pad2(s)}`;
}
setInterval(updateUptime, 1000);

// ── COST COUNTER ──────────────────────────────────────────────
// TODO: Replace with real Supabase token usage tracking
let costAccumulator = 0;
setInterval(() => {
  const working = AGENTS.filter(a => a.status === 'working').length;
  costAccumulator += 0.000014 * Math.max(1, working);
  document.getElementById('stat-cost').textContent = '$' + costAccumulator.toFixed(4);
}, 250);

// ── TOPBAR STATS ──────────────────────────────────────────────
function updateTopbarStats() {
  const working = AGENTS.filter(a => a.status === 'working').length;
  const online  = AGENTS.filter(a => a.status !== 'idle').length;
  document.getElementById('stat-tasks').textContent  = working;
  document.getElementById('stat-agents').textContent = online;
  document.getElementById('panel-count').textContent = `${online} / ${AGENTS.length}`;
}

// ── SQUAD PANEL ───────────────────────────────────────────────
function renderSquadPanel() {
  const list = document.getElementById('agent-list');
  list.innerHTML = '';

  AGENTS.forEach(agent => {
    const def = AGENT_DEFS.find(d => d.id === agent.id);
    const shirtHex = def ? def.shirtHex : '#555555';
    const progressPct = Math.min(100, Math.max(0, agent.progress || 0));

    const barColor = agent.status === 'working' ? '#22c55e'
                   : agent.status === 'online'  ? '#f59e0b'
                   : '#2a2a2a';

    const idColor = lightenHex(shirtHex, 50);

    const row = document.createElement('div');
    row.className = 'agent-row';
    row.innerHTML = `
      <div class="agent-row-header">
        <div class="status-dot ${agent.status}"></div>
        <span class="agent-id" style="color:${idColor}">${agent.id}</span>
        <span class="agent-name-small">${def ? def.name : agent.name}</span>
      </div>
      <div class="agent-task-text">${agent.task || '<span style="color:#1e1e1e">—</span>'}</div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${progressPct}%;background:${barColor}"></div>
      </div>
    `;
    list.appendChild(row);
  });
}

// ── ACTIVITY FEED ─────────────────────────────────────────────
const feedEntries = [];
const MAX_FEED = 8;

function addFeedEntry(agentId, msg) {
  const def = AGENT_DEFS.find(d => d.id === agentId);
  const shirtHex = def ? def.shirtHex : '#888888';
  const idColor  = lightenHex(shirtHex, 60);

  const d = new Date();
  const ts = `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;

  feedEntries.unshift({ ts, agentId, msg, idColor, fresh: true });
  if (feedEntries.length > MAX_FEED) feedEntries.pop();

  // Mark older entries as stale after 1 render cycle
  setTimeout(() => { if (feedEntries.length > 0) feedEntries[0].fresh = false; }, 50);

  renderFeed();
}

function renderFeed() {
  const container = document.getElementById('feed-body');
  container.innerHTML = '';
  feedEntries.forEach((entry, i) => {
    const div = document.createElement('div');
    div.className = 'feed-entry' + (i === 0 ? ' fresh' : '');
    div.innerHTML =
      `<span class="feed-ts">${entry.ts}</span>` +
      `<span class="feed-agent-id" style="color:${entry.idColor}">${entry.agentId}</span>` +
      `<span class="feed-msg">${entry.msg}</span>`;
    container.appendChild(div);
  });
}

// Seed initial feed entries
[
  ['CA', 'Squad online — FactorOS v0.2 iniciado'],
  ['DV', 'Build FactorOS v0.2 em andamento'],
  ['CE', 'Validando missão Vigano — dados carregados'],
  ['CW', 'Copy IG Nova Lima 45% concluída'],
  ['CO', 'Alinhamento de processos Q2'],
].forEach(([id, msg]) => addFeedEntry(id, msg));

// ── TICKER ────────────────────────────────────────────────────
function rebuildTicker() {
  const track = document.getElementById('ticker-inner');
  const parts = [];
  AGENTS.forEach((a, i) => {
    const statusClass = `ticker-status-${a.status}`;
    const statusText  = a.status === 'working' ? '● WORKING'
                      : a.status === 'online'  ? '● ONLINE'
                      : '○ IDLE';
    parts.push(
      `<span class="ticker-agent">[${a.id}]</span>&nbsp;` +
      `<span class="${statusClass}">${statusText}</span>` +
      (a.task ? `&nbsp;—&nbsp;${a.task}` : '') +
      `<span class="ticker-sep">|</span>`
    );
  });
  const content = parts.join('&nbsp;&nbsp;');
  track.innerHTML = content + '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;' + content;
}
rebuildTicker();

// Periodically refresh ticker text
setInterval(rebuildTicker, 10000);

// ── COLOR UTILITY ─────────────────────────────────────────────
function lightenHex(hex, amount) {
  const num = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255, ((num >> 16) & 0xff) + amount);
  const g = Math.min(255, ((num >>  8) & 0xff) + amount);
  const b = Math.min(255, ( num        & 0xff) + amount);
  return '#' + ((1 << 24) | (r << 16) | (g << 8) | b).toString(16).slice(1);
}


// ═══════════════════════════════════════════════════════════════
//  PHASER GAME INITIALIZATION

const phaserConfig = {
  type: Phaser.AUTO,
  backgroundColor: '#060606',
  parent: 'phaser-container',
  scene: [ OfficeScene ],
  scale: {
    mode:       Phaser.Scale.RESIZE,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    width:      '100%',
    height:     '100%',
  },
  render: {
    antialias:    true,
    roundPixels:  false,
    pixelArt:     false,
  },
  fps: {
    target:          60,
    forceSetTimeOut: false,
  },
};

const game = new Phaser.Game(phaserConfig);

// Resize handler
window.addEventListener('resize', () => {
  game.scale.resize(window.innerWidth, window.innerHeight);
  // Re-center world container
  const scene = game.scene.getScene('OfficeScene');
  if (scene && scene.world) {
    scene.world.setPosition(window.innerWidth * 0.42, window.innerHeight * 0.52);
  }
});

// Make speech bubble callable from external HUD interactions
game.events.on('ready', () => {
  window.__factorHubScene = game.scene.getScene('OfficeScene');
});

</script>
