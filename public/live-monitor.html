<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FactorHub OS — Live Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #060408; overflow: hidden; font-family: 'Courier New', monospace; width: 100vw; height: 100vh; }
    #phaser-container { position: fixed; inset: 0; }

    /* TOPBAR */
    #hud-top {
      position: fixed; top: 0; left: 0; right: 0; height: 44px; z-index: 100;
      background: #06040f; border-bottom: 1px solid #1a1728;
      display: flex; align-items: center; padding: 0 16px; gap: 16px;
    }
    .logo-text { font-size: 14px; font-weight: 800; letter-spacing: 0.12em; color: #f0f0f0; }
    .logo-accent { color: #e8622a; }
    .live-pip { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pip-glow 1.5s ease-in-out infinite; }
    @keyframes pip-glow { 0%,100%{box-shadow:0 0 4px #4ade80} 50%{box-shadow:0 0 12px #4ade80,0 0 20px #4ade8066} }
    .online-badge { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: #4ade80; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; letter-spacing: 0.06em; }
    .hud-center { flex: 1; display: flex; justify-content: center; align-items: center; gap: 12px; }
    .missions-counter { background: rgba(232,98,42,0.1); border: 1px solid rgba(232,98,42,0.3); color: #e8622a; font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 6px; }
    .counter-badge { background: #e8622a; color: #fff; font-size: 10px; font-weight: 800; padding: 1px 6px; border-radius: 10px; margin-left: 6px; }
    .hud-right-top { display: flex; align-items: center; gap: 8px; }
    .ceo-avatar { width: 32px; height: 32px; border-radius: 6px; background: #3d2a60; border: 1px solid #6d4a90; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: #c9a0f0; }
    .ceo-info { font-size: 10px; color: #f0f0f0; font-weight: 700; }
    .ceo-sub { font-size: 9px; color: #5c5c7c; }

    /* RIGHT PANEL */
    #hud-right {
      position: fixed; top: 44px; right: 0; bottom: 36px; width: 200px; z-index: 100;
      background: #0d0b16; border-left: 1px solid #1a1728; overflow-y: auto;
    }
    .panel-section { padding: 12px; border-bottom: 1px solid #1a1728; }
    .panel-title { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #4c4c6c; margin-bottom: 10px; }
    .agent-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; cursor: pointer; padding: 6px; border-radius: 6px; transition: background 0.15s; }
    .agent-row:hover { background: rgba(255,255,255,0.04); }
    .agent-avatar { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; flex-shrink: 0; }
    .agent-info { flex: 1; min-width: 0; }
    .agent-name { font-size: 10px; font-weight: 700; color: #e0e0f0; }
    .agent-role { font-size: 8px; color: #5c5c7c; }
    .agent-task { font-size: 8px; color: #8888aa; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-working { background: #e8622a; box-shadow: 0 0 6px #e8622a88; }
    .dot-online { background: #4ade80; box-shadow: 0 0 6px #4ade8088; }
    .dot-idle { background: #3f3f5f; }
    .mini-progress { height: 2px; background: #1a1a2a; border-radius: 1px; margin-top: 3px; }
    .mini-progress-fill { height: 100%; border-radius: 1px; transition: width 0.5s; }

    /* Charts section */
    .chart-bar-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .chart-bar-label { font-size: 8px; color: #5c5c7c; width: 70px; text-align: right; }
    .chart-bar-track { flex: 1; height: 4px; background: #1a1a2a; border-radius: 2px; }
    .chart-bar-fill { height: 100%; border-radius: 2px; }
    .chart-value { font-size: 8px; color: #8888aa; width: 28px; text-align: right; }

    /* Missions section */
    .mission-card { background: #0f0d1c; border: 1px solid #1a1728; border-radius: 6px; padding: 8px; margin-bottom: 6px; cursor: pointer; }
    .mission-card:hover { border-color: #2a2848; }
    .mission-name { font-size: 9px; font-weight: 700; color: #e0e0f0; margin-bottom: 4px; }
    .mission-badge { display: inline-block; font-size: 7px; font-weight: 800; padding: 1px 5px; border-radius: 3px; margin-right: 4px; }
    .mission-progress-track { height: 3px; background: #1a1a2a; border-radius: 2px; margin-top: 4px; }
    .mission-progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
    .ver-todas-btn { width: 100%; padding: 6px; background: rgba(232,98,42,0.08); border: 1px solid rgba(232,98,42,0.2); border-radius: 6px; color: #e8622a; font-size: 9px; font-weight: 700; cursor: pointer; font-family: inherit; letter-spacing: 0.05em; }
    .ver-todas-btn:hover { background: rgba(232,98,42,0.15); }

    /* TICKER */
    #hud-ticker {
      position: fixed; bottom: 0; left: 0; right: 0; height: 36px; z-index: 100;
      background: #06040f; border-top: 1px solid #1a1728;
      display: flex; align-items: center; overflow: hidden;
    }
    .ticker-label { padding: 0 12px; font-size: 8px; font-weight: 800; letter-spacing: 0.1em; color: #e8622a; white-space: nowrap; border-right: 1px solid #1a1728; }
    .ticker-track { flex: 1; overflow: hidden; }
    .ticker-inner { display: flex; gap: 0; animation: ticker-scroll 60s linear infinite; white-space: nowrap; }
    @keyframes ticker-scroll { from{transform:translateX(0)} to{transform:translateX(-50%)} }
    .ticker-event { display: inline-flex; align-items: center; gap: 6px; padding: 0 24px; font-size: 10px; color: #8888aa; }
    .ticker-dot { width: 5px; height: 5px; border-radius: 50%; }
    .ticker-time { color: #4c4c6c; font-size: 9px; }

    /* AGENT MODAL */
    #agent-modal {
      position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center;
    }
    #agent-modal.open { display: flex; }
    .modal-card { background: #0d0b16; border: 1px solid #2a2848; border-radius: 12px; padding: 24px; width: 320px; }
    .modal-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .modal-avatar { width: 64px; height: 64px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800; }
    .modal-name { font-size: 16px; font-weight: 800; color: #f0f0f0; }
    .modal-role { font-size: 11px; color: #8888aa; margin-top: 2px; }
    .modal-close { margin-left: auto; background: none; border: none; color: #5c5c7c; cursor: pointer; font-size: 16px; }
    .modal-task-label { font-size: 9px; color: #5c5c7c; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .modal-task-text { font-size: 12px; font-weight: 600; color: #e0e0f0; margin-bottom: 8px; }
    .modal-progress { height: 4px; background: #1a1a2a; border-radius: 2px; }
    .modal-progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
    .modal-history { margin-top: 16px; }
    .modal-history-item { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 8px; }
    .modal-history-dot { width: 6px; height: 6px; border-radius: 50%; background: #2a2848; margin-top: 4px; flex-shrink: 0; }
    .modal-history-text { font-size: 10px; color: #5c5c7c; }
  </style>
</head>
<body>

<!-- HUD TOPBAR -->
<div id="hud-top">
  <div style="display:flex;align-items:center;gap:10px">
    <div class="live-pip"></div>

<!-- TICKER -->

</div>

<!-- AGENT MODAL -->

  <div class="modal-card">
    <div class="modal-header">
      <div class="modal-avatar" id="modal-avatar">CE</div>
      <div>
        <div class="modal-name" id="modal-name">CEO</div>

      <button class="modal-close" onclick="closeModal()">&#x2715;</button>

    <div class="modal-progress"><div class="modal-progress-fill" id="modal-progress-fill" style="width:0%"></div></div>

<!-- PHASER CANVAS -->
<div id="phaser-container"></div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>

var ISO = { tileW: 96, tileH: 48 };
function isoToScreen(ix, iy) {

    x: (ix - iy) * (ISO.tileW / 2),
    y: (ix + iy) * (ISO.tileH / 2)
  };
}

  { id:'CMO', name:'CMO',             role:'Marketing',           clothColor:0x1a4a1a, hairColor:0x0a0a0a, skinColor:0xc8956c, hairStyle:'afro',        status:'working', task:'Nova campanha Q3',          progress:80, room:'growth',    deskIndex:0, history:['ROAS 3.2x alcançado','Meta leads: 50','Campanha IG aprovada'] },
  { id:'CTO', name:'CTO',             role:'Tecnologia',          clothColor:0x0a0a12, hairColor:0x151515, skinColor:0xf0d0a8, hairStyle:'messy',       status:'working', task:'Deploy FactorOS v0.2',      progress:85, room:'tech',      deskIndex:0, history:['Build v0.2 concluído','Zero bugs críticos','CI/CD configurado'] },

var MISSIONS = [

  { name:'Processo Financeiro',   level:'N3', color:'#5b9bd5', progress:35 },
  { name:'Campanha Q3 Ativa',     level:'N1', color:'#4ade80', progress:80 },
];

var SPEECH = {

  CFO:['Viabilidade confirmada','CAC dentro do limite','Margem 68% aprovada','Projeção atualizada'],
  COO:['Sprint atualizado','Dependências mapeadas','Time coordenado','Entrega no prazo'],

  CTO:['Build v0.2 concluído','Deploy em produção','Zero bugs críticos','CI passou'],
  CW:['Copy entregue para revisão','Headlines testadas','Script do Reels pronto','Engajamento +40%'],
  CA:['Briefing enviado','Agenda atualizada','Missão coordenada','Squad alinhado'],

var TASKS = {

  CFO:['Análise financeira CFO','Projeção financeira','Revisão de margem','CAC analysis'],

  CTO:['Deploy FactorOS v0.2','Code review PR #42','Infra scaling','Security audit'],

  CA:['Coordenando agenda','Briefing de missão','Alinhamento squad','Report semanal'],
};

// ── DESK POSITIONS (isometric grid coords) ──────────────────────
var DESK_POSITIONS = {
  strategy:  [ {ix:2.5, iy:2},   {ix:1.5, iy:3.5}, {ix:4,   iy:1.5} ],
  tech:      [ {ix:9,   iy:1.5} ],

// ── CLOCK ────────────────────────────────────────────────────────
function updateClock() {
  var now = new Date();
  document.getElementById('hud-clock').textContent =
    now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

// ── MODAL ────────────────────────────────────────────────────────
function openModal(agentId) {
  var a = AGENTS.find(function(x){ return x.id === agentId; });
  if (!a) return;
  var modal = document.getElementById('agent-modal');
  document.getElementById('modal-avatar').textContent = a.id;
  document.getElementById('modal-avatar').style.background = '#' + a.clothColor.toString(16).padStart(6,'0');
  document.getElementById('modal-avatar').style.color = '#ffffff';
  document.getElementById('modal-name').textContent = a.name;
  document.getElementById('modal-role').textContent = a.role;
  document.getElementById('modal-task').textContent = a.task || '—';
  document.getElementById('modal-progress-fill').style.width = a.progress + '%';
  document.getElementById('modal-progress-fill').style.background = a.status === 'working' ? '#e8622a' : '#4ade80';
  var histEl = document.getElementById('modal-history-list');
  histEl.innerHTML = (a.history||[]).map(function(h){
    return '<div class="modal-history-item"><div class="modal-history-dot"></div><span class="modal-history-text">'+h+'</span></div>';
  }).join('');
  modal.classList.add('open');
}
function closeModal() { document.getElementById('agent-modal').classList.remove('open'); }
document.getElementById('agent-modal').addEventListener('click', function(e){ if(e.target===e.currentTarget) closeModal(); });

// ── AGENT LIST ───────────────────────────────────────────────────
function renderAgentList() {
  var el = document.getElementById('agent-list');
  el.innerHTML = AGENTS.map(function(a){
    var dotClass = a.status==='working'?'dot-working':(a.status==='online'?'dot-online':'dot-idle');
    var color = '#'+a.clothColor.toString(16).padStart(6,'0');
    var pColor = a.status==='working'?'#e8622a':'#4ade80';
    return '<div class="agent-row" onclick="openModal(\''+a.id+'\')">' +
      '<div class="agent-avatar" style="background:'+color+'18;border:1px solid '+color+'50;color:'+color+'"><span style="font-size:8px;font-weight:800">'+a.id+'</span></div>' +
      '<div class="agent-info">' +
        '<div class="agent-name">'+a.id+'</div>' +
        '<div class="agent-role">'+a.role+'</div>' +
        '<div class="agent-task">'+(a.task||'Idle')+'</div>' +
        '<div class="mini-progress"><div class="mini-progress-fill" style="width:'+a.progress+'%;background:'+pColor+'"></div></div>' +
      '</div>' +
      '<div class="status-dot '+dotClass+'"></div>' +
    '</div>';
  }).join('');
}
renderAgentList();

// ── MISSIONS ─────────────────────────────────────────────────────
function renderMissions() {
  var el = document.getElementById('mission-list');
  el.innerHTML = MISSIONS.map(function(m){
    return '<div class="mission-card">' +
      '<div class="mission-name"><span class="mission-badge" style="background:'+m.color+'22;color:'+m.color+'">'+m.level+'</span>'+m.name+'</div>' +
      '<div class="mission-progress-track"><div class="mission-progress-fill" style="width:'+m.progress+'%;background:'+m.color+'"></div></div>' +
    '</div>';

}
renderMissions();

// ── TICKER ────────────────────────────────────────────────────────
var tickerEvents = [
  {color:'#4ade80',text:'Nova missão criada por CEO',time:'2m atrás'},
  {color:'#5b9bd5',text:'Relatório financeiro gerado',time:'5m atrás'},
  {color:'#e8622a',text:'Campanha Q3 atualizada 80%',time:'8m atrás'},

  {color:'#5b9bd5',text:'CAC validado pelo CFO',time:'25m atrás'},
];
(function(){
  var inner = document.getElementById('ticker-inner');
  var doubled = tickerEvents.concat(tickerEvents);
  inner.innerHTML = doubled.map(function(e){
    return '<span class="ticker-event"><span class="ticker-dot" style="background:'+e.color+'"></span>'+e.text+'<span class="ticker-time">'+e.time+'</span></span>';
  }).join('');
})();

// ── MINI CHART ────────────────────────────────────────────────────
(function(){
  var canvas = document.getElementById('mini-chart');
  var ctx = canvas.getContext('2d');
  var w = canvas.width, h = canvas.height;
  var points = [20,35,28,42,38,55,48,60,52,70,65,72,68,80,75];
  ctx.fillStyle = '#0f0d1c'; ctx.fillRect(0,0,w,h);
  var max = Math.max.apply(null,points), min = Math.min.apply(null,points);
  var norm = function(v){ return h-4-((v-min)/(max-min))*(h-8); };
  var step = w/(points.length-1);
  ctx.beginPath(); ctx.moveTo(0,norm(points[0]));
  for(var i=1;i<points.length;i++) ctx.lineTo(i*step,norm(points[i]));
  ctx.strokeStyle='#e8622a'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.lineTo(w,h); ctx.lineTo(0,h); ctx.closePath();
  ctx.fillStyle='rgba(232,98,42,0.08)'; ctx.fill();
})();

var phaserScene = null;
var agentSprites = {};
var agentStates = {};
var bubbleList = [];

var config = {
  type: Phaser.AUTO,
  width: window.innerWidth - 200,
  height: window.innerHeight - 44 - 36,
  parent: 'phaser-container',
  backgroundColor: '#060408',
  antialias: true,
  pixelArt: false,
  scale: {
    mode: Phaser.Scale.RESIZE,
    autoCenter: Phaser.Scale.CENTER_BOTH,
  },
  scene: { preload: preloadScene, create: createScene, update: updateScene }
};

var game = new Phaser.Game(config);
window.addEventListener('resize', function(){
  game.scale.resize(window.innerWidth - 200, window.innerHeight - 80);
});

function preloadScene() { phaserScene = this; }

function createScene() {
  phaserScene = this;
  var W = this.scale.width, H = this.scale.height;
  var cx = W / 2 - 20, cy = H / 2 - 60;

  drawFloor.call(this, cx, cy);
  drawRooms.call(this, cx, cy);
  drawAllFurniture.call(this, cx, cy);
  drawAllWallDecor.call(this, cx, cy);
  drawAllPlants.call(this, cx, cy);
  drawAllLamps.call(this, cx, cy);
  createAgentSprites.call(this, cx, cy);
  setupBehaviors.call(this);
  startSimulation.call(this);
}

function updateScene() {
  var allSprites = Object.values(agentSprites);
  allSprites.sort(function(a,b){ return a.y - b.y; });
  allSprites.forEach(function(s,i){ s.setDepth(200+i); });
  bubbleList.forEach(function(b){
    if (b.sprite && b.bubble && b.bubble.active) {
      b.bubble.setPosition(b.sprite.x, b.sprite.y - 70);
    }
  });
}

// ─── FLOOR ──────────────────────────────────────────────────────
function drawFloor(cx, cy) {
  var g = this.add.graphics();
  g.setDepth(0);
  var hw = ISO.tileW/2, hh = ISO.tileH/2;

  // Large floor footprint covering all rooms
  for (var ix = -3; ix <= 22; ix++) {
    for (var iy = -1; iy <= 17; iy++) {
      var p = isoToScreen(ix, iy);
      var tx = cx + p.x, ty = cy + p.y;

      // Dark wood base - alternating planks
      var baseColor = ((ix + iy) % 2 === 0) ? 0x1a1208 : 0x160f06;
      g.fillStyle(baseColor, 1);
      g.fillPoints([
        {x:tx,     y:ty-hh},
        {x:tx+hw,  y:ty},
        {x:tx,     y:ty+hh},
        {x:tx-hw,  y:ty}
      ], true);

      // Wood grain plank lines
      g.lineStyle(0.6, 0x0d0b06, 0.7);
      g.lineBetween(tx-hw*0.6, ty-hh*0.3, tx+hw*0.6, ty+hh*0.3);
      g.lineStyle(0.4, 0x201508, 0.4);
      g.lineBetween(tx-hw*0.3, ty-hh*0.7, tx+hw*0.3, ty+hh*0.1);

      // Subtle tile border
      g.lineStyle(0.5, 0x0a0806, 0.5);
      g.strokePoints([
        {x:tx,     y:ty-hh},
        {x:tx+hw,  y:ty},
        {x:tx,     y:ty+hh},
        {x:tx-hw,  y:ty}
      ], true);
    }
  }
}

// ─── ROOMS ──────────────────────────────────────────────────────
// Layout:
//  STRATEGY ROOM  (ix:0..6,  iy:0..5)   top-left
//  TECH ROOM      (ix:7..13, iy:0..5)   top-right
//  RECEPTION      (ix:-3..-1,iy:4..9)   far left
//  GROWTH ROOM    (ix:0..6,  iy:5..10)  center-left
//  MEETING ROOM   (ix:7..13, iy:5..10)  center-right
//  KITCHEN        (ix:14..19,iy:2..9)   far right
//  LOUNGE         (ix:0..10, iy:10..16) bottom

function drawRooms(cx, cy) {
  var rooms = [
    { ix:0,   iy:0,  w:7,  h:5,  label:'STRATEGY ROOM', wallColor:0x0c0a14, accentLine:0x3d2060 },
    { ix:7,   iy:0,  w:7,  h:5,  label:'TECH ROOM',      wallColor:0x080c10, accentLine:0x0a2a1a },
    { ix:-3,  iy:4,  w:3,  h:6,  label:'RECEPTION',      wallColor:0x0a0810, accentLine:0x2a1040 },
    { ix:0,   iy:5,  w:7,  h:5,  label:'GROWTH ROOM',    wallColor:0x080c0a, accentLine:0x0a2a18 },
    { ix:7,   iy:5,  w:7,  h:5,  label:'MEETING ROOM',   wallColor:0x0a0a12, accentLine:0x1a1040 },
    { ix:14,  iy:2,  w:6,  h:7,  label:'KITCHEN',        wallColor:0x080a0c, accentLine:0x0a1828 },
    { ix:0,   iy:10, w:11, h:6,  label:'LOUNGE',         wallColor:0x0c0a08, accentLine:0x1a1008 },
  ];
  rooms.forEach(function(r){ drawRoom.call(this, r, cx, cy); }, this);
}

function drawRoom(r, cx, cy) {
  var g = this.add.graphics();
  g.setDepth(1);
  var hw = ISO.tileW/2, hh = ISO.tileH/2;
  var wallH = 64;

  // Room floor overlay (slightly lighter than plain floor)
  for (var i = r.ix; i < r.ix + r.w; i++) {
    for (var j = r.iy; j < r.iy + r.h; j++) {
      var p = isoToScreen(i, j);
      var tx = cx + p.x, ty = cy + p.y;
      var c = ((i+j)%2===0) ? 0x1d1510 : 0x19120d;
      g.fillStyle(c, 1);
      g.fillPoints([{x:tx,y:ty-hh},{x:tx+hw,y:ty},{x:tx,y:ty+hh},{x:tx-hw,y:ty}], true);
      // grain
      g.lineStyle(0.5, 0x0e0b07, 0.6);
      g.lineBetween(tx-hw*0.6, ty-hh*0.3, tx+hw*0.6, ty+hh*0.3);
      g.lineStyle(0.4, 0x221709, 0.35);
      g.lineBetween(tx-hw*0.3, ty-hh*0.6, tx+hw*0.3, ty+hh*0.1);
    }
  }

  // Back walls: draw wall for top row (iy edge) and left col (ix edge)
  // Top wall face (right-facing face on the top-most row)
  for (var ti = r.ix; ti < r.ix + r.w; ti++) {
    var tp = isoToScreen(ti, r.iy);
    var tx2 = cx + tp.x, ty2 = cy + tp.y;
    // Right face of wall block
    g.fillStyle(r.wallColor, 1);
    g.fillPoints([
      {x:tx2,     y:ty2+hh},
      {x:tx2+hw,  y:ty2},
      {x:tx2+hw,  y:ty2-wallH},
      {x:tx2,     y:ty2+hh-wallH}
    ], true);
    // Top cap
    g.fillStyle(0x0e0c18, 1);
    g.fillPoints([
      {x:tx2,     y:ty2-hh},
      {x:tx2+hw,  y:ty2},
      {x:tx2+hw,  y:ty2-wallH},
      {x:tx2,     y:ty2-hh-wallH}
    ], true);
  }

  // Left wall face (left-facing face on the left-most col)
  for (var li2 = r.iy; li2 < r.iy + r.h; li2++) {
    var lp2 = isoToScreen(r.ix, li2);
    var lx2 = cx + lp2.x, ly2 = cy + lp2.y;
    g.fillStyle(0x08060e, 1);
    g.fillPoints([
      {x:lx2-hw,  y:ly2},
      {x:lx2,     y:ly2+hh},
      {x:lx2,     y:ly2+hh-wallH},
      {x:lx2-hw,  y:ly2-wallH}
    ], true);
  }

  // Accent light strip at wall top
  g.lineStyle(1.5, r.accentLine, 0.5);
  var ws = isoToScreen(r.ix, r.iy), we = isoToScreen(r.ix+r.w, r.iy);
  g.lineBetween(cx+ws.x, cy+ws.y-wallH, cx+we.x, cy+we.y-wallH);

  // Room label at ceiling
  var lp = isoToScreen(r.ix + r.w*0.5, r.iy);
  this.add.text(cx+lp.x, cy+lp.y-wallH-6, r.label, {
    fontSize: '8px', fontFamily: 'Courier New', fontStyle: 'bold',
    color: '#ffffff', stroke: '#000000', strokeThickness: 3,
    align: 'center', letterSpacing: 2,
  }).setOrigin(0.5, 1).setDepth(300);
}

// ─── ALL FURNITURE ───────────────────────────────────────────────
function drawAllFurniture(cx, cy) {
  // STRATEGY ROOM desks (3)
  drawDesk.call(this, 2.5, 2,   0x7c3aed, cx, cy);
  drawDesk.call(this, 1.5, 3.5, 0x3b82f6, cx, cy);
  drawDesk.call(this, 4,   1.5, 0x6b7280, cx, cy);

  // TECH ROOM dual-monitor desk
  drawDualDesk.call(this, 9, 1.5, 0x22c55e, cx, cy);

  // GROWTH ROOM desks (2)
  drawDesk.call(this, 2,   7,   0x1a4a1a, cx, cy);
  drawDesk.call(this, 4,   8,   0xd4608a, cx, cy);

  // RECEPTION counter
  drawReceptionDesk.call(this, -1, 6, cx, cy);

  // MEETING ROOM oval table
  drawMeetingTable.call(this, 10.5, 7, cx, cy);

  // KITCHEN L-counter
  drawKitchen.call(this, 15, 3, cx, cy);

  // LOUNGE sofa + coffee table
  drawLounge.call(this, 2, 11, cx, cy);

  // PING PONG TABLE
  drawPingPong.call(this, 7, 13, cx, cy);
}

// ─── SINGLE DESK ─────────────────────────────────────────────────
function drawDesk(ix, iy, monitorColor, cx, cy) {
  var g = this.add.graphics();
  var p = isoToScreen(ix, iy);
  var x = cx+p.x, y = cy+p.y;
  var hw = ISO.tileW/2, hh = ISO.tileH/2;
  var dH = 22;

  // Desk surface (dark wood)
  g.fillStyle(0x2a1f0e, 1);
  g.fillPoints([
    {x:x,       y:y-hh*0.82},
    {x:x+hw*0.82, y:y},
    {x:x,       y:y+hh*0.82},
    {x:x-hw*0.82, y:y}
  ], true);
  // Surface highlight
  g.lineStyle(0.5, 0x3a2e18, 0.6);
  g.strokePoints([{x:x,y:y-hh*0.82},{x:x+hw*0.82,y:y},{x:x,y:y+hh*0.82},{x:x-hw*0.82,y:y}], true);

  // Front-left face
  g.fillStyle(0x1a1408, 1);
  g.fillPoints([
    {x:x-hw*0.82, y:y},
    {x:x,         y:y+hh*0.82},
    {x:x,         y:y+hh*0.82+dH},
    {x:x-hw*0.82, y:y+dH}
  ], true);
  // Front-right face
  g.fillStyle(0x221a0c, 1);
  g.fillPoints([
    {x:x,         y:y+hh*0.82},
    {x:x+hw*0.82, y:y},
    {x:x+hw*0.82, y:y+dH},
    {x:x,         y:y+hh*0.82+dH}
  ], true);

  // Monitor stand
  g.fillStyle(0x181818, 1);
  g.fillRect(x-3, y-hh*0.82-26, 6, 24);
  g.fillRect(x-10, y-hh*0.82-3, 20, 4);
  // Monitor frame
  g.fillStyle(0x101010, 1);
  g.fillRoundedRect(x-20, y-hh*0.82-46, 40, 26, 2);
  // Screen
  g.fillStyle(0x06050e, 1);
  g.fillRect(x-17, y-hh*0.82-43, 34, 20);
  // Screen glow
  g.fillStyle(monitorColor, 0.08);
  g.fillRect(x-17, y-hh*0.82-43, 34, 20);
  // Code lines
  g.fillStyle(monitorColor, 0.75);
  g.fillRect(x-14, y-hh*0.82-40, 18, 2);
  g.fillRect(x-14, y-hh*0.82-35, 26, 2);
  g.fillRect(x-14, y-hh*0.82-30, 12, 2);
  g.fillStyle(monitorColor, 0.4);
  g.fillRect(x-6,  y-hh*0.82-40, 14, 2);

  // Keyboard
  g.fillStyle(0x1e1e22, 1);
  g.fillRoundedRect(x-16, y-hh*0.82+2, 32, 10, 1);
  g.fillStyle(0x2a2a34, 1);
  for (var ki=0; ki<6; ki++) {
    g.fillRect(x-14+ki*5, y-hh*0.82+4, 4, 2);
    g.fillRect(x-14+ki*5, y-hh*0.82+7, 4, 2);
  }

  // Desk lamp
  g.fillStyle(0x2a1a00, 1);
  g.fillRect(x+14, y-hh*0.82-28, 3, 26);
  g.fillStyle(0xc8882a, 1);
  g.fillEllipse(x+15.5, y-hh*0.82-30, 14, 6);
  g.fillStyle(0xffd06a, 0.6);
  g.fillEllipse(x+15.5, y-hh*0.82-30, 6, 3);

  // Coffee mug
  g.fillStyle(0x1a1a22, 1);
  g.fillRoundedRect(x-24, y-hh*0.82-2, 9, 8, 1);
  g.fillStyle(monitorColor, 0.35);
  g.fillRect(x-23, y-hh*0.82-1, 7, 6);

  g.setDepth(50);

  // Monitor glow pulse
  var glowG = this.add.graphics();
  glowG.setDepth(49);
  this.tweens.add({
    targets:{v:0}, v:1,
    duration: 2200 + Math.random()*1000,
    yoyo:true, repeat:-1, ease:'Sine.easeInOut',
    onUpdate: function(tw,tgt){
      glowG.clear();
      glowG.fillStyle(monitorColor, 0.03+tgt.v*0.06);
      glowG.fillRoundedRect(x-24, y-hh*0.82-50, 48, 36, 4);
    }
  });
}

// ─── DUAL MONITOR DESK (TECH ROOM) ───────────────────────────────
function drawDualDesk(ix, iy, monitorColor, cx, cy) {
  var g = this.add.graphics();
  var p = isoToScreen(ix, iy);
  var x = cx+p.x, y = cy+p.y;
  var hw = ISO.tileW/2, hh = ISO.tileH/2;
  var dH = 22;

  // Wide desk surface
  g.fillStyle(0x2a1f0e, 1);
  g.fillPoints([
    {x:x-hw*0.6, y:y-hh*0.9},
    {x:x+hw*1.4, y:y-hh*0.1},
    {x:x+hw*0.6, y:y+hh*0.9},
    {x:x-hw*1.4, y:y+hh*0.1}
  ], true);
  g.fillStyle(0x1a1408, 1);
  g.fillPoints([
    {x:x-hw*1.4, y:y+hh*0.1},
    {x:x+hw*0.6, y:y+hh*0.9},
    {x:x+hw*0.6, y:y+hh*0.9+dH},
    {x:x-hw*1.4, y:y+hh*0.1+dH}
  ], true);

  // Two monitors
  for (var mi=0; mi<2; mi++) {
    var mx = x - 28 + mi*38;
    g.fillStyle(0x181818, 1);
    g.fillRect(mx+12, y-hh*0.9-26, 5, 22);
    g.fillRect(mx+7,  y-hh*0.9-5,  15, 4);
    g.fillStyle(0x101010, 1);
    g.fillRoundedRect(mx, y-hh*0.9-44, 34, 24, 2);
    g.fillStyle(0x06050e, 1);
    g.fillRect(mx+2, y-hh*0.9-42, 30, 18);
    g.fillStyle(monitorColor, 0.08);
    g.fillRect(mx+2, y-hh*0.9-42, 30, 18);
    g.fillStyle(monitorColor, 0.8);
    g.fillRect(mx+4, y-hh*0.9-39, 14, 2);
    g.fillRect(mx+4, y-hh*0.9-34, 22, 2);
    g.fillRect(mx+4, y-hh*0.9-29, 10, 2);
    g.fillStyle(monitorColor, 0.35);
    g.fillRect(mx+18, y-hh*0.9-39, 12, 2);
  }
  // Keyboard
  g.fillStyle(0x1e1e22, 1);
  g.fillRect(x-22, y-hh*0.9+2, 50, 10);
  // Energy drink
  g.fillStyle(0x1a3a1a, 1);
  g.fillRoundedRect(x+36, y-hh*0.9-14, 7, 14, 1);
  g.fillStyle(0x22c55e, 0.7);
  g.fillRect(x+37, y-hh*0.9-12, 5, 8);

  // Monitor glow
  var glowG2 = this.add.graphics();
  glowG2.setDepth(49);
  this.tweens.add({
    targets:{v:0}, v:1,
    duration: 2600, yoyo:true, repeat:-1, ease:'Sine.easeInOut',
    onUpdate: function(tw,tgt){
      glowG2.clear();
      glowG2.fillStyle(monitorColor, 0.04+tgt.v*0.08);
      glowG2.fillRoundedRect(x-32, y-hh*0.9-52, 80, 44, 5);
    }
  });

  g.setDepth(50);
}

// ─── RECEPTION DESK ──────────────────────────────────────────────
function drawReceptionDesk(ix, iy, cx, cy) {
  var g = this.add.graphics();
  var p = isoToScreen(ix, iy);
  var x = cx+p.x, y = cy+p.y;
  var hw = ISO.tileW/2, hh = ISO.tileH/2;
  var dH = 34;

  // Counter top (L-shape)
  g.fillStyle(0x2a1f0e, 1);
  g.fillPoints([
    {x:x-hw*1.8, y:y-hh*0.1},
    {x:x+hw*0.4, y:y-hh*1.3},
    {x:x+hw*0.4, y:y-hh*1.3+dH},
    {x:x-hw*1.8, y:y-hh*0.1+dH}
  ], true);
  // Counter side
  g.fillStyle(0x1a1408, 1);
  g.fillPoints([
    {x:x-hw*1.8, y:y-hh*0.1},
    {x:x-hw*1.8, y:y-hh*0.1+dH},
    {x:x-hw*1.8, y:y-hh*0.1+dH+20},
    {x:x-hw*1.8, y:y-hh*0.1+20}
  ], true);
  // Front face
  g.fillStyle(0x221a0c, 1);
  g.fillPoints([
    {x:x-hw*1.8, y:y-hh*0.1+dH},
    {x:x+hw*0.4, y:y-hh*1.3+dH},
    {x:x+hw*0.4, y:y-hh*1.3+dH+20},
    {x:x-hw*1.8, y:y-hh*0.1+dH+20}
  ], true);

  // Monitor
  g.fillStyle(0x101010, 1);
  g.fillRoundedRect(x-18, y-hh-46, 28, 20, 2);
  g.fillStyle(0x06050e, 1);
  g.fillRect(x-16, y-hh-44, 24, 16);
  g.fillStyle(0xe8622a, 0.5);
  g.fillRect(x-14, y-hh-42, 16, 2);
  g.fillRect(x-14, y-hh-38, 20, 2);
  g.fillRect(x-14, y-hh-34, 12, 2);

  // "FH" logo on wall behind desk
  this.add.text(x-6, y-hh-68, 'FH', {
    fontSize: '18px', fontFamily: 'Courier New', fontStyle: 'bold',
    color: '#e8622a', stroke: '#000000', strokeThickness: 3,
    shadow: { offsetX:0, offsetY:0, color:'#e8622a', blur:12, fill:true }
  }).setOrigin(0.5).setDepth(250);

  // FactorHub label below
  this.add.text(x-6, y-hh-52, 'FACTORHUB', {
    fontSize: '6px', fontFamily: 'Courier New', fontStyle: 'bold',
    color: '#e8622a66', letterSpacing: 2
  }).setOrigin(0.5).setDepth(250);

  g.setDepth(50);
}

  g.fillStyle(0x1a4a1a, 1); g.fillCircle(x+9, y-13, 7);

// ─── WORLD MAP ───────────────────────────────────────────────────
function drawWorldMap(ix, iy, cx, cy) {
  var g = this.add.graphics();
  var p = isoToScreen(ix, iy);
  var x = cx+p.x, y = cy+p.y-42;

  // Frame
  g.fillStyle(0x080814, 1);
  g.fillRoundedRect(x-52, y-46, 104, 60, 3);
  g.lineStyle(1.5, 0x1a1a30, 1);
  g.strokeRoundedRect(x-52, y-46, 104, 60, 3);

  // Grid
  g.lineStyle(0.5, 0x16162a, 0.9);
  for (var gi=0; gi<6; gi++) {
    g.lineBetween(x-48+gi*19, y-44, x-48+gi*19, y+12);
  }
  for (var gj=0; gj<4; gj++) {
    g.lineBetween(x-48, y-44+gj*18, x+48, y-44+gj*18);
  }

  // Continents (dark blue-teal blobs)
  var conts = [
    {x:x-40, y:y-38, w:26, h:18, c:0x0d2a3a},
    {x:x-14, y:y-40, w:14, h:22, c:0x0d1e2a},
    {x:x+2,  y:y-36, w:22, h:20, c:0x0a1e30},
    {x:x+26, y:y-28, w:18, h:14, c:0x0d2218},
    {x:x-48, y:y-20, w:10, h:8,  c:0x16162a},
    {x:x-38, y:y-18, w:14, h:16, c:0x0d1a2a},
  ];
  conts.forEach(function(c){
    g.fillStyle(c.c, 1);
    g.fillRoundedRect(c.x, c.y, c.w, c.h, 4);
    // Continent highlight
    g.fillStyle(0x1a3a4a, 0.3);
    g.fillRoundedRect(c.x+2, c.y+2, c.w-4, 4, 2);
  });

  // Location pins
  g.fillStyle(0xe8622a, 1); g.fillCircle(x-22, y-24, 4);
  g.fillStyle(0xe8622a, 0.3); g.fillCircle(x-22, y-24, 8);
  g.fillStyle(0x4ade80, 1); g.fillCircle(x+18, y-14, 3);
  g.fillStyle(0x4ade80, 0.3); g.fillCircle(x+18, y-14, 6);

  // Pulsing ping
  var pingG = this.add.graphics();
  pingG.setDepth(81);
  this.tweens.add({
    targets:{r:4,a:0.7}, r:16, a:0,
    duration:2200, repeat:-1, ease:'Sine.easeOut',
    onUpdate:function(tw,tgt){
      pingG.clear();
      pingG.lineStyle(1.5, 0xe8622a, tgt.a);
      pingG.strokeCircle(x-22, y-24, tgt.r);
    }
  });

  this.add.text(x, y+16, 'WORLD PRESENCE', {
    fontSize:'6px', fontFamily:'Courier New', fontStyle:'bold',
    color:'#1a1a3a', letterSpacing:1
  }).setOrigin(0.5,0).setDepth(201);

  g.setDepth(80);
}

// ─── MOODBOARD / GALLERY (GROWTH ROOM) ───────────────────────────
function drawMoodboard(ix, iy, cx, cy) {
  var g = this.add.graphics();
  var p = isoToScreen(ix, iy);

  g.strokeRoundedRect(x-48, y-56, 96, 70, 3);

    g.fillCircle(x-44+(di%5)*20, y-52+Math.floor(di/5)*16, 1.5);
  }

  // Colorful framed pictures and post-its
  var artItems = [
    {x:x-44, y:y-54, w:26, h:18, c:0x1a2a3a, type:'photo'},
    {x:x-16, y:y-54, w:20, h:16, c:0x2a1a3a, type:'photo'},
    {x:x+6,  y:y-52, w:22, h:20, c:0x1a3a1a, type:'photo'},
    {x:x+30, y:y-54, w:16, h:18, c:0x2a2a1a, type:'photo'},
    {x:x-44, y:y-34, w:18, h:14, c:0xfbbf24, type:'note',  op:0.85},
    {x:x-24, y:y-36, w:22, h:16, c:0xf472b6, type:'note',  op:0.80},
    {x:x+0,  y:y-32, w:20, h:14, c:0x60a5fa, type:'note',  op:0.80},
    {x:x+22, y:y-34, w:18, h:16, c:0x4ade80, type:'note',  op:0.80},
    {x:x-44, y:y-18, w:26, h:16, c:0xfb923c, type:'note',  op:0.75},
    {x:x-16, y:y-18, w:20, h:14, c:0xa78bfa, type:'note',  op:0.75},
    {x:x+6,  y:y-16, w:22, h:16, c:0xe8622a, type:'note',  op:0.80},
    {x:x+30, y:y-18, w:16, h:14, c:0xfbbf24, type:'note',  op:0.75},
  ];

  artItems.forEach(function(it){
    var op = it.op !== undefined ? it.op : 0.9;
    g.fillStyle(it.c, op);
    g.fillRoundedRect(it.x, it.y, it.w, it.h, 1);
    if (it.type === 'photo') {
      // Fake photo content
      g.fillStyle(0x000000, 0.2);
      g.fillRect(it.x+3, it.y+4, it.w-6, 3);
      g.fillRect(it.x+3, it.y+9, it.w*0.6, 3);
    } else {
      // Post-it lines
      g.fillStyle(0x000000, 0.2);
      g.fillRect(it.x+3, it.y+4, it.w-6, 2);
      g.fillRect(it.x+3, it.y+8, it.w-8, 2);
    }
    // Thumbtack
    g.fillStyle(0xffffff, 0.9);
    g.fillCircle(it.x+it.w/2, it.y+2, 2.5);
    g.fillStyle(0xcccccc, 1);
    g.fillCircle(it.x+it.w/2, it.y+2, 1.5);

  g.setDepth(80);
}

  var plantPos = [
    {ix:0, iy:0}, {ix:7, iy:0}, {ix:13, iy:2}, {ix:14, iy:9},
    {ix:-3, iy:4}, {ix:0, iy:10}, {ix:11, iy:10},
    {ix:6, iy:14}, {ix:19, iy:2},
  ];
  plantPos.forEach(function(pp){
    drawPlant(g, pp.ix, pp.iy, cx, cy);
  });
}

function drawPlant(g, ix, iy, cx, cy) {
  var p = isoToScreen(ix, iy);
  var x = cx+p.x, y = cy+p.y;

  g.fillStyle(0x2a1208, 1); g.fillRoundedRect(x-8, y-4, 16, 16, 2);
  g.fillStyle(0x1a0a06, 1); g.fillRect(x-9, y+4, 18, 8);
  g.fillStyle(0x3a1a0a, 1); g.fillRect(x-7, y-2, 14, 6);
  g.fillStyle(0x1a0e06, 1); g.fillEllipse(x, y-3, 14, 6);

  g.fillStyle(0x1a4a1a, 1); g.fillCircle(x, y-20, 13);
  g.fillStyle(0x0e3a0e, 1); g.fillCircle(x-10, y-13, 8);
  g.fillStyle(0x0e3a0e, 1); g.fillCircle(x+10, y-13, 8);
  g.fillStyle(0x286a28, 0.8); g.fillCircle(x, y-28, 9);
  g.fillStyle(0x286a28, 0.6); g.fillCircle(x-7, y-26, 5);
  g.fillStyle(0x286a28, 0.6); g.fillCircle(x+7, y-26, 5);
  g.fillStyle(0x3a8a3a, 0.3); g.fillCircle(x-4, y-24, 5);
}

// ─── LAMPS (floor standing + warm glow circles) ───────────────────
function drawAllLamps(cx, cy) {
  var lampDefs = [
    // Strategy room
    {ix:1,   iy:1,   glow:80},
    {ix:4.5, iy:3.5, glow:80},
    // Tech room
    {ix:12,  iy:1,   glow:70},
    // Growth room
    {ix:1,   iy:6,   glow:70},
    {ix:5.5, iy:9,   glow:70},
    // Reception
    {ix:-2,  iy:5,   glow:60},
    // Lounge
    {ix:1,   iy:14,  glow:80},
    // Meeting room lamp (done via table)
  ];

  var g = this.add.graphics();
  g.setDepth(45);

  lampDefs.forEach(function(lamp){
    var lp = isoToScreen(lamp.ix, lamp.iy);
    var lx = cx + lp.x;
    var ly = cy + lp.y;

    // Large soft floor glow circle (on floor level)
    g.fillStyle(0xc8882a, 0.10);
    g.fillCircle(lx, ly+8, lamp.glow);
    g.fillStyle(0xc8882a, 0.20);
    g.fillCircle(lx, ly+8, lamp.glow*0.4);
    g.fillStyle(0xc8882a, 0.30);
    g.fillCircle(lx, ly+8, lamp.glow*0.15);

    // Lamp post
    g.fillStyle(0x1e1610, 1);
    g.fillRect(lx-3, ly-54, 6, 54);

    // Lamp base
    g.fillStyle(0x2a2010, 1);
    g.fillEllipse(lx, ly+2, 18, 7);

    // Lamp head / shade
    g.fillStyle(0x362a10, 1);
    g.fillEllipse(lx, ly-52, 28, 14);
    g.fillStyle(0xc8882a, 1);
    g.fillEllipse(lx, ly-56, 22, 9);
    g.fillStyle(0xffd06a, 0.7);
    g.fillEllipse(lx, ly-56, 10, 4);

    // Animated point light for dynamic glow
    var pl = phaserScene.add.pointlight(lx, ly-50, 0xc8882a, lamp.glow*1.4, 0.4, 0.04);
    pl.setDepth(46);
  });
}

// ─── DRAW CHARACTER FRAME ─────────────────────────────────────────
function drawCharacterFrame(g, agentDef, frameType, frameIndex) {
  var S = 2.5;
  var W = Math.round(9*S);
  var H = Math.round(22*S);

  var bobY = (frameType==='idle' && frameIndex%2===1) ? 1 : 0;
  var armFwd = (frameType==='type') ? 2.5 : 0;
  var leftLegY  = (frameType==='walk') ? (frameIndex%2===0 ? -2.5 : 2.5) : 0;
  var rightLegY = (frameType==='walk') ? (frameIndex%2===0 ? 2.5 : -2.5) : 0;

  g.clear();

  // Shadow
  g.fillStyle(0x000000, 0.22);
  g.fillEllipse(W/2, H+4, W*1.3, 5);

  // Shoes
  g.fillStyle(0x0a0a0a, 1);
  g.fillRoundedRect(W/2-3.5*S, H-1.5*S+bobY+leftLegY,  3.5*S, 2*S, 1);
  g.fillRoundedRect(W/2+0.2*S, H-1.5*S+bobY+rightLegY, 3.5*S, 2*S, 1);

  // Legs
  g.fillStyle(0x111111, 1);
  g.fillRect(W/2-3*S,   H-6*S+bobY, 2.5*S, 5*S+leftLegY);
  g.fillRect(W/2+0.5*S, H-6*S+bobY, 2.5*S, 5*S+rightLegY);

  // Body
  g.fillStyle(agentDef.clothColor, 1);
  g.fillRoundedRect(W/2-3.5*S, H-14*S+bobY, 7*S, 8.5*S, 1);

  // Shirt collar
  var lighter = Phaser.Display.Color.IntegerToColor(agentDef.clothColor).lighten(22).color;
  g.fillStyle(lighter, 1);
  g.fillRect(W/2-1*S, H-14*S+bobY, 2*S, 5*S);

  // Left arm
  g.fillStyle(agentDef.clothColor, 1);
  g.fillRoundedRect(W/2-5.8*S, H-13.5*S+bobY, 2.5*S, 5.5*S+armFwd, 1);
  // Right arm
  g.fillRoundedRect(W/2+3.2*S, H-13.5*S+bobY, 2.5*S, 5.5*S+armFwd, 1);

  // Hands
  g.fillStyle(agentDef.skinColor, 1);
  g.fillRect(W/2-5.5*S, H-7.5*S+bobY+armFwd, 2.2*S, 1.8*S);
  g.fillRect(W/2+3.4*S, H-7.5*S+bobY+armFwd, 2.2*S, 1.8*S);

  // Neck
  g.fillStyle(agentDef.skinColor, 1);
  g.fillRect(W/2-1.2*S, H-15.5*S+bobY, 2.4*S, 2*S);

  // Head
  g.fillStyle(agentDef.skinColor, 1);
  g.fillRoundedRect(W/2-3.5*S, H-23.5*S+bobY, 7*S, 8.5*S, 2);

  // Eyes white
  g.fillStyle(0xffffff, 1);
  g.fillRect(W/2-2.5*S, H-20*S+bobY, 2*S, 1.6*S);
  g.fillRect(W/2+0.5*S, H-20*S+bobY, 2*S, 1.6*S);
  // Pupils
  g.fillStyle(0x111111, 1);
  g.fillRect(W/2-1.8*S, H-20*S+bobY, 1*S, 1.6*S);
  g.fillRect(W/2+1.0*S, H-20*S+bobY, 1*S, 1.6*S);
  // Mouth
  g.fillStyle(0x6a3a1a, 0.55);
  g.fillRect(W/2-1.1*S, H-17.5*S+bobY, 2.2*S, 0.9*S);

  // Hair
  g.fillStyle(agentDef.hairColor, 1);
  var hs = agentDef.hairStyle;
  if (hs==='straight'||hs==='wavy') {
    g.fillRoundedRect(W/2-3.5*S, H-25*S+bobY, 7*S, 4*S, 2);
    g.fillRect(W/2-3.5*S, H-22.5*S+bobY, 1.5*S, 2.5*S);
    g.fillRect(W/2+2*S, H-22.5*S+bobY, 1.5*S, 2.5*S);
    if (hs==='wavy') {
      g.fillCircle(W/2-1.5*S, H-25.5*S+bobY, 1.6*S);
      g.fillCircle(W/2+1.5*S, H-25.5*S+bobY, 1.6*S);
    }
  } else if (hs==='afro') {
    g.fillCircle(W/2, H-23*S+bobY, 5*S);
    g.fillCircle(W/2-4*S, H-22*S+bobY, 3.2*S);
    g.fillCircle(W/2+4*S, H-22*S+bobY, 3.2*S);
    g.fillCircle(W/2, H-27*S+bobY, 3.2*S);
  } else if (hs==='afro-short') {
    g.fillRoundedRect(W/2-3.8*S, H-25.5*S+bobY, 7.6*S, 5.5*S, 2.5);
    g.fillCircle(W/2-3*S, H-23.5*S+bobY, 2.2*S);
    g.fillCircle(W/2+3*S, H-23.5*S+bobY, 2.2*S);
    g.fillCircle(W/2, H-26.5*S+bobY, 2.5*S);
  } else if (hs==='messy') {
    g.fillRect(W/2-3.5*S, H-24.5*S+bobY, 7*S, 3.8*S);
    for (var sp=0; sp<5; sp++) {
      g.fillTriangle(
        W/2-3*S+sp*1.5*S, H-24.5*S+bobY,
        W/2-2.5*S+sp*1.5*S, H-27.5*S+bobY,
        W/2-2*S+sp*1.5*S, H-24.5*S+bobY
      );
    }
    g.fillCircle(W/2-3.5*S, H-23*S+bobY, 1.5*S);
  } else if (hs==='long') {
    g.fillRoundedRect(W/2-3.5*S, H-25.5*S+bobY, 7*S, 4.5*S, 2);
    g.fillRoundedRect(W/2-5.2*S, H-24*S+bobY, 2.2*S, 12*S, 1);
    g.fillRoundedRect(W/2+3*S, H-24*S+bobY, 2.2*S, 12*S, 1);
    g.fillCircle(W/2-4.2*S, H-13*S+bobY, 2*S);
    g.fillCircle(W/2+4.2*S, H-13*S+bobY, 2*S);
  } else if (hs==='bald') {
    g.fillStyle(agentDef.hairColor, 0.45);
    g.fillRoundedRect(W/2-3*S, H-25*S+bobY, 6*S, 2*S, 1);
  }

  // Status dot
  var dotColor = agentDef.status==='working' ? 0xe8622a : (agentDef.status==='online' ? 0x4ade80 : 0x3f3f5f);
  g.fillStyle(dotColor, 1);
  g.fillCircle(W/2, H-27*S+bobY, 2.5);
}

// ─── CREATE AGENT SPRITES ─────────────────────────────────────────
function createAgentSprites(cx, cy) {
  var self = this;
  AGENTS.forEach(function(agentDef){
    var deskPos = (DESK_POSITIONS[agentDef.room]||[])[agentDef.deskIndex] || {ix:5,iy:5};
    var sp = isoToScreen(deskPos.ix, deskPos.iy);
    var startX = cx+sp.x, startY = cy+sp.y-28;

    var charG = self.add.graphics();
    drawCharacterFrame(charG, agentDef, 'idle', 0);

    var nameLabel = self.add.text(0, 0, agentDef.id, {
      fontSize:'8px', fontFamily:'Courier New', fontStyle:'bold',
      color:'#'+agentDef.clothColor.toString(16).padStart(6,'0'),
      stroke:'#000000', strokeThickness:3,
    }).setOrigin(0.5, 1);

    var S = 2.5;
    var halfW = Math.round(9*S)/2;
    var charH  = Math.round(22*S);
    charG.setPosition(-halfW, -charH);
    nameLabel.setPosition(0, -charH-4);

    var container = self.add.container(startX, startY, [charG, nameLabel]);
    container.setDepth(200);

    agentSprites[agentDef.id] = container;
    agentStates[agentDef.id] = {
      agentDef:   agentDef,
      container:  container,
      charG:      charG,
      nameLabel:  nameLabel,
      frameIndex: 0,
      homeX:      startX,
      homeY:      startY,
      isAtHome:   true,
      walkTween:  null,
    };

    startIdleAnim.call(self, agentDef.id);

    // Click to open modal
    container.setInteractive(new Phaser.Geom.Rectangle(-halfW, -charH-4, halfW*2, charH+4), Phaser.Geom.Rectangle.Contains);
    container.on('pointerdown', function(){ openModal(agentDef.id); });
    container.on('pointerover', function(){ container.setScale(1.08); });
    container.on('pointerout',  function(){ container.setScale(1); });
  });
}

function startIdleAnim(agentId) {
  var state = agentStates[agentId];
  if (!state) return;
  var bobAmt = (state.agentDef.status==='working') ? 1.5 : 0.7;
  var bobDur = (state.agentDef.status==='working') ? 280 : 2500;
  this.tweens.add({
    targets: state.container,
    y: state.container.y + bobAmt,
    duration: bobDur, yoyo:true, repeat:-1, ease:'Sine.easeInOut'
  });
}

// ─── BEHAVIORS ────────────────────────────────────────────────────
function setupBehaviors() {
  var self = this;

  // Redraw character frames at ~5fps
  self.time.addEvent({
    delay: 200,
    callback: function(){
      AGENTS.forEach(function(a){
        var state = agentStates[a.id];
        if (!state) return;
        state.frameIndex = (state.frameIndex+1) % 4;
        var ft = (a.status==='working') ? 'type' : (state.walkTween ? 'walk' : 'idle');
        drawCharacterFrame(state.charG, state.agentDef, ft, state.frameIndex);
      });
    },
    loop: true
  });

  // Idle agents occasionally walk to kitchen/lounge
  self.time.addEvent({
    delay: 10000,
    callback: function(){
      AGENTS.forEach(function(a){
        var state = agentStates[a.id];
        if (!state || a.status!=='idle' || !state.isAtHome) return;
        if (Math.random() < 0.3) walkToPoint.call(self, a.id);
      });
    },
    loop: true
  });
}

function walkToPoint(agentId) {
  var state = agentStates[agentId];
  if (!state || state.walkTween) return;

  var W = phaserScene.scale.width, H = phaserScene.scale.height;
  var cx = W/2-20, cy = H/2-60;
  var destinations = [{ix:16,iy:4},{ix:3,iy:12},{ix:15,iy:4}];
  var dest = destinations[Math.floor(Math.random()*destinations.length)];
  var dp = isoToScreen(dest.ix, dest.iy);
  var tx = cx+dp.x, ty = cy+dp.y-28;

  state.isAtHome = false;
  var self = phaserScene;
  state.walkTween = self.tweens.add({
    targets: state.container, x:tx, y:ty,
    duration: 2800+Math.random()*1000, ease:'Linear',
    onComplete: function(){
      self.time.delayedCall(2500+Math.random()*2500, function(){
        if (!state.container.active) return;
        state.walkTween = self.tweens.add({
          targets: state.container, x:state.homeX, y:state.homeY,
          duration: 2800, ease:'Linear',
          onComplete: function(){ state.isAtHome=true; state.walkTween=null; }
        });
      });
    }
  });
}

// ─── SPEECH BUBBLES ───────────────────────────────────────────────
function showSpeechBubble(agentId, text) {
  var state = agentStates[agentId];
  if (!state) return;

  // Remove existing bubble for this agent
  bubbleList = bubbleList.filter(function(b){
    if (b.agentId===agentId) { if(b.bubble&&b.bubble.active) b.bubble.destroy(); return false; }
    return true;
  });

  var truncated = text.length>32 ? text.slice(0,32)+'…' : text;
  var bW = Math.max(78, truncated.length*5.6+18);
  var bH = 26;

  var bg = phaserScene.add.graphics();
  bg.fillStyle(0x1a1828, 0.96);
  bg.fillRoundedRect(-bW/2, -bH, bW, bH, 4);
  bg.lineStyle(1, 0x3a3860, 0.9);
  bg.strokeRoundedRect(-bW/2, -bH, bW, bH, 4);
  bg.fillStyle(0x1a1828, 0.96);
  bg.fillTriangle(-5,0, 5,0, 0,9);

  var txt = phaserScene.add.text(0, -bH/2-1, truncated, {
    fontSize:'8px', fontFamily:'Courier New', color:'#e0e0f0', align:'center'
  }).setOrigin(0.5, 0.5);

  var S = 2.5;
  var charH = Math.round(22*S);
  var bub = phaserScene.add.container(state.container.x, state.container.y-70, [bg, txt]);
  bub.setDepth(500);

  // Fade in
  bub.setAlpha(0);
  phaserScene.tweens.add({ targets:bub, alpha:1, duration:180, ease:'Linear' });

  // Auto destroy after 3.5s
  phaserScene.time.delayedCall(3500, function(){
    if (!bub.active) return;
    phaserScene.tweens.add({
      targets:bub, alpha:0, duration:300, ease:'Linear',
      onComplete: function(){ if(bub.active) bub.destroy(); }
    });
    bubbleList = bubbleList.filter(function(b){ return b.agentId!==agentId; });
  });

  bubbleList.push({ agentId:agentId, sprite:state.container, bubble:bub });
}

// ─── SIMULATION ───────────────────────────────────────────────────
function startSimulation() {
  var self = this;

  // Occasional speech bubbles
  self.time.addEvent({
    delay: 4500,
    callback: function(){
      var a = AGENTS[Math.floor(Math.random()*AGENTS.length)];
      var lines = SPEECH[a.id];
      if (lines && lines.length) {
        showSpeechBubble(a.id, lines[Math.floor(Math.random()*lines.length)]);
      }
    },
    loop: true
  });

  // Cycle task text every 20s
  self.time.addEvent({
    delay: 20000,
    callback: function(){
      AGENTS.forEach(function(a){
        if (a.status==='working') {
          var tasks = TASKS[a.id];
          if (tasks && tasks.length) {
            a.task = tasks[Math.floor(Math.random()*tasks.length)];
          }
          a.progress = Math.min(100, a.progress + Math.floor(Math.random()*8));
        }
      });
      renderAgentList();
    },
    loop: true
  });
}
