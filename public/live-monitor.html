<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FactorHub OS — Live Monitor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0812;font-family:'Courier New',monospace}

/* ── Office Container ── */
#office{position:fixed;inset:0;overflow:hidden}
#bg{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;object-position:center}
#chars{position:absolute;inset:0;pointer-events:none}

/* ── Sprite Characters ── */
.agent{
  position:absolute;
  width:110px;height:128px;
  image-rendering:pixelated;
  image-rendering:-moz-crisp-edges;
  background-repeat:no-repeat;
  background-size:768px 512px; /* 50% of 1536x1024 */
  transform:translate(-50%,-100%);
  transition:left 2.5s linear,top 2.5s linear;
  cursor:pointer;
  pointer-events:all;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.7));
}
.agent:hover{filter:drop-shadow(0 4px 16px rgba(255,255,255,.3)) drop-shadow(0 4px 8px rgba(0,0,0,.7));z-index:50}

/* Frame width at 50% = 219*0.5 ≈ 109.5 → 110px */
/* Row Y at 50%: row0=0, row1=-128, row2=-256, row3=-384 */

@keyframes anim-idle{
  0%{background-position-x:0px}
  33%{background-position-x:-110px}
  67%{background-position-x:-220px}
  100%{background-position-x:0px}
}
@keyframes anim-walk{
  0%  {background-position-x:0px}
  20% {background-position-x:-110px}
  40% {background-position-x:-220px}
  60% {background-position-x:-330px}
  80% {background-position-x:-440px}
  100%{background-position-x:0px}
}
@keyframes anim-sit{
  0%  {background-position-x:0px}
  25% {background-position-x:-110px}
  50% {background-position-x:-220px}
  75% {background-position-x:-330px}
  100%{background-position-x:0px}
}
@keyframes anim-think{
  0%  {background-position-x:0px}
  50% {background-position-x:-110px}
  100%{background-position-x:0px}
}

.state-idle{animation:anim-idle 1.6s steps(1) infinite;background-position-y:0px}
.state-walk{animation:anim-walk 0.55s steps(1) infinite;background-position-y:-128px}
.state-sit {animation:anim-sit  1.1s steps(1) infinite;background-position-y:-256px}
.state-think{animation:anim-think 1.4s steps(1) infinite;background-position-y:-384px}

/* ── Speech Bubble ── */
.bubble{
  position:absolute;
  bottom:calc(100% + 6px);
  left:50%;
  transform:translateX(-50%);
  background:rgba(10,8,18,.92);
  border:1px solid rgba(255,255,255,.15);
  border-radius:8px;
  padding:6px 10px;
  font-size:10px;
  color:#e0e0f0;
  white-space:nowrap;
  max-width:180px;
  white-space:normal;
  text-align:center;
  line-height:1.4;
  pointer-events:none;
  opacity:0;
  transition:opacity .3s;
  z-index:10;
}
.bubble::after{
  content:'';position:absolute;top:100%;left:50%;
  transform:translateX(-50%);
  border:5px solid transparent;
  border-top-color:rgba(255,255,255,.15);
}
.agent:hover .bubble,.agent.talking .bubble{opacity:1}

/* Agent ID badge */
.agent-id{
  position:absolute;
  top:-28px;left:50%;transform:translateX(-50%);
  font-size:8px;font-weight:900;
  padding:2px 7px;border-radius:4px;
  letter-spacing:.06em;
  opacity:.9;
  pointer-events:none;
}

/* Working pulse ring */
.ring{
  position:absolute;
  bottom:2px;left:50%;transform:translateX(-50%);
  width:10px;height:10px;border-radius:50%;
  display:none;
}
.agent.working .ring{display:block;background:#22c55e;animation:pulse-ring 1.2s ease-out infinite}
@keyframes pulse-ring{
  0%{box-shadow:0 0 0 0 rgba(34,197,94,.6)}
  70%{box-shadow:0 0 0 10px rgba(34,197,94,0)}
  100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}
}

/* ── Top Bar ── */
#topbar{
  position:fixed;top:0;left:0;right:320px;height:44px;
  background:rgba(6,4,14,.88);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;padding:0 16px;gap:14px;
  z-index:200;
}
.logo{font-size:14px;font-weight:900;letter-spacing:.12em;color:#f0f0f0}
.logo span{color:#c9a84c}
.pip{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:glow-pip 1.5s ease-in-out infinite}
@keyframes glow-pip{0%,100%{box-shadow:0 0 4px #22c55e}50%{box-shadow:0 0 14px #22c55e,0 0 28px #22c55e55}}
.badge{font-size:9px;font-weight:800;padding:2px 8px;border-radius:4px;letter-spacing:.07em}
.badge-green{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:#22c55e}
.badge-orange{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);color:#c9a84c}
#clock{font-size:10px;color:#4a4a6a;margin-left:auto}
#mission-badge{font-size:10px;color:#c9a84c;font-weight:700}

/* ── Right Panel ── */
#panel{
  position:fixed;top:0;right:0;bottom:36px;width:320px;
  background:rgba(8,6,18,.95);backdrop-filter:blur(16px);
  border-left:1px solid rgba(255,255,255,.07);
  display:flex;flex-direction:column;overflow:hidden;
  z-index:200;
}
.panel-sec{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
.panel-title{font-size:8px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#3a3a5a;margin-bottom:10px}

/* Agent list */
.arow{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:7px;cursor:pointer;margin-bottom:3px;transition:background .12s}
.arow:hover{background:rgba(255,255,255,.04)}
.aav{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;flex-shrink:0}
.aname{font-size:10px;font-weight:700;color:#d0d0e8}
.atask{font-size:8.5px;color:#4a4a6a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.adot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-left:auto}

/* Cost chart */
#cost-chart{width:100%;height:48px;border-radius:4px}

/* Missions list */
.mrow{padding:7px 8px;border-radius:6px;margin-bottom:4px;cursor:pointer;border:1px solid transparent;transition:all .12s}
.mrow:hover{background:rgba(255,255,255,.04)}
.mname{font-size:10px;font-weight:600;color:#d0d0e8;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mprog{height:2px;background:#1a1535;border-radius:1px}
.mprogf{height:100%;border-radius:1px;transition:width .5s}

/* ── Bottom Ticker ── */
#ticker{
  position:fixed;bottom:0;left:0;right:0;height:36px;
  background:rgba(6,4,14,.9);border-top:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;overflow:hidden;z-index:200;
}
.tlbl{padding:0 12px;font-size:7px;font-weight:900;letter-spacing:.12em;color:#c9a84c;white-space:nowrap;border-right:1px solid rgba(255,255,255,.07);text-transform:uppercase}
.ttrack{flex:1;overflow:hidden}
.tinn{display:flex;animation:scroll-ticker 50s linear infinite;white-space:nowrap}
@keyframes scroll-ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tev{display:inline-flex;align-items:center;gap:6px;padding:0 24px;font-size:9px;color:#4a4a6a}
.tdot{width:4px;height:4px;border-radius:50%}

/* Modal */
#modal{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center}
#modal.open{display:flex}
.modal-box{background:#0d0b1e;border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:24px;width:380px;max-height:80vh;overflow-y:auto}
</style>
</head>
<body>

<!-- Office Background + Sprites -->
<div id="office">
  <img id="bg" src="/sprites/bg-office.png" alt="" />
  <div id="chars"></div>
</div>

<!-- Top Bar -->
<div id="topbar">
  <div class="pip"></div>
  <div class="logo"><span>FACTOR</span>HUB</div>
  <div class="badge badge-green">Sistema Online</div>
  <span id="mission-badge">0 missões ativas</span>
  <div id="clock">--:--:--</div>
</div>

<!-- Right Panel -->
<div id="panel">
  <div class="panel-sec">
    <div class="panel-title">Squad — 26 Agentes</div>
    <div id="agent-list"></div>
  </div>
  <div class="panel-sec" style="flex:1;overflow-y:auto">
    <div class="panel-title">Missões</div>
    <div id="mission-list">
      <div style="font-size:11px;color:#3a3a5a;text-align:center;padding:20px 0">Nenhuma missão ativa</div>
    </div>
  </div>
  <div class="panel-sec">
    <div class="panel-title">Custo IA — 14 dias</div>
    <canvas id="cost-chart" width="288" height="48"></canvas>
    <div style="display:flex;justify-content:space-between;margin-top:6px">
      <span style="font-size:9px;color:#4a4a6a">Total acumulado</span>
      <span id="total-cost" style="font-size:10px;font-weight:700;color:#c9a84c;font-family:'Courier New',monospace">$0.0000</span>
    </div>
  </div>
</div>

<!-- Bottom Ticker -->
<div id="ticker">
  <div class="tlbl">Atividade</div>
  <div class="ttrack"><div class="tinn" id="ticker-inner"></div></div>
</div>

<!-- Agent Modal -->
<div id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div id="modal-content"></div>
  </div>
</div>

<script>
// ─── Agent Data ────────────────────────────────────────────────────────────────
const AGENTS = [
  {id:'CEO',name:'CEO Estratégico',role:'Decisões estratégicas',layer:'C1',color:'#e8622a',sprite:'char-purple',initial:'CE'},
  {id:'COO',name:'COO',role:'Operações',layer:'C1',color:'#f59e0b',sprite:'char-blue',initial:'CO'},
  {id:'CFO',name:'CFO',role:'Financeiro',layer:'C1',color:'#6366f1',sprite:'char-dark',initial:'CF'},
  {id:'CTO',name:'CTO',role:'Tecnologia',layer:'C1',color:'#10b981',sprite:'char-green',initial:'CT'},
  {id:'CMO',name:'CMO',role:'Marketing',layer:'C1',color:'#ec4899',sprite:'char-black',initial:'CM'},
  {id:'CPO',name:'CPO',role:'Produto',layer:'C1',color:'#8b5cf6',sprite:'char-pink',initial:'CP'},
  {id:'CSO',name:'CSO',role:'Estratégia',layer:'C1',color:'#c9a84c',sprite:'char-orange',initial:'CS'},
  {id:'CA',name:'Chief of Staff',role:'Síntese executiva',layer:'CA',color:'#7c3aed',sprite:'char-purple',initial:'CA'},
]

// Desk positions as % of container (left, top)
// Positions mapped to the isometric office background
const DESKS = [
  {id:'strategy-1', pct:[22,30]},
  {id:'strategy-2', pct:[30,24]},
  {id:'strategy-3', pct:[17,38]},
  {id:'tech-1',     pct:[55,22]},
  {id:'tech-2',     pct:[62,30]},
  {id:'growth-1',   pct:[30,46]},
  {id:'growth-2',   pct:[22,52]},
  {id:'meeting-1',  pct:[50,48]},
  {id:'kitchen-1',  pct:[76,25]},
  {id:'reception',  pct:[10,50]},
  {id:'lounge-1',   pct:[35,66]},
  {id:'lounge-2',   pct:[25,60]},
]

// Assign agents to initial desks
const AGENT_DESKS = {
  CEO:'strategy-1', COO:'strategy-2', CFO:'strategy-3',
  CTO:'tech-1',     CMO:'growth-1',   CPO:'growth-2',
  CSO:'meeting-1',  CA:'reception',
}

// State
const agentState = {}
AGENTS.forEach((a,i) => {
  agentState[a.id] = {
    status: 'sit',
    task: 'Disponível',
    desk: AGENT_DESKS[a.id] || DESKS[i % DESKS.length].id,
    walking: false,
    el: null,
  }
})

let tickLog = []
let totalCost = 0

// ─── Desk Position Helper ───────────────────────────────────────────────────
function getDeskPos(deskId) {
  const desk = DESKS.find(d => d.id === deskId)
  if (!desk) return {x:'50%',y:'50%'}
  return {x: desk.pct[0]+'%', y: desk.pct[1]+'%'}
}

// ─── Build Sprite Characters ─────────────────────────────────────────────────
function buildChars() {
  const container = document.getElementById('chars')
  container.innerHTML = ''

  AGENTS.forEach(a => {
    const s = agentState[a.id]
    const pos = getDeskPos(s.desk)

    const el = document.createElement('div')
    el.className = `agent state-sit`
    el.id = `agent-${a.id}`
    el.style.left = pos.x
    el.style.top = pos.y
    el.style.backgroundImage = `url('/sprites/${a.sprite}.png')`
    el.setAttribute('data-id', a.id)

    // ID badge
    const badge = document.createElement('div')
    badge.className = 'agent-id'
    badge.textContent = a.id
    badge.style.background = a.color + '22'
    badge.style.color = a.color
    badge.style.border = `1px solid ${a.color}50`
    el.appendChild(badge)

    // Speech bubble
    const bubble = document.createElement('div')
    bubble.className = 'bubble'
    bubble.textContent = s.task
    el.appendChild(bubble)

    // Working ring
    const ring = document.createElement('div')
    ring.className = 'ring'
    el.appendChild(ring)

    el.addEventListener('click', () => openAgentModal(a.id))
    container.appendChild(el)
    s.el = el
  })
}

// ─── State Management ─────────────────────────────────────────────────────────
function setAgentState(id, status, task) {
  const s = agentState[id]
  if (!s || !s.el) return
  s.status = status
  s.task = task || s.task

  s.el.className = `agent state-${status}`
  if (status === 'sit' || status === 'think') s.el.classList.add('working')

  const bubble = s.el.querySelector('.bubble')
  if (bubble) bubble.textContent = s.task

  // Update panel
  renderAgentList()
}

function walkAgentTo(id, deskId) {
  const s = agentState[id]
  if (!s || !s.el || s.walking) return
  s.walking = true
  s.desk = deskId
  const pos = getDeskPos(deskId)

  setAgentState(id, 'walk', s.task)
  s.el.style.left = pos.x
  s.el.style.top = pos.y

  setTimeout(() => {
    s.walking = false
    setAgentState(id, 'sit', s.task)
  }, 2600)
}

// ─── Right Panel ──────────────────────────────────────────────────────────────
function renderAgentList() {
  const list = document.getElementById('agent-list')
  if (!list) return
  list.innerHTML = AGENTS.map(a => {
    const s = agentState[a.id]
    const isWorking = s.status === 'sit' || s.status === 'think'
    const dotColor = isWorking ? '#22c55e' : s.status === 'walk' ? '#f59e0b' : '#2a2848'
    return `
    <div class="arow" onclick="openAgentModal('${a.id}')">
      <div class="aav" style="background:${a.color}22;border:1px solid ${a.color}50;color:${a.color}">${a.initial}</div>
      <div style="flex:1;min-width:0">
        <div class="aname">${a.name}</div>
        <div class="atask">${s.task}</div>
      </div>
      <div class="adot" style="background:${dotColor}"></div>
    </div>`
  }).join('')
}

// ─── Mission List ─────────────────────────────────────────────────────────────
function renderMissions(missions) {
  const el = document.getElementById('mission-list')
  const badge = document.getElementById('mission-badge')
  if (!missions.length) {
    el.innerHTML = '<div style="font-size:11px;color:#3a3a5a;text-align:center;padding:20px 0">Nenhuma missão ativa</div>'
    badge.textContent = '0 missões ativas'
    return
  }
  const active = missions.filter(m => m.status === 'running')
  badge.textContent = `${active.length} missão${active.length !== 1 ? 'ões' : ''} ativa${active.length !== 1 ? 's' : ''}`
  el.innerHTML = missions.map(m => {
    const sc = m.status === 'running' ? '#f59e0b' : m.status === 'approved' ? '#22c55e' : '#4a4a6a'
    const prog = m.agents_done || 0
    const total = m.agents_total || 1
    return `
    <div class="mrow" style="border-color:${sc}22">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span class="mname" style="font-size:9px;font-weight:800;padding:1px 6px;border-radius:3px;background:${sc}18;color:${sc}">${m.level}</span>
        <span style="font-size:8px;color:#4a4a6a">${prog}/${total} agentes</span>
      </div>
      <div class="mname">${m.title || 'Missão'}</div>
      <div class="mprog" style="margin-top:5px">
        <div class="mprogf" style="width:${(prog/total*100).toFixed(0)}%;background:${sc}"></div>
      </div>
    </div>`
  }).join('')
}

// ─── Cost Sparkline ───────────────────────────────────────────────────────────
function renderCostChart(data) {
  const cv = document.getElementById('cost-chart')
  const ctx = cv.getContext('2d')
  const w = cv.width, h = cv.height
  ctx.clearRect(0,0,w,h)

  if (!data || !data.length) return
  const max = Math.max(...data, 0.0001)
  const step = w / (data.length - 1 || 1)

  ctx.beginPath()
  data.forEach((v,i) => {
    const x = i * step
    const y = h - (v / max) * (h - 4) - 2
    i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y)
  })
  ctx.strokeStyle = '#c9a84c'
  ctx.lineWidth = 1.5
  ctx.stroke()

  ctx.lineTo(w,h); ctx.lineTo(0,h); ctx.closePath()
  ctx.fillStyle = 'rgba(201,168,76,0.08)'
  ctx.fill()
}

// ─── Ticker ───────────────────────────────────────────────────────────────────
function renderTicker() {
  const el = document.getElementById('ticker-inner')
  const events = tickLog.length > 0 ? tickLog : [
    {color:'#22c55e',text:'Sistema inicializado — 26 agentes disponíveis'},
    {color:'#c9a84c',text:'CEO aguardando nova missão'},
    {color:'#6366f1',text:'Cérebro corporativo carregado'},
    {color:'#10b981',text:'CTO revisando arquitetura'},
    {color:'#f59e0b',text:'COO alinhando processos'},
  ]
  const html = [...events,...events].map(e =>
    `<span class="tev"><span class="tdot" style="background:${e.color}"></span>${e.text}</span>`
  ).join('')
  el.innerHTML = html
}

function pushTick(agentId, text) {
  const a = AGENTS.find(a => a.id === agentId)
  tickLog.unshift({color: a?.color || '#c9a84c', text: `[${agentId}] ${text}`})
  if (tickLog.length > 12) tickLog.pop()
  renderTicker()
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function openAgentModal(id) {
  const a = AGENTS.find(a => a.id === id)
  const s = agentState[id]
  if (!a) return
  const statusLabel = {sit:'Trabalhando',walk:'Caminhando',idle:'Disponível',think:'Analisando'}[s.status] || s.status
  const statusColor = s.status === 'sit' ? '#22c55e' : s.status === 'walk' ? '#f59e0b' : '#4a4a6a'
  document.getElementById('modal-content').innerHTML = `
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
      <div style="width:56px;height:56px;border-radius:14px;background:${a.color}20;border:2px solid ${a.color};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:${a.color}">${a.initial}</div>
      <div>
        <div style="font-size:15px;font-weight:800;color:#f0f0f0">${a.name}</div>
        <div style="font-size:10px;color:#7a6e9a;margin-top:2px">${a.role} · ${a.layer}</div>
        <div style="display:flex;align-items:center;gap:5px;margin-top:5px">
          <div style="width:6px;height:6px;border-radius:50%;background:${statusColor}"></div>
          <span style="font-size:10px;color:${statusColor};font-weight:600">${statusLabel}</span>
        </div>
      </div>
      <button onclick="closeModal()" style="margin-left:auto;background:none;border:none;color:#4a4a6a;font-size:18px;cursor:pointer">×</button>
    </div>
    <div style="font-size:9px;color:#4a4a6a;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Task atual</div>
    <div style="font-size:12px;color:#c4b8e0;line-height:1.6;padding:10px;background:#0a0812;border-radius:8px;border:1px solid #1e1a2e">${s.task}</div>
  `
  document.getElementById('modal').classList.add('open')
}

function closeModal() {
  document.getElementById('modal').classList.remove('open')
}

// ─── Clock ────────────────────────────────────────────────────────────────────
setInterval(() => {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})
}, 1000)

// ─── Simulation (when not connected to live data) ─────────────────────────────
const SIM_TASKS = {
  CEO: ['Validando oportunidade de mercado','Revisando plano estratégico Q3','Aprovando budget de expansão'],
  COO: ['Mapeando dependências de sprint','Coordenando equipes','Otimizando processos operacionais'],
  CFO: ['Modelando unit economics','Revisando fluxo de caixa','Análise de margem por produto'],
  CTO: ['Revisando arquitetura de microserviços','Code review PR #47','Deploy em produção'],
  CMO: ['Campanha Q3 — ROAS 3.2x','Estratégia de conteúdo','Análise de funil de conversão'],
  CPO: ['Roadmap Q3 priorizado','User stories sprint 14','Revisando métricas de produto'],
  CSO: ['Análise competitiva','Posicionamento de mercado','Expansão estratégica'],
  CA: ['Síntese executiva','Coordenando agenda','Report semanal para founder'],
}

function simTick() {
  const agentIds = Object.keys(agentState)
  const id = agentIds[Math.floor(Math.random() * agentIds.length)]
  const a = AGENTS.find(a => a.id === id)
  const tasks = SIM_TASKS[id] || ['Em execução']
  const task = tasks[Math.floor(Math.random() * tasks.length)]

  const roll = Math.random()
  if (roll < 0.15) {
    // Walk to new desk
    const newDeskIdx = Math.floor(Math.random() * DESKS.length)
    const newDesk = DESKS[newDeskIdx].id
    walkAgentTo(id, newDesk)
    setAgentState(id, 'walk', task)
    pushTick(id, `indo para ${newDesk.replace('-',' ')}`)
  } else if (roll < 0.3) {
    setAgentState(id, 'think', task)
    pushTick(id, task)
  } else {
    setAgentState(id, 'sit', task)
    if (Math.random() < 0.4) pushTick(id, task)
  }

  const delay = 5000 + Math.random() * 8000
  setTimeout(simTick, delay)
}

// Listen for data from parent frame
window.addEventListener('message', (e) => {
  if (e.data?.type === 'factorhub-live-data') {
    const {missions, usage, agentStatuses} = e.data
    if (missions) renderMissions(missions)
    if (usage) {
      const costData = usage.slice(-14).map(u => Number(u.custo_usd || 0))
      renderCostChart(costData)
      totalCost = usage.reduce((s,u) => s + Number(u.custo_usd || 0), 0)
      document.getElementById('total-cost').textContent = '$'+totalCost.toFixed(4)
    }
    if (agentStatuses) {
      Object.entries(agentStatuses).forEach(([id, data]) => {
        if (agentState[id]) setAgentState(id, data.status, data.task)
      })
    }
  }
})
